  "2.1.1":{"ch": "2", "sec": "2.1", "s": "Maintenance of Statutory Certification", "d": "Were the Master and senior officers familiar with the company procedure for maintaining the vessel’s statutory certification up to date, were all certificates and documents carried onboard up to date and was the vessel free of conditions of class or significant memoranda?", "o": "To ensure that the vessel had been surveyed in accordance with all statutory requirements and that certification is onboard to confirm compliance. Industry guidance: IACS: Information Paper. Classification societies – what, why and how? TMSA KPI 4.2.", "i": "The vessel operator should have developed a procedure which defined the process for the vessel to monitor the validity of all major and minor certificates required to be carried on board, specifically identifying those required to be carried in accordance with the List of Certificates and Documents Required to be Carried On Board Ships, 2017. Where the vessel carried electronic certificates, these", "a": "Prior to boarding: • • Review the CSSR and identify any conditions of class and/or significant memoranda and copy the details into the observation tool. Verify that the dates and data declared within the HVPQ were accurate as compared to the CSSR. During the inspection: • • • • Sight, and where necessary review, the company procedure for managing t", "p": "IACS: Information Paper. Classification societies – what why and how? IMO: FAL.2/Circ.131 MEPC.1/Circ.873 MSC.1/Circ.1586 LEG.2/Circ.3. LIST OF CERTIFICATES AND DOCUMENTS REQUIRED TO BE CARRIED ON BOA", "k": ["company", "procedure", "class", "familiar", "carried", "statutory", "conditions", "certification", "officers", "certificates", "significant", "maintaining"]},

  "2.6.1":{"ch": "2", "sec": "2.6", "s": "Ballast Water Management Plan", "d": "Were the Master, deck officers and engineer officers familiar with the vessel’s Ballast Water Management Plan and were records available to demonstrate that ballast handling had been conducted in accordance with the plan?", "o": "To ensure that ballast is always safely handled in accordance with the Ballast Water Management Convention and BWMS Code.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. Chapter 12.6 - Ballast operations TMSA KPI 6.2.3 requires that comprehensive procedures cover all aspects of ballast handling operations. These procedures may include : • • Ballast water exchange. Ballast water treatment. IMO: ISM Code 7. The Company should establish procedures, plans and instructions, including ch", "a": "• • • • • Sight, and where necessary review, the Ballast Water Management Plan. Sight the Ballast Water Management Certificate and identify the principal ballast water management method. Review the ballast water record book (which may be an electronic record system or be integrated into another record book or system) and verify that recent ballast ", "p": "IMO: Ballast Water Management Convention and BWMS Code IMO: Resolution MEPC.252(67) Guidelines for port state control under the BWM Convention IMO: Resolution MEPC.288(71) 2017 Guidelines for ballast ", "k": ["conducted", "master", "familiar", "handling", "officers", "engineer", "vessel", "management", "available", "water", "demonstrate", "accordance"]},

  "2.7.1":{"ch": "2", "sec": "2.7", "s": "Availability of SMS content to all crew.", "d": "Was the relevant content of the SMS manuals easily accessible to all personnel on board in a working language(s) understood by them?", "o": "To ensure that all personnel on board can access and understand the procedures and instructions relevant to them, set out in the ship’s SMS manuals.", "i": "TMSA KPI 1A.1.4 requires that procedures and instructions are easily accessible to personnel and available at appropriate locations. Sufficient electronic or hard copies of procedures and instructions are easily accessible to all personnel, including contractors, at appropriate locations which may include: • Onboard vessels. IMO: ISM Code 6.6 The Company should establish procedures by which the sh", "a": "• • • • • Sight, and where necessary review, the SMS manuals, whether in electronic format or in hard copy. Sight, and where necessary review, evidence that changes to the SMS are promptly brought to the attention of the appropriate on-board personnel and understood (which may be documentary or electronic). Verify there is easy access to the naviga", "p": "IMO: ISM Code", "k": ["personnel", "content", "board", "understood", "language", "relevant", "availability", "accessible", "easily", "manuals", "working"]},

  "3.4.1":{"ch": "3", "sec": "3.4", "s": "Hours of rest, records and monitoring", "d": "Was there an effective system in place to record and monitor the hours of rest for all personnel onboard in compliance with STCW, MLC or the regulatory requirements applicable to the vessel?", "o": "To ensure that there is an effective system in place to manage crew rest hours and fatigue.", "i": "The vessel operator should have developed a procedure to define how hours of rest were to be managed and recorded based on the governing requirements of STCW, MLC, or the regulatory requirements applicable to the vessel. The vessel operator should have provided a system that permits the recording of rest hours and the consequential calculation of conformance in any 24-hour and 7-day periods for ea", "a": "Page 115 of 711 – SIRE 2.0 Question Library: Part 1 Version 1.0 (January 2022) • • • • Sight, and where necessary review, the company procedure which defined how hours of rest were to be managed and recorded. Review the hours of rest records form and verify that it was in alignment with the prescribed IMO/ILO format. Review hours of rest records an", "p": "IMO: MSC.1/Circ.1598 Guidelines on Fatigue ILO: Convention on Seafarers’ Hours of Work and the Manning of Ships’ (ILO 180) OCIMF: Recommendations Relating to the Application of Requirements Governing ", "k": ["monitoring", "effective", "hours", "personnel", "applicable", "record", "there", "requirements", "regulatory", "vessel", "place", "system"]},
  "3.4.2":{"ch": "3", "sec": "3.4", "s": "Drug and alcohol abuse prevention", "d": "Were the Master, officers and crew familiar with the company policy and procedures for drug and alcohol abuse prevention and had unannounced drug and alcohol testing taken place onboard in accordance with the policy?", "o": "To ensure that no seafarer will navigate a ship or operate its onboard equipment whilst impaired by drugs or alcohol.", "i": "OCIMF: Guidelines for the Control of Drugs and Alcohol Onboard Ship. 1995. OCIMF recommends that officers and ratings observe a period of abstinence from alcohol prior to scheduled watchkeeping duty or work periods. This may be either a fixed period, such as the 4 hours required by the USCG, or a minimum period of 1 hour of abstinence for each unit of alcohol consumed. Whichever method is used to ", "a": "Sight, and where necessary review, the company policy and supporting procedures to prevent the abuse of drugs and alcohol and verify that prior to the commencement of the inspection:", "p": "OCIMF: Guidelines for the Control of Drugs and Alcohol Onboard Ship. 1995. IMO: STCW Code", "k": ["alcohol", "company", "prevention", "master", "familiar", "procedures", "taken", "officers", "abuse", "unannounced", "place", "accordance"]},
  "3.5.1":{"ch": "3", "sec": "3.5", "s": "Familiarisation of crew, visitors and contractors", "d": "Had the company developed an effective familiarisation programme that covered the personal safety and professional responsibilities of all onboard personnel, including visitors and contractors, and were records available to demonstrate that the familiarisation had been completed as required?", "o": "To ensure that all onboard personnel, including contractors and visitors, are fully familiarised with their onboard duties, responsibilities and the equipment and machinery fitted to the vessel relevant to their role.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers. Chapter 2 Safety Induction. 2.1.2 It is recommended that each Company should design and implement a standard induction programme for each vessel, covering the STCW and MLC requirements, and incorporating any expanded detail specific to that vessel’s particular needs. TMSA KPI 3.1.4 requires that formal familiarisation procedures are in", "a": "• • Sight, and where necessary review, the company procedure which defined the familiarisation process for each role onboard, including visitors and contractors. Review the familiarisation records for the following, chosen at random, and verify that familiarisation was conducted as required by the company procedure: o One navigation/deck officer. o", "p": "IMO: ISM Code UK MCA: Code of Safe Working Practices for Merchant Seafarers", "k": ["company", "personnel", "professional", "covered", "personal", "demonstrate", "records", "completed", "developed", "visitors", "including", "effective"]},

  "3.5.3":{"ch": "3", "sec": "3.5", "s": "Familiarisation with ECDIS equipment installed on board.", "d": "Had the Master and navigation officers been familiarised with the ECDIS equipment installed on board and were documented records of this familiarisation available?", "o": "To ensure the Master and navigation officers are fully familiar with the specific type of ECDIS equipment installed on board prior to taking charge of a navigational watch.", "i": "OCIMF: Recommendations on Usage of ECDIS and Preventing Incidents. First edition. 3.2 Recommendations • Generic ECDIS training must be undertaken by all Masters and Bridge Officers. This training should as a minimum include provisions as per IMO model course 1.27. • Additionally, ECDIS familiarisation for all Masters and Bridge Officers should be undertaken to include typespecific training as well", "a": "", "p": "Nautical Institute: Industry Recommendations for ECDIS Familiarisation IMO: STCW.7/Circ.24 Training requirements for Electronic Chart Display and Information Systems (ECDIS) and provision of the docum", "k": ["equipment", "documented", "master", "installed", "officers", "familiarised", "ecdis", "board", "familiarisation", "available", "navigation", "records"]},
  "4.1.1":{"ch": "4", "sec": "4.1", "s": "ECDIS set up and operation", "d": "Were the Master and navigation officers familiar with the company procedures for the set up and operation of the ECDIS units fitted to the vessel and were records Page 132 of 711 – SIRE 2.0 Question Library: Part 1 Version 1.0 (January 2022) available to demonstrate that the ECDIS had been operated in accordance with company procedures at all stage", "o": "To ensure that ECDIS units fitted to the vessel were used to effectively navigate the vessel.", "i": "OCIMF: Recommendations on Usage of ECDIS and Preventing Incidents. First Edition. 1.2 Analysis of ECDIS-related incident findings and SIRE observations Table 1.1 summarises contributing factors identified from analysis of navigational incidents as well as Ship Inspection Report Programme (SIRE) findings related to ECDIS… … Gaps in ECDIS-related knowledge and practical application by Navigating Off", "a": "• • • • Sight, and where necessary review, the company procedures for ECDIS operation and management. Review the company procedures to verify that the required safety settings meet industry standards. Review the setup of an ECDIS unit with the accompanying officer and verify that settings, alarms and displays were in accordance with the provided ch", "p": "IMO: ISM Code ICS: Bridge Procedures Guide – Fifth Edition OCIMF: Recommendations on Usage of ECDIS and Preventing Incidents. First Edition.", "k": ["company", "demonstrate", "units", "operated", "records", "familiar", "operation", "question", "navigation", "procedures", "officers", "ecdis"]},
  "4.1.2":{"ch": "4", "sec": "4.1", "s": "Operation and testing of radar/ARPA", "d": "Were the Master and navigation officers familiar with the company procedures for managing and operating the radar/ARPA units fitted to the vessel, and were records available to demonstrate that the units had been operated and tested in accordance with company procedures?", "o": "To ensure that the radar/ARPA units fitted to the vessel are used effectively for navigation and collision avoidance.", "i": "SOLAS Chapter V Regulation 19 requires the following: (2.3.2) all ships of 300 gross tonnage and upwards, a 9 GHz radar. (2.5.5) all ships of 500 gross tonnage and upwards, an automatic tracking aid", "a": "• • • • • • • Sight, and where necessary review, the company procedures for managing and operating the radar/ARPA units fitted to the vessel. Where possible, review the ARPA alarm settings for CPA ,and BCR where fitted, and verify that they were set in accordance with company procedures with the audible and visual alarms functioning. Where possible", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS", "k": ["company", "demonstrate", "units", "operated", "records", "familiar", "operating", "operation", "navigation", "procedures", "officers", "radar"]},
  "4.1.3":{"ch": "4", "sec": "4.1", "s": "Operating and testing the steering control systems", "d": "Were the Master and navigation officers familiar with the company procedures for operating and testing the steering control systems fitted to the vessel and were records available to demonstrate that operation and testing had been carried out in accordance with the procedures?", "o": "To ensure the steering control systems fitted to the vessel are tested and used in an appropriate manner with changeover procedures understood.", "i": "The vessel operator should have developed procedures for the onboard management of the steering gear and control systems, which provided guidance on the following: • • • • • • The steering modes available for use which may include; o automatic steering. o track steering. o hand steering. o remote conning position steering. o non-follow up steering. Changing between the steering modes available. Li", "a": "• • • Sight, and where required review, the company procedure for managing, testing and operating the steering control systems provided. Review the records for the testing of the steering control systems provided and verify that all steering modes had been tested from each location, as appropriate, in accordance with the company procedure. Confirm ", "p": "USCG: Code of Federal Regulations. Title 33. IMO SOLAS ICS: Bridge Procedures Guide – Fifth Edition", "k": ["company", "demonstrate", "records", "familiar", "operating", "carried", "operation", "navigation", "control", "procedures", "officers", "available"]},
  "4.1.4":{"ch": "4", "sec": "4.1", "s": "Automatic Identification System (AIS)", "d": "Were the Master and navigation officers familiar with the company procedures for using the Automatic Identification System (AIS) fitted to the vessel and were records available to confirm that periodic checks and tests had been carried out in accordance with the procedures?", "o": "To ensure that the Automatic Identification System (AIS) fitted to the vessel was used to safely enhance situational awareness during navigation.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 4.10 Automatic Identification System It is important that AIS is operated correctly and that watchkeepers are familiar with the equipment, including how to check that all information being transmitted by AIS is both accurate and updated. Poor quality broadcast data can significantly reduce the potential value of this system. IMO: Resolution A.11", "a": "• • • • • Sight, and where necessary review, the company procedures for the operation and testing of the AIS equipment fitted onboard. Review checklists and records to verify that testing of the AIS system had been carried out in accordance with the company procedure. Verify that the navigational data feeds provided to the AIS were consistent with ", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. ICS: Bridge Procedures Guide – Fifth Edition IMO Resolution A.1106(29) Revised Guidelines for the Onboard Operationa", "k": ["company", "automatic", "confirm", "records", "familiar", "carried", "identification", "system", "navigation", "procedures", "officers", "available"]},
  "4.1.5":{"ch": "4", "sec": "4.1", "s": "Bridge Navigational Watch Alarm System (BNWAS)", "d": "Were the Master and navigation officers familiar with the company procedure for the use of the Bridge Navigational Watch Alarm System (BNWAS) and were records available to demonstrate that it had been operated and tested in accordance with the procedure?", "o": "To ensure that the bridge was continually manned throughout a voyage, and at anchor, by vigilant watchkeeping staff.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 3.5 Bridge Navigational Watch Alarm System The Bridge Navigational Watch Alarm System (BNWAS) should be in operation whenever the ship is at sea, including when the ship’s heading or track control system is in use. The OOW should ensure that the BNWAS is operational and set correctly in accordance with the SMS and the Master’s Standing orders. T", "a": "• • • • Sight, and where necessary review, the company procedure for operating and testing the Bridge Navigation Watch Alarm System (BNWAS) fitted to the vessel. Review vessel records and verify that the BNWAS had been operated and tested in accordance with company procedure. Request that the process for activating and deactivating the BNWAS is des", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS IMO: MSC.128(75) Performance Standards for a Bridge Navigational Watch Alarm System (BNWAS)", "k": ["navigational", "company", "master", "familiar", "bnwas", "operated", "accordance", "officers", "watch", "procedure", "tested", "available"]},
  "4.1.6":{"ch": "4", "sec": "4.1", "s": "Global Navigation Satellite System(s)", "d": "Were the Master and navigation officers familiar with the company procedures governing the management and operation of the Global Navigation Satellite System (GNSS) receivers fitted onboard and was the fitted equipment configured, used and checked in accordance with the procedure?", "o": "To ensure that Global Navigation Satellite System (GNSS) receivers provide reliable and accurate positional information.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 4.9 Electronic Position Fixing Systems 4.9.3 GNSS receivers Whether as stand-alone equipment or as part of an integrated system, GNSS receivers provide: • • • Position (including service quality information and geodetic datum corrections); Ground referenced course and speed; and Route storage and cross track distance (XTD) monitoring. By enterin", "a": "• • • • • • • Sight, and where necessary review, the company procedure for Global Navigation Satellite System (GNSS) receiver operation and management Review the configuration of the GNSS receivers and verify that the settings were in accordance with the company procedures. Verify that the antenna offset data was available and had been correctly en", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS", "k": ["company", "procedure", "familiar", "operation", "configured", "system", "navigation", "governing", "procedures", "officers", "global", "fitted"]},
  "4.1.7":{"ch": "4", "sec": "4.1", "s": "Echo sounder", "d": "Were the Master and navigation officers familiar with the company procedures for operating and managing the echo sounder and were records maintained to demonstrate that the equipment fitted to the vessel had been tested and operated in accordance with the company expectations?", "o": "To ensure that the echo sounder is used effectively to monitor the under-keel clearance.", "i": "Page 153 of 711 – SIRE 2.0 Question Library: Part 1 Version 1.0 (January 2022) The vessel operator should have developed procedures for the effective onboard management of the echo sounder, or other electronic means to measure the depth of water, and the associated means to record depth history. The procedure should define: • • • • • • When the echo sounder is required to be in operation. Where fo", "a": "• • • • • Sight, and where necessary review, the company procedures for managing and operating the echo sounder and its associated recording device(s). Review a recent passage and verify that the echo sounder and its recording device were in use in accordance with company procedures. Review the depth alarm setting and verify that it was in accordan", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS", "k": ["company", "demonstrate", "sounder", "operated", "records", "familiar", "operating", "navigation", "procedures", "officers", "fitted", "equipment"]},
  "4.1.8":{"ch": "4", "sec": "4.1", "s": "Speed and distance measuring devices", "d": "Were the Master and navigation officers familiar with the company procedures for the operation and testing of the speed and distance measuring devices fitted to the vessel and were records available to demonstrate that periodic tests had been completed as required by the procedures?", "o": "To ensure that accurate speed data is available to navigational equipment.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 4.4.2 Types of Speed Log. Electromagnetic and doppler type logs can be either single-axis and measure speed in the fore and aft direction (longitudinal) or dual-axis and measure fore and aft (longitudinal) and also athwartships (transverse) movement. When connected to rate of turn data, dual-axis logs are also able to calculate the speed and dir", "a": "• • • • • • Sight, and where necessary review, the company procedures for the operation and testing of the speed and distance measuring devices fitted to the vessel. Verify that the speed outputs from the speed and distance measuring devices were being correctly displayed at each remote display. Verify that the water speed displayed by the ARPA & E", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS", "k": ["company", "speed", "demonstrate", "records", "completed", "familiar", "operation", "navigation", "devices", "procedures", "officers", "measuring"]},
  "4.1.9":{"ch": "4", "sec": "4.1", "s": "Navigation lights and shapes", "d": "Were the Master and navigation officers familiar with the company procedures for the use and testing of the navigation lights and shapes, and was there evidence that the navigation lights had been tested to confirm full functionality and correct visibility?", "o": "To ensure that the vessel always displays navigation lights & shapes in accordance with the International Regulations for Preventing Collisions at Sea.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 4.7 Navigation Lights and Signalling Equipment The OOW is responsible for ensuring that the navigation lights, emergency navigation lights and signalling equipment are in working order and are ready for immediate use at all times. The condition of lights, flags and shapes should be checked at regular intervals. Checklists B3, B6, B7 & B16. IMO: ", "a": "• • • • • • • • Sight, and where necessary review, the company procedures which defined the checks and tests that were required to be carried out on the navigation lights, navigation light controller and navigational shapes. Review the pre-departure, pre-arrival and daily navigational checklists and verify that navigation light checks and tests had", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: Resolution MSC.253(83) Adoption of the performance standards for navigation lights navigation light controllers and associated equipment. IMO: COLREG", "k": ["company", "shapes", "master", "familiar", "procedures", "functionality", "officers", "there", "tested", "correct", "evidence", "visibility"]},
  "4.1.10":{"ch": "4", "sec": "4.1", "s": "NAVTEX and SafetyNET", "d": "Were the Master and navigation officers familiar with the company procedure for managing Marine Safety Information broadcasts by NAVTEX and SafetyNET and were warnings affecting the vessel’s route plotted on the voyage charts?", "o": "To ensure that broadcast navigation warnings affecting a vessel’s planned route are effectively managed.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. 2.4.9 Maritime Safety Information Weather information (including gale warnings), NAVAREA warnings and coastal navigational warnings are broadcast by radio-telephony from coast radio stations and by NAVTEX. Long range weather warnings are broadcast via satellite communications systems, such as SafetyNET, along with NAVAREA navigational warnings as part o", "a": "• • • • • Sight, and where necessary review, the company procedure for managing Marine Safety Information received through NAVTEX and SafetyNET. Inspect the NAVTEX receiver and verify that it was correctly set to receive navigational warnings from relevant coast radio stations. Review the messages received through the NAVTEX and verify they were re", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS IMO MSC.1/Circ. 1310/Rev.1 Revised Joint IMO/IHO/WMO Manual on Maritime Safety Information (MSI)", "k": ["company", "charts", "procedure", "marine", "familiar", "warnings", "affecting", "navigation", "broadcasts", "officers", "information", "safetynet"]},
  "4.1.11":{"ch": "4", "sec": "4.1", "s": "Preserving data from the VDR/S-VDR", "d": "Were the Master and navigation officers familiar with the company procedure for preserving data from the VDR/S-VDR and were records available to demonstrate that tests of the equipment had been completed as required?", "o": "To ensure that the VDR fitted to the vessel is continually recording all required data streams and procedures are in place to preserve records in the event of an incident.", "i": "The vessel operator should have developed procedures which ensure that:", "a": "• • • • • • Sight, and where necessary review, the company procedure which governed the setup, use and testing of the VDR / S-VDR system fitted onboard the vessel. Verify that instructions for saving and preserving data were posted near the VDR / S-VDR controls. Verify that the annual performance testing of the VDR / S-VDR had been completed in acc", "p": "IMO: Resolution MSC.333(90) Adoption of Revised Performance Standards for Shipborne Voyage Data Recorders (VDRs) ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS OCIMF: Recommendations on the Pr", "k": ["company", "equipment", "master", "familiar", "tests", "officers", "procedure", "preserving", "available", "required", "demonstrate", "navigation"]},
  "4.1.12":{"ch": "4", "sec": "4.1", "s": "Magnetic and gyro compasses", "d": "Were the Master and navigation officers familiar with the company procedures relating to the magnetic and gyro compasses carried onboard, and were records available to demonstrate their accuracy and reliability?", "o": "To ensure that standard, gyro and GNSS compasses and their heading output to navigational equipment are accurate and reliable", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 4.3 Compass Systems 4.3.2 Gyro compass The gyro compass should be run continuously. Should a gyro compass stop for any reason, it should be restarted and subsequently regularly checked and only relied on again when it has “settled” and the error is known. Where the gyro has no direct speed log or position input, manual corrections should be made", "a": "Page 169 of 711 – SIRE 2.0 Question Library: Part 1 Version 1.0 (January 2022) • • • • Sight, and where necessary review, the company procedures for standard, gyro and GNSS compass management as applicable. Inspect the various compasses and repeaters and verify that the heading output is consistent, and illumination is functional. Review the deviat", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS", "k": ["compasses", "company", "master", "familiar", "procedures", "accuracy", "carried", "officers", "reliability", "relating", "available", "their"]},
  "4.1.13":{"ch": "4", "sec": "4.1", "s": "VHF/DSC transceivers", "d": "Were the Master and navigation officers familiar with the company procedures for the operation and testing of the VHF/DSC transceivers fitted to the vessel, and were records available to demonstrate that periodic tests and checks had been completed in accordance with company expectations?", "o": "To ensure that VHF radio is used to enhance navigation safety and support the obligations of the vessel under SOLAS to render assistance to non-SOLAS vessels in distress.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Section 3.15 GMDSS watchkeeping 3.15.1 Radio watchkeeping The OOW is responsible for ensuring compliance with the ship’s watchkeeping requirements. Section 3.12.2 Risk of Collision Due to the risk of confusion and error, VHF radio and AIS should not be relied on for collision avoidance. OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals", "a": "• • Sight, and where necessary review, the company procedures for the use and operation of the VHF/DSC equipment fitted to the vessel. Review the records for the testing of the VHF/DSC equipment and verify that the equipment was tested and found functional in accordance with company expectations.", "p": "IMO: MSC.131 (75) Maintenance of a continuous listening watch on VHF channel 16 by SOLAS ships whilst at sea IMO: Resolution A.954 (23). Proper use of VHF Channels at Sea ICS: Bridge Procedures Guide ", "k": ["company", "demonstrate", "records", "completed", "familiar", "operation", "navigation", "procedures", "officers", "available", "fitted", "accordance"]},
  "4.1.14":{"ch": "4", "sec": "4.1", "s": "Daylight signalling lamp", "d": "Were the Master and navigation officers familiar with the company procedure for testing and using the daylight signalling lamp?", "o": "To ensure that there is a means of attracting the attention of other vessels by visual means both during daylight and during darkness.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 3.12 Compliance with the COLREGs. The conduct of a ship’s navigation should always comply with the International Regulations for the Prevention of Collisions at Sea (COLREGS). This includes displaying correct lights and shapes and making the correct sound and light signals. TMSA KPI 5.1.2 requires that comprehensive procedures to ensure safe nav", "a": "• • • • Sight, and where necessary review, the procedure which defined the company expectations when attracting the attention of another vessel in a collision avoidance situation. Review that bridge equipment testing records and verify that the daylight signalling lamp had been periodically tested in accordance with company expectations. Test the d", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: Resolution MSC.95(72) Performance Standards for Daylight Signalling Lamps. IMO SOLAS", "k": ["company", "signalling", "master", "familiar", "officers", "procedure", "using", "daylight", "navigation", "testing"]},
  "4.1.15":{"ch": "4", "sec": "4.1", "s": "Sound signalling equipment", "d": "Were the Master and navigation officers familiar with the company procedures for the use and testing of the sound signalling equipment fitted to the vessel and were records available to confirm that periodic tests had been completed and the equipment used in accordance with company expectations?", "o": "To ensure that the vessel was able to make sound signals to comply with the International Regulations for Preventing Collisions at Sea (COLREG).", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Section 3.12 Compliance with the COLREGS. The conduct of a ship’s navigation should always comply with the International Regulations for the Prevention of Collisions at Sea (COLREGS). This includes displaying correct lights and shapes and making the correct sound and light signals. Checklist B13 – Restricted Visibility. TMSA KPI 5.1.2 requires that comp", "a": "• • • Sight, and where necessary review, the company procedures which defined the expected use and testing of the sound signalling equipment fitted to the vessel. Review the bridge equipment testing records and verify that periodic tests had been completed to confirm the functionality of whistles, bells and gongs and, their automation, to conform t", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: COLREG", "k": ["company", "confirm", "records", "completed", "familiar", "sound", "navigation", "signalling", "procedures", "officers", "available", "fitted"]},
  "4.2.1":{"ch": "4", "sec": "4.2", "s": "Passage planning", "d": "Were the Master and navigating officers familiar with the company passage planning procedures and had all voyages been appraised, planned, executed and monitored in accordance with company procedures, industry best practice and both local and international rules?", "o": "To ensure that passages are planned and executed from berth to berth in accordance with international/local rules and industry best practice guidance.", "i": "OCIMF: Recommendations on Usage of ECDIS and Preventing Incidents. First Edition. 4.2.2 Berth-to-berth passage plan The IMO Assembly resolution A.893(21) Guidelines for Voyage Planning includes appraisal (gathering all information relevant to the voyage or passage); detailed planning of the whole voyage or passage from berth to berth, including the areas where a pilot is needed; execution of the p", "a": "", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: ISM Code IMO SOLAS OCIMF: Recommendations on Usage of ECDIS and Preventing Incidents. First Edition.", "k": ["company", "practice", "planned", "international", "passage", "executed", "industry", "familiar", "voyages", "procedures", "officers", "appraised"]},
  "4.2.2":{"ch": "4", "sec": "4.2", "s": "Under keel clearance (UKC) policy", "d": "Were the Master and navigation officers familiar with the company under keel clearance (UKC) policy and procedure, and were records available to demonstrate that the required calculations had been completed at the appropriate points during each voyage and the vessel had remained in compliance with the UKC policy?", "o": "To ensure that the vessel always maintains a safe under keel clearance. Industry guidance IMO: Resolution A.893(21). Guidelines for Voyage Planning. 3 Planning", "i": "The vessel operator should have developed an under keel clearance (UKC) policy and procedure which defined: • • The minimum dynamic UKC required to be maintained; o During open sea passage. o During coastal / restricted waters passage. o Within port limits. o While alongside. o While at SBM/CBM berths. o At anchor. The factors to be considered when calculating and evaluating UKC, which should incl", "a": "• • • • Review the company under keel clearance (UKC) policy and procedure and verify that the values uploaded to the pre-inspection questionnaire were accurate. Review the UKC calculations for a recent voyage and verify that all factors required to be considered by the company procedure had been included in the calculation and evaluation and that ", "p": "IMO: ISM Code IMO: Resolution A.893(21) Guidelines for Voyage Planning OCIMF: Recommendations on Usage of ECDIS and Preventing Incidents. First Edition.", "k": ["company", "appropriate", "procedure", "remained", "demonstrate", "records", "completed", "points", "familiar", "during", "navigation", "officers"]},
  "4.2.3":{"ch": "4", "sec": "4.2", "s": "Master's Standing Orders and Daily Orders", "d": "Had the Master prepared Master's Standing Orders, supplemented by Daily Orders, which emphasised and reinforced the company expectations with regards to navigational requirements including restricted visibility, CPA/BCR and minimum passing distance from navigational dangers and navigational aids and, if so, had all navigation officers signed to ack", "o": "To ensure that all deck/navigating officers are aware of the key expectations of both the company and the Master with respect to the navigation of the vessel.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. 1.3.2.1 Master’s Standing Orders Lines of authority on board should be in accordance with the SMS and operational procedures manuals. The Master should explain particular requirements to the Bridge Team in Master’s Standing Orders. These orders should be drafted to support the SMS. Company and Master’s Standing orders should be read by all Bridge Team m", "a": "• • Sight, and where necessary review, the company procedure which defined the requirement for the Master to prepare Master's Standing Orders and Daily Orders Review the Master’s Standing Orders and verify that: o They included the content defined by the company procedure. o They defined what constituted restricted visibility. o They defined the mi", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: ISM Code IMO: STCW Code", "k": ["navigational", "company", "requirements", "understanding", "visibility", "minimum", "emphasised", "restricted", "navigation", "acknowledge", "including", "passing"]},
  "4.2.4":{"ch": "4", "sec": "4.2", "s": "Electronic chart management.", "d": "Were the Master and navigation officers familiar with the company electronic chart management procedures and were onboard ENCs and RNCs managed, corrected and used appropriately?", "o": "To ensure that only fully corrected official electronic charts are used for navigation where ECDIS is required to be carried", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 4.12. Charts and Nautical Publications. Only up to date official charts and publications should be used for appraisal, planning, execution and monitoring of a passage plan. 4.12.3 Electronic Charts Users of electronic charts should be aware that: • • ENC and RNC are official charts produced by a hydrographic office; and All other commercially av", "a": "• • • • • • • Confirm the primary means of navigation as declared in the pre-inspection questionnaire was correctly stated. Sight, and where necessary review, the company procedure for managing, ordering and updating ENCs and RNCs. Review the onboard electronic chart management system for ENC and RNC and verify that the charts required for t", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS IHO: Information on IHO Standards related to ENC and ECDIS (Ver 2.1 Feb 2020) UKHO: Guide to ECDIS audits and inspections OCIMF: Recommendations ", "k": ["company", "corrected", "master", "familiar", "chart", "procedures", "electronic", "managed", "officers", "management", "appropriately", "navigation"]},
  "4.2.5":{"ch": "4", "sec": "4.2", "s": "Paper chart management", "d": "Were the Master and navigation officers familiar with the company paper chart management procedures and were onboard paper charts managed, corrected and used appropriately?", "o": "To ensure that the only fully corrected official paper charts are used for navigation when required to be carried or used.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 4.12 Charts and Nautical Publications 4.12.1 Carriage Of Charts And Nautical Publications It is required that all ships carry adequate and up to date official nautical charts, sailing directions, lists of lights and radio signals, Notices to Mariners, tide tables and all other nautical publications necessary to appraise, plan, execute and monito", "a": "• • • • • Sight, and where necessary review, the company procedures for paper chart management. Review the paper chart portfolio records and verify that all paper charts onboard were listed with their edition date. Review a recent passage plan and verify that paper charts used for the voyage were fully corrected by spot sampling at least two charts", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS", "k": ["company", "corrected", "charts", "master", "familiar", "chart", "procedures", "paper", "managed", "officers", "management", "appropriately"]},
  "4.2.6":{"ch": "4", "sec": "4.2", "s": "Testing navigational equipment, main propulsion, steering gear and thrusters", "d": "Were the Master and navigation officers familiar with the company procedures for testing the navigational equipment, main propulsion, steering gear and thrusters prior to use and prior to critical phases of a passage or operation and, did checklists or logbook entries confirm the required tests had been completed as required?", "o": "To ensure that navigational equipment and manoeuvring machinery is confirmed as fully operational prior to critical phases of a passage or operation.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 3.18 Periodic Checks of Navigational Equipment. 3.18.1 Operational checks on navigational equipment should be undertaken when preparing for sea and prior to port entry and at any other time required by the SMS. Before entering restricted or coastal waters, it is important also to check that full control of engine and steering function is availab", "a": "• • • • • • Sight, and where necessary, review the company procedures which defined the requirement for testing navigational and manoeuvring equipment. Verify that the vessel operator had provided vessel specific checklists to address the following: o Steering Gear Test Routines (modelled on BPG B1 and supporting notes). o Preparations for Sea (mod", "p": "USCG: Code of Federal Regulations. Title 33. ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS", "k": ["navigational", "company", "passage", "checklists", "confirm", "completed", "familiar", "operation", "navigation", "procedures", "propulsion", "officers"]},
  "4.2.7":{"ch": "4", "sec": "4.2", "s": "Nautical publications", "d": "Were the Master and navigation officers familiar with the company procedure for the carriage and management of nautical publications and was evidence available to demonstrate that publications had been managed in accordance with the procedure?", "o": "To ensure nautical publications used for navigational purposes provide the most accurate information available.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Chapter 2.3.2 Official Nautical Publications and Additional Information. A full appraisal of the passage plan should include a review and consideration of information additional to that on navigational charts, including but not limited to: • • • • • • • • • Sailing Directions. Notices to Mariners. Lists of Radio Signals. Load Line Charts. Ocean Passage/", "a": "• • • • Sight, and where necessary review, the company procedure for managing, ordering and updating nautical publications. Verify that the company procedure had defined which nautical publications were required to be carried, whether in hard or electronic form, and identified both mandatory and discretionary titles. Review the onboard nautical pub", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS UK Admiralty: Guidance on the Use of ADMIRALTY Digital Publications (ADP) and ADMIRALTY e-Nautical Publications (e-NPs) IMO: MSC-MEPC.2/Circ.2 IM", "k": ["company", "nautical", "master", "familiar", "publications", "managed", "officers", "procedure", "evidence", "management", "available", "carriage"]},
  "4.3.1":{"ch": "4", "sec": "4.3", "s": "Minimum bridge team composition", "d": "Were the Master and navigation officers familiar with the company procedures defining the minimum bridge team composition and engine room operating mode and were records available to demonstrate that recent voyages had been planned and executed in accordance with company expectations?", "o": "To ensure that the bridge team is adequately resourced, and the machinery space operated appropriately at all stages of a voyage including while at anchor, conducting STS operations or drifting.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Section 1 Effective Bridge Organization 1.2.1 Composition of the Bridge Team The Bridge Team should be sufficiently resourced to meet the operational requirements of the passage plan. When considering the composition of the Bridge Team and ensuring that the bridge is never left unattended at sea, the Master should take into account the following: • • • ", "a": "• • • Sight, and where necessary review, the company procedures which define the bridge and machinery space team compositions. Review a recent passage plan and verify that the anticipated changes in bridge team composition and machinery space operating status had been identified and documented in alignment with the company procedure. Review the rec", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: ISM Code", "k": ["company", "planned", "executed", "minimum", "demonstrate", "records", "familiar", "operating", "engine", "navigation", "voyages", "procedures"]},
  "4.3.2":{"ch": "4", "sec": "4.3", "s": "Machinery space team composition", "d": "Were the engineer officers familiar with the company procedures defining machinery space operating mode and, where required to be attended, the machinery space team composition during the various stages of a voyage, and were records available to confirm the machinery space had been operated accordingly?", "o": "To ensure that the machinery space is adequately manned or monitored at all stages of a voyage or operation.", "i": "ICS: Engine Room Procedures Guide. First Edition. 7.1 Manning Level Changes The Chief Engineer or designated representative should increase manning levels when required, whether planned or unplanned. As far as possible, the work/rest hour requirements should still be met. 7.1.1 Planned Changes The Chief Engineer should identify planned changes in consultation with the Master. The planned changes s", "a": "Page 209 of 711 – SIRE 2.0 Question Library: Part 1 Version 1.0 (January 2022) • • • • Sight, and where necessary review, the company procedure which defined the required machinery space operating mode for the various stages of a voyage. Sight, and where necessary review, the company procedure which defined the machinery space team composition cons", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS ICS: Engine Room Procedures Guide. First Edition.", "k": ["company", "accordingly", "records", "confirm", "space", "operated", "familiar", "operating", "during", "procedures", "officers", "available"]},
  "4.3.3":{"ch": "4", "sec": "4.3", "s": "Integrating a pilot (or similar role) into the bridge team", "d": "Were the Master and navigation officers familiar with the company procedures for integrating a pilot (or similar role*) into the bridge team and were records available to demonstrate that the process had been followed?", "o": "To ensure that there is an effective process to integrate the pilot (or similar role*) into the bridge team.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. 5 Pilotage 5.1 Overview Efficient pilotage will depend on: • • • • Effective communication between the Master, Bridge Team and Pilot. Accurate exchange of information between the Master, Bridge Team and the Pilot, particularly on matters relating to safety, helm and telegraph orders. Mutual understanding of duties and responsibilities; and A complete aw", "a": "• • • • Sight, and where necessary review, the company procedure for integrating a pilot* into the bridge team. Review the Master/Pilot information exchange and pilot checklists from two recent operations and verify that the information required to be included had been fully and accurately entered and the pilot* had acknowledged the handover of inf", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: ISM Code IMPA: Guidance on the Master - Pilot Exchange (MPX)", "k": ["company", "master", "familiar", "procedures", "officers", "pilot", "available", "followed", "similar", "demonstrate", "navigation", "bridge"]},
  "4.3.4":{"ch": "4", "sec": "4.3", "s": "Bridge distractions.", "d": "Were the Master and navigation officers familiar with the company procedures to prevent disruption and distraction on the bridge, and were these procedures being complied with?", "o": "To ensure that the bridge team can always maintain a safe navigational watch, free from disruption and distraction.", "i": "ICS: Bridge Procedures Guide – Fifth Edition 1.2.7 Duties within the Bridge Team Maintaining Bridge Team performance will be aided by a bridge environment which is free from distractions. To avoid disruption and distraction on the bridge it is recommended that: • • • Unrestricted bridge access is limited to only those with operational bridge responsibilities; The use of mobile phones and other per", "a": "• • • Sight, and where necessary review, the company procedures to prevent disruption and distraction on the bridge. During the inspection of the bridge note any evidence of non-compliance with the company procedures. Interview the accompanying officer to verify their familiarity with the company procedures to prevent disruption and distraction on ", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: ISM Code", "k": ["complied", "company", "master", "familiar", "procedures", "disruption", "prevent", "officers", "being", "these", "distraction", "navigation"]},
  "4.4.1":{"ch": "4", "sec": "4.4", "s": "Emergency Position Indicating Radio Beacon (EPIRB)", "d": "Were the Master and officers familiar with the operation of the Emergency Position Indicating Radio Beacon (EPIRB) and was the EPIRB in good order with records available to demonstrate that had it been inspected, tested and maintained as required?", "o": "To ensure the Emergency Position Indicating Radio Beacon (EPIRB) will function correctly in an emergency.", "i": "IMO: MSC.1/Circ.1039 Guidelines for shore-based maintenance of satellite EPIRBs 4 Maintenance service interval 4.1 406 MHz satellite EPIRBs should be inspected and tested in accordance with MSC/Circ.1040. 4. 2 Shore-based maintenance of all satellite EPIRBs, as defined in paragraph 1.2, should be carried out in accordance with these guidelines at intervals specified by the flag Administration and ", "a": "• • • Sight, and where necessary review, the company procedure to ensure that EPIRBs were periodically inspected, tested and maintained, and ready for immediate use in an emergency. Review records of periodic inspections, tests and maintenance of the EPIRB. Inspect the EPIRB and associated fittings.", "p": "IMO: MSC.1/Circ.1039 Guidelines for shore-based maintenance of satellite EPIRBs IMO: ISM Code IMO SOLAS IMO: MSC.1/Circ.1040/Rev.2 Guidelines on annual testing of 406 mhz satellite EPIRBs", "k": ["indicating", "maintained", "master", "familiar", "epirb", "inspected", "operation", "officers", "tested", "order", "available", "beacon"]},
  "4.4.2":{"ch": "4", "sec": "4.4", "s": "Search and Rescue Transmitters (SARTs)", "d": "Were the Master and officers familiar with the operation of the Search and Rescue Transmitters (SARTs), and were the SARTs in good order with records available to demonstrate that had they had been inspected and tested as required?", "o": "To ensure the Search and Rescue Transmitters (SARTs) will function correctly in an emergency.", "i": "IMO: Resolution A.802(19) Recommendation on performance standards for survival craft radar transponders for use in search and rescue operations 2 General The SART should be capable of indicating the location of a unit in distress on the assisting units radars by means of a series of equally spaced dots (see resolution A.530(13)). 2.1 The SART should: .10 be equipped with buoyant lanyard, suitable ", "a": "• • • • Sight, and where necessary review, the company procedure to ensure that SARTs were periodically inspected, tested and ready for immediate use in an emergency. Review records of periodic inspections and tests of the SART(s). Inspect the SART(s). Interview the accompanying officer and verify their familiarity with: o The purpose and operation", "p": "IMO: ISM Code IMO SOLAS IMO: Resolution A.802(19) Recommendation on performance standards for survival craft radar transponders for use in search and rescue operations IMO: Resolution MSC.246(83) Perf", "k": ["search", "master", "familiar", "inspected", "operation", "officers", "rescue", "tested", "order", "available", "required", "transmitters"]},
  "4.4.3":{"ch": "4", "sec": "4.4", "s": "Survival craft portable two-way VHF radios", "d": "Were the Master and officers familiar with the location, purpose and operation of the survival craft portable two-way VHF radios and were they in good order with records available to demonstrate that had they been inspected and tested as required?", "o": "To ensure the survival craft portable two-way VHF radios will function correctly in an emergency.", "i": "IMO: Resolution MSC.149(77) Adoption of the revised performance standards for survival craft portable twoway vhf radiotelephone apparatus 2.1 The equipment should be portable and capable of being used for on-scene communication between survival craft, between survival craft and ship and between survival craft and rescue unit. It may also be used for on-board communications when capable of operatin", "a": "• • • • Sight, and where necessary review, the company procedure to ensure that survival craft portable two-way VHF radios were periodically inspected and tested and ready for immediate use in an emergency. Review records of periodic inspections and tests of the survival craft portable two-way VHF radios. Inspect the survival craft portable two-way", "p": "IMO: ISM Code IMO SOLAS IMO: Resolution MSC.149(77) Adoption of the revised performance standards for survival craft portable two-way vhf radiotelephone apparatus", "k": ["craft", "master", "familiar", "inspected", "operation", "officers", "tested", "survival", "order", "available", "required", "location"]},
  "4.4.4":{"ch": "4", "sec": "4.4", "s": "Sending and receiving distress, urgency and safety messages", "d": "Were the Master and navigation officers familiar with the procedures for sending and receiving distress, urgency and safety messages and were suitable instructions posted by the GMDSS equipment?", "o": "To ensure effective communications will be made by the vessel in an emergency situation.", "i": "ICS: Bridge Procedures Guide – Fifth Edition 3.15 GMDSS Watchkeeping To enable a ship to send and receive distress, urgency and safety information, the OOW should hold a General or restricted Operator’s Certificate (GOC/ROC) as appropriate and be familiar with the requirements and procedures for GMDSS watchkeeping…. The International telecommunications Union (ITU) publication Manual for Use by the", "a": "• • • Sight, and where necessary review, the company procedures for emergency communications using the GMDSS equipment. Review the entries in the GMDSS Radio Log Book and verify that distress, urgency and safety messages received had been recorded in accordance with company procedures. Interview the accompanying officer to assess their familiarity ", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: ISM Code IMO/ICAO International aeronautical and maritime search and rescue manual (IAMSAR) Vol III", "k": ["receiving", "equipment", "master", "familiar", "procedures", "distress", "messages", "urgency", "suitable", "officers", "gmdss", "sending"]},
  "4.4.5":{"ch": "4", "sec": "4.4", "s": "Operation and testing of GMDSS station.", "d": "Were the Master and navigation officers familiar with the operation, testing and maintenance of the GMDSS VHF, MF and HF radio and satellite communications equipment and were records available to demonstrate the equipment was in good order?", "o": "To ensure effective communications in routine or emergency situations.", "i": "ICS: Bridge Procedures Guide. 5th Edition. 3.15.5 GMDSS Log keeping A GMDSS radio log should be kept in order to provide a record of all events connected with the radio communications facilities on board. As a minimum the following should be recorded: • • • • • • A summary of communications relating to distress, urgency and safety. This includes any period when a radio watch is discontinued and th", "a": "", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: ISM Code IMO SOLAS IMO: RESOLUTION A.702(17) Radio maintenance guidelines for the global maritime distress and safety system (GMDSS) related to sea ar", "k": ["equipment", "master", "familiar", "maintenance", "gmdss", "operation", "officers", "satellite", "order", "available", "station", "radio"]},
  "4.4.6":{"ch": "4", "sec": "4.4", "s": "Use of radio or mobile telephone equipment during cargo and ballast handling", "d": "Were the Master, officers and crew aware of the potential danger of using radio or mobile telephone equipment during cargo and ballast handling operations and was there a sufficient number of intrinsically safe portable radios for use in operational areas?", "o": "To ensure a hazard is never created by the inappropriate use of radio or mobile telephone equipment during cargo or ballast operations.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 4.12.5 Mobile telephones and pagers Most mobile telephones and pagers are not intrinsically safe and are only considered safe for use in non-hazardous areas. They should be restricted to designated areas of the accommodation space where they are unlikely to interfere with the tanker’s equipment. Mobile telephones sh", "a": "• • • • Sight, and where necessary review, the company procedures for the safe use of radio and telephone equipment during cargo and ballast handling operations. During the course of the inspection, confirm: o Sufficient VHF or UHF portable radios in good working order were available to properly coordinate cargo, ballast and bunker handling operati", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["operations", "potential", "sufficient", "danger", "operational", "radios", "handling", "telephone", "intrinsically", "during", "cargo", "mobile"]},
  "4.5.1":{"ch": "4", "sec": "4.5", "s": "Annual DP Trial report and supporting exercises.", "d": "Was the latest Annual DP Trial report available on board, were the Master and officers familiar with the contents, and had they taken part in onboard training and drills involving various DP scenarios?", "o": "To ensure that the vessel’s DP system is fully operational, and that the vessel is fault tolerant according to the equipment class requirements.", "i": "IMCA: M 190 Guidance for Developing and Conducting Annual DP Trials Programmes for DP Vessels. Rev 2.1 4 Development of the DP Annual Trials Programme Annual testing of the DP system, to demonstrate that the vessel remains fit for purpose for DP operations, may be conducted during an annual DP trial, incremental tests, or a combination of both. The DP annual trials programme might also provide for", "a": "", "p": "IMCA M 117 Rev. 2 Guidelines for The Training and Experience of Key DP Personnel IMO: ISM Code IMO: MSC.1/Circ.1580 Guidelines for vessels and units with dynamic positioning (DP) systems IMCA: M 190 G", "k": ["report", "involving", "trial", "familiar", "exercises", "scenarios", "training", "supporting", "annual", "officers", "board", "available"]},
  "4.5.2":{"ch": "4", "sec": "4.5", "s": "DP Position Reference Systems", "d": "Were the Master and officers familiar with the company procedures for the use of Position Reference Systems (PRS), and was the equipment in satisfactory condition with sensor offset data readily available to the DPO?", "o": "To ensure Position Reference Systems are in satisfactory condition with sensor offset data readily available to the DPO.", "i": "OCIMF Guidelines for Offshore Tanker Operations 6.6.8 Position Reference System It is recommended that in accordance with other critical DP operations, when a DP bow loading tanker is operating in auto DP mode, independent PRS operating on different principles are used. The following should be taken into account: • • • • • The DP system should be equipped with a set of PRS, and sensors optimised f", "a": "• • • • Sight, and where necessary review, company procedures for the use of Position Reference Systems during DP operations at each offtake location. Sight and where necessary review, the sensor offset data file. Review the DP logbook and data log for any indication of PRS faults. Inspect the PRS equipment recognising that it might not be possible", "p": "IMCA: Guidelines on the Shared Use of Sensors for Survey and Positioning Purposes IMO: ISM Code OCIMF Guidelines for Offshore Tanker Operations IMO: MSC.1/Circ.1580 Guidelines for vessels and units wi", "k": ["company", "satisfactory", "sensor", "master", "familiar", "procedures", "reference", "offset", "officers", "available", "systems", "position"]},
  "4.5.3":{"ch": "4", "sec": "4.5", "s": "DP events and incidents", "d": "Were the Master and officers familiar with the company procedures for reporting and recording DP events and incidents, and were all DP parameters being logged and recorded?", "o": "To ensure DP events and incidents are recorded, reported and investigated, and lessons learnt from incidents used to increase industry safety standards.", "i": "OCIMF: Dynamic Positioning Failure Mode Effect Analysis Assurance Framework Risk-based Guidance 1st Ed 2020 2.1 Introduction Codes, standards and practices applied to DP vessels are based on redundancy to ensure that no single failure leads to a loss of position and/or heading, for vessels assigned DP Equipment Classes 2 and 3. Loss of Position (LOP) incidents occur when the DP redundancy concept ", "a": "• • • • Sight, and where necessary review, the company procedures for recording, reporting and investigating DP related incidents, undesired events and observations. Sight and review: o Records of DP related incidents, undesired events and observations. o Independent data logger records, if readily accessible. o DP fault log. Inspect the independen", "p": "IMO: ISM Code Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140 OCIMF Guidelines for Offshore Tanker Operations OCIMF: Dynamic Positioning Failure Mod", "k": ["company", "reporting", "events", "master", "familiar", "procedures", "incidents", "recording", "parameters", "logged", "officers", "being"]},
  "4.5.4":{"ch": "4", "sec": "4.5", "s": "DP operations manual", "d": "Was the vessel provided with a comprehensive DP operations manual and were the Master and officers familiar with its contents, including DP checklists, capability plots, consequence analysis and activity specific operating guidelines (ASOG)?", "o": "To ensure the Master and officers are provided with comprehensive procedures for conducting DP operations.", "i": "IMCA: The Design and Operation of DP Vessels IMCA M 103 Rev. 4 January 2019 3.3.2 Recommended Documentation 4. DP Capability Plots - These should be hard copy plots of the vessel’s calculated capability to maintain position in various operational scenarios. They should be readily available at the DP control location. 9. DP Operations Manual - Vessel-specific DP operations manual, to be readily acc", "a": "• Sight and review: o DP operations manual. o Completed DP location checklists and watchkeeping checklists. o Hard copy capability plots. o DP footprint records. o DP operations risk assessments. • Interview the accompanying officer to verify their familiarity with the contents of the DP operations manual, including: o Capability plots. o DP footpr", "p": "IMO: ISM Code IMO: MSC.1/Circ.1580 Guidelines for vessels and units with dynamic positioning (DP) systems IMCA: The Design and Operation of DP Vessels IMCA M 103 Rev. 5 June 2021", "k": ["capability", "checklists", "operations", "manual", "guidelines", "familiar", "operating", "comprehensive", "analysis", "including", "consequence", "officers"]},
  "4.5.5":{"ch": "4", "sec": "4.5", "s": "Field Operations Manuals", "d": "Were up to date Field Operations Manuals on board for each offshore terminal to which the vessel trades, were the Master and officers familiar with their content, and were records available of the regular communication checks with terminal installations as required by Field Specific Operating Guidelines (FSOG)?", "o": "To ensure the Master and officers are aware of the procedures and regulations at each offshore terminal to which the vessel trades, and that regular communications are established as required by Field Specific Operating Guidelines (FSOG).", "i": "OCIMF Guidelines for Offshore Tanker Operations 8.21.5 Field operations manual Field-specific operations manuals can provide the main procedures controlling cargo transfer operations across the field. Such manuals can address all terminals within a field or location and can incorporate both field operations procedures and regulations information. The field operations manual should include the foll", "a": "• • • • Sight, and where necessary review, the company procedures to ensure that the most up-to-date editions of the field operations manuals are on board for each offshore terminal to which the vessel trades. Sight the field operations manuals for each offshore terminal to which the vessel trades. Sight the records of the regular communication che", "p": "OCIMF Guidelines for Offshore Tanker Operations IMO: ISM Code", "k": ["operations", "installations", "guidelines", "records", "field", "familiar", "operating", "regular", "trades", "terminal", "officers", "board"]},
  "5.1.1":{"ch": "5", "sec": "5.1", "s": "Records of mandatory and company defined emergency drills", "d": "Were the Master and officers familiar with the onboard emergency response plans, and were records available to demonstrate that all mandatory and company defined emergency drills had been completed and documented as required by company procedures?", "o": "To ensure that vessel staff can manage onboard emergencies through a consistent and structured process.", "i": "IMO Resolution A.1072(28) Revised Guidelines for the Structure of an Integrated System of Contingency Planning for Shipboard Emergencies 2.1.1 The integrated system of shipboard emergency plans (hereinafter referred to as the \"system\") should provide a framework for the many individual contingency plans (hereinafter referred to as the \"plans\"), tailored for a variety of potential emergencies, for ", "a": "• • Sight, and where necessary review, the company procedure which defined: o The requirement to conduct emergency response drills. o The requirement to record the outcome of an emergency response drill in a consistent manner. o The requirement to track the completion of completed drills to ensure that mandatory and company required drills were com", "p": "IMO: ISM Code IMO Resolution A.1072(28) Revised guidelines for a structure of an integrated system of contingency planning for shipboard emergencies.", "k": ["company", "documented", "master", "familiar", "procedures", "drills", "officers", "mandatory", "available", "response", "plans", "required"]},
  "5.1.2":{"ch": "5", "sec": "5.1", "s": "Emergency plans & drills for principal fire scenarios", "d": "Were the Master and officers familiar with the shipboard emergency plans for the principal fire scenarios for the vessel type, and had drills taken place to test the effectiveness of the plans in accordance with the company procedures?", "o": "To ensure that the crew will respond to a fire situation in accordance with the vessel’s shipboard emergency response plans.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. Checklist C7 Fire OCIMF/ICS: Peril at Sea and Salvage – A Guide for Masters. Sixth Edition. Chapter 3 Implementing the emergency response plan 3.1 General Do what is necessary to manage the situation. Activate the most appropriate contingency plans in the SMS. Tailor decision making to the severity of the emergency by prioritising tasks and using resour", "a": "• • Sight, and where necessary review, the shipboard emergency response plans for the principal fire scenarios which were appropriate to the vessel type, which should include: o Fire on the cargo deck. o Fire in a cargo tank. o Fire in the main machinery space. o Fire in the cargo pump room or compressor room. o Fire in the accommodation. o Fire in", "p": "ICS: Bridge Procedures Guide – Fifth Edition OCIMF/ICS: Peril at Sea and Salvage – A Guide for Masters. Sixth Edition. IMO: ISM Code IMO SOLAS IMO Resolution A.1072(28) Revised guidelines for a struct", "k": ["effectiveness", "company", "master", "familiar", "procedures", "taken", "drills", "officers", "vessel", "shipboard", "scenarios", "place"]},
  "5.1.3":{"ch": "5", "sec": "5.1", "s": "Pollution prevention drills required by SOPEP or SMPEP", "d": "Were the Master and officers familiar with the vessel’s SOPEP or SMPEP, and had drills taken place to test the effectiveness of the onboard emergency response actions required by the Plan and company procedures?", "o": "To ensure that the crew will respond effectively to a spill situation in accordance with the vessel’s Shipboard Oil Pollution Plan (SOPEP) or Shipboard Marine Pollution Emergency Plan (SMPEP).", "i": "IMO: Guidelines for the development of Shipboard Marine Pollution Emergency Plans. 2010 edition. As a minimum the Plan (i.e. SOPEP or SMPEP) should provide the Master with guidance to address the following: 2.5.2.1 Operational spills…. • • • Pipe leakage…. Tank overflow…. Hull leakage…. 2.5.2.2 Spills resulting from casualties… • • • • • • • • • Grounding Fire/explosion Collision with fixed or mov", "a": "• • • • Sight, and where necessary review, the SOPEP or SMPEP. Sight the shipboard emergency response plans for operational cargo and bunker spills. Sight the list of specific contact details posted on the bridge or cargo control room. Review the records of completed spill response drills and verify that: o The latest drill had been completed withi", "p": "IMO: ISM Code IMO: MARPOL IMO: Guidelines for the development of Shipboard Marine Pollution Emergency Plans. 2010 edition.", "k": ["company", "place", "response", "pollution", "familiar", "actions", "procedures", "officers", "onboard", "effectiveness", "prevention", "master"]},
  "5.1.4":{"ch": "5", "sec": "5.1", "s": "Enclosed space rescue emergency response drill.", "d": "Were the Master and officers familiar with the shipboard emergency plan for enclosed space rescue, and had drills taken place to test the effectiveness of the shipboard emergency response plan in accordance with company procedures?", "o": "To ensure that the crew will respond to an enclosed space rescue situation in accordance with the vessel's shipboard emergency response plan.", "i": "OCIMF: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. Chapter 10.2 Safety management for entering enclosed spaces. 10.2.2 Managing controlled entry into enclosed space Responding to a crisis. Injuries and deaths from entering enclosed spaces often occur when personnel give in to a strong instinct to help. A delayed response from the rescue team can make this worse. It may", "a": "• • Sight, and where necessary review, the shipboard emergency response plan for enclosed space rescue. Review the records of completed enclosed space rescue drills and verify that: o The latest drill had been completed within the timeframe defined by the drill schedule. o The details of the drill had been recorded in the defined format required by", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: Resolution A.1050(27) Revised Recommendations for Entering Enclosed Spaces Aboard Ships. IMO: ISM Code IMO SOLA", "k": ["enclosed", "effectiveness", "company", "master", "familiar", "procedures", "taken", "drills", "officers", "rescue", "shipboard", "place"]},

  "5.2.7":{"ch": "5", "sec": "5.2", "s": "Fire pumps, fire main, fire main isolating valves and fire hydrants", "d": "Were the Master and officers familiar with the location, purpose and operation of the vessel’s fire pumps, fire main, fire main isolating valves and fire hydrants, and was the system and its components in good working order and available for immediate use?", "o": "To ensure that crewmembers can respond effectively to a fire situation in accordance with the shipboard emergency plan.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 5.3.1.1 Water All tankers have a firefighting system that consists of pumps permanently connected to the sea, a fire main with hydrant points, fire hoses with couplings and jet nozzles or preferably jet/spray nozzles. Hydrants are located to ensure that two jets of water can reach any part of the ship. IMO: MSC.1/C", "a": "• • • • • • • Provided it is safe to do so, witness the remote starting of a fire pump from the bridge or fire control station and verify that the pump reaches and maintains the required pressure while discharging through the anchor washes or other outlet. Inspect the deck fire main, particularly on the underside, for external indications of corros", "p": "IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protection systems and ", "k": ["isolating", "master", "familiar", "pumps", "operation", "officers", "hydrants", "vessel", "order", "available", "components", "location"]},
  "5.2.8":{"ch": "5", "sec": "5.2", "s": "Galley fixed and portable fire extinguishing systems & fire prevention", "d": "Were the Master, officers and galley staff familiar with the location, purpose and operation of the fixed and portable fire extinguishing systems provided in the galley, were the systems in good working order and available for immediate use, and were galley ranges, exhaust vents, filter cowls free of grease or combustible material?", "o": "To ensure that the fire protection measures provided in the galley are properly maintained and crewmembers can respond effectively to a fire situation in accordance with the shipboard emergency plan.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 4.10.9 Galley stoves and cooking appliances The use of galley stoves and other cooking appliances that employ naked flames should be prohibited while a tanker is at a petroleum berth. Galley personnel should be instructed on how to safely operate galley equipment. Unauthorised and inexperienced persons should not b", "a": "• • • Inspect the vessel’s galley and verify that: o Galley ranges were free of fat or other flammable material. o Grease traps had been recently cleaned. o Filter cowls of galley vents were free of accumulated fat or oil. o Fire dampers were properly marked and free to operate. o Fan stop activation points in, or near, the galley were clearly mark", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protectio", "k": ["extinguishing", "purpose", "combustible", "grease", "familiar", "operation", "cowls", "exhaust", "immediate", "filter", "staff", "galley"]},
