  "6.4.2":{"ch": "6", "sec": "6.4", "s": "Disposal of oily water in the forecastle and other internal spaces", "d": "Were the Master and officers familiar with the company procedures for the disposal of accumulations of water contaminated with oil and/or marine pollutants in the forecastle and other internal spaces, and had the procedures been implemented?", "o": "To ensure any water contaminated with oil or marine pollutants generated in the forecastle and other internal spaces is disposed of properly.", "i": "IMO: MEPC.1/Circ.759 Guidelines for a shipboard oily waste pollution prevention plan 1.2 Key elements of the shipboard oily waste pollution prevention plan should include documented ship-specific company procedures as laid out in these guidelines. 3 Shipboard oily waste pollution prevention plan The shipboard oily waste pollution prevention plan should contain measures, including as provided for i", "a": "• • • Sight, and where necessary review, the company procedures to ensure proper disposal of oily waste or other marine pollutants accumulating in internal space bilge wells. Review the records of the disposal of oily waste or other marine pollutants accumulated in internal space bilge wells. Inspect bilge-wells in the forecastle and other internal", "p": "IMO: ISM Code IMO: MEPC.1/Circ.759 Guidelines for a shipboard oily waste pollution prevention plan", "k": ["company", "master", "familiar", "procedures", "internal", "spaces", "officers", "pollutants", "contaminated", "marine", "water", "forecastle"]},
  "6.5.1":{"ch": "6", "sec": "6.5", "s": "Emergency arrangements to pump out the machinery space bilges", "d": "Were the Master and officers familiar with the emergency arrangements to pump out the machinery space bilges in the event of flooding, and were these arrangements prominently marked and in good order?", "o": "To ensure that the machinery space bilges could be pumped out promptly in the event of a flooding situation.", "i": "ICS: Engine Room Procedures Guide. First Edition. 5.4 Flooding 5.4.2 Prevention, Preparedness and Response Though the engineering team cannot predict or prevent flooding caused by allision, collision and grounding, it can avoid flooding caused by inefficient bilge management. Best practices to follow include: (abbreviated) • • • • Maintain and operate bilge and ballast systems properly. Repair any", "a": "", "p": "IMO: ISM Code IMO SOLAS IMO: MARPOL IMO: MSC.1/Circ.1424 Unified interpretation of SOLAS regulation II-1/48.3 Controls of emergency bilge suction valve in periodically unattended machinery spaces", "k": ["prominently", "master", "familiar", "officers", "arrangements", "machinery", "order", "these", "marked", "space", "bilges", "flooding"]},
  "6.5.2":{"ch": "6", "sec": "6.5", "s": "Incinerator operation.", "d": "Were the engineer officers familiar with the company procedure for the safe use of the incinerator, and was the incinerator in satisfactory condition and used in accordance with the company procedure and in compliance with MARPOL?", "o": "To ensure that the disposal of garbage and sludge using the incinerator is always carried out safely and in accordance with the requirements of MARPOL.", "i": "ICS: Engine Room Procedures Guide. First Edition. 9.3.2 Incinerators • • • • • Incinerators are a potential fire hazard, therefore it is essential that their operation is closely monitored, including what is being incinerated. Waste should not be allowed to accumulate around incinerator spaces other than in the correct storage facilities. Accumulated waste around incinerator spaces is a fire and o", "a": "• • • Sight, and where necessary review, the company procedures which described the safe use of the incinerator. Sight, and where necessary review, the risk assessment for the safe operation of the incinerator. Inspect the incinerator and the garbage sorting area and verify that: o The incinerator appeared fully functional and operational. o Clear ", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code IMO: MARPOL IMO: MEPC.244(66) 2014 Standard specification for shipboard incinerators.", "k": ["company", "satisfactory", "familiar", "marpol", "operation", "officers", "engineer", "procedure", "incinerator", "condition", "accordance", "compliance"]},
  "6.6.1":{"ch": "6", "sec": "6.6", "s": "Oil filtering equipment.", "d": "Were the Master and engineer officers familiar with the company procedures for the use of the oil filtering equipment, and was the oil filtering equipment in satisfactory condition and used in accordance with the company procedure, manufacturer’s instructions and MARPOL Annex I?", "o": "To ensure that bilge discharges from machinery spaces are always within the limits permitted by MARPOL Annex I.", "i": "ICS: Engine Room Procedures Guide. First Edition. Chapter 9- Pollution Control 9.3 Equipment Operational Guidelines 9.3.1 Oily Water Separators (OWS) • • Keep the OWS overboard discharge manual valve lock closed when not in use. The Chief Engineer and Master should hold the keys; Post a sign next to the OWS overboard discharge valve to identify the function of the valve and warn that it must be lo", "a": "", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code IMO: MARPOL IMO: Polar Code", "k": ["company", "satisfactory", "master", "familiar", "procedures", "filtering", "marpol", "officers", "engineer", "procedure", "annex", "equipment"]},
  "6.6.2":{"ch": "6", "sec": "6.6", "s": "Oil discharge monitoring and control system (ODME)", "d": "Were the Master and officers familiar with the company procedures for the use of the oil discharge monitoring and control system, and was the oil discharge monitoring and control system in satisfactory condition and used in accordance with the company procedures, manufacturer’s instructions and MARPOL Annex I?", "o": "To ensure that discharges from cargo and ballast spaces are always within the limits permitted by MARPOL Annex I.", "i": "IMO: Resolution MEPC.108(49). Revised Guidelines and Specifications for Oil Discharge Monitoring and Control System for Oil Tankers. (Amended by resolution MEPC.240(65) but no text below affected) 3.1 Oil discharge monitoring and control system An oil discharge monitoring and control system, referred to in these Guidelines and Specifications as a monitoring system, is a system which monitors the d", "a": "", "p": "IMO: MARPOL IMO: ISM Code IMO: Resolution MEPC.108(49). Revised Guidelines and Specifications for Oil Discharge Monitoring and Control System for Oil Tankers.", "k": ["company", "satisfactory", "master", "familiar", "procedures", "control", "marpol", "officers", "annex", "discharge", "system", "condition"]},
  "7.1.1":{"ch": "7", "sec": "7.1", "s": "Security threat and risk assessment during passage planning.", "d": "Was security threat and risk assessment an integral part of voyage planning, and did the passage plan contain security related information for each leg of the voyage?", "o": "To ensure voyage planning always addresses security considerations.", "i": "Industry: Global Counter Piracy Guidance for Companies, Masters and Seafarers Fundamentals The fundamental requirements of best practices to avoid attack by pirates and armed robbers are: 1. 2. Conduct thorough, ship-specific pre-voyage threat and risk assessments to identify appropriate Ship Protection Measures (SPMs). Implement SPMs as identified in the pre-voyage risk assessment. Section 4 Comp", "a": "• • • • Sight UKHO or equivalent security charts and industry best management practice guidance (BMP) publications and/or regional guidance. Review the passage plan for a recently completed voyage including security related notations on voyage charts. Review the security risk assessment for the same voyage. Review if necessary, the records of the s", "p": "Industry: Global Counter Piracy Guidance for Companies Masters and Seafarers Industry : BMP5 Best Management Practices to Deter Piracy and Enhance Maritime Security in the Red Sea Gulf of Aden Indian ", "k": ["contain", "voyage", "assessment", "passage", "during", "integral", "information", "threat", "related", "security", "planning"]},
  "7.2.1":{"ch": "7", "sec": "7.2", "s": "Vessel hardening.", "d": "Were the Master and officers familiar with the company procedures for hardening the vessel when entering areas of increased security risk, and was there a Vessel Hardening Plan (VHP) available?", "o": "To ensure the vessel can be hardened effectively if scheduled to enter an area of increased security risk.", "i": "OCIMF: Guidelines to Harden Vessels. First Edition. 1.1 Assessing risks, detecting threats and defending the vessel Vessel hardening is the physical measures taken to improve a vessel's security integrity. Any vessel hardening measures adopted should not compromise the vessel’s compliance with the International Convention for the Safety of Life at Sea (SOLAS) regulations. Escape routes should be k", "a": "• • Sight and where necessary, review the company procedures for hardening the vessel when entering areas of increased security risk. Review: o Vessel Hardening Plan (VHP). o Records of implementation of the VHP such as logbooks, work planning records, reports, photographs etc. o Inventory of hardening materials. o Inspection and maintenance record", "p": "IMO: ISM Code OCIMF: Guidelines to Harden Vessels. First Edition.", "k": ["company", "master", "familiar", "procedures", "officers", "entering", "there", "vessel", "available", "areas", "hardening", "increased"]},
  "7.2.2":{"ch": "7", "sec": "7.2", "s": "Controlling access to the vessel", "d": "Were the Master, officers and ratings familiar with the company procedures to control access to the vessel in port and to ensure the safety of visitors, and were these procedures effectively implemented?", "o": "To ensure access to the vessel is controlled at all times, and that all visitors are provided with an overview of the hazards present and the safety precautions to observe while they are on board.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 21.2.1 Security information In addition to International Ship and Port Facility (ISPS) requirements, the tanker should provide the terminal with a list of approved visitors, including Agents, Surveyors and Loading Masters. ICS: Tanker Safety Guide (Gas) - Third Edition 2.5.3 Unauthorised access All access to the shi", "a": "• • When boarding the vessel, observe the security arrangements and induction and familiarisation procedures for visitors. During the course of the inspection, observe the arrangements for regular patrols of the deck to monitor potential unauthorised access points. Expected Evidence • • • Company procedures to control access to the vessel in port, ", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. ICS: Tanker Safety Guide (Chemicals) - Fifth Edition IMO: ISM Code ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "master", "familiar", "procedures", "effectively", "officers", "ratings", "vessel", "implemented", "these", "safety", "visitors"]},
  "7.3.1":{"ch": "7", "sec": "7.3", "s": "Ship security reporting and communications", "d": "Were the Master and officers familiar with regional maritime security reporting requirements and operation of the ship security alert system (SSAS) and had this equipment been regularly tested?", "o": "To ensure that the vessel staff have knowledge of regional maritime security reporting and that the SSAS works.", "i": "Industry: Global Counter Piracy Guidance for Companies, Masters and Seafarers Section 3 Voluntary Reporting A major lesson learnt from operations against piracy and armed robbery to date is the importance of liaison with the military and law enforcement. This is an essential part of self-protection that applies to all ships. To ensure these forces are aware of the intended sea passage and to under", "a": "• • • Sight the 24-hour contact details for the CSO. Verify with the Master or SSO that: o They were familiar with the company procedures for voluntary security reporting in VRAs. o SSAS, LRIT and dedicated standalone security communications equipment, if fitted, is in satisfactory condition, regularly tested and records maintained. Verify that par", "p": "IMO: ISM Code IMO: Guide to Maritime Security and the ISPS Code 2012 edition Industry: Global Counter Piracy Guidance for Companies Masters and Seafarers Industry : BMP5 Best Management Practices to D", "k": ["reporting", "master", "familiar", "alert", "regional", "officers", "operation", "requirements", "tested", "maritime", "system", "equipment"]},
  "7.4.1":{"ch": "7", "sec": "7.4", "s": "Ship Security Officer (SSO).", "d": "Did the Ship Security Officer (SSO) have a valid Certificate of Proficiency and a full understanding of their role, and were ship security records of port calls being maintained as required by SOLAS?", "o": "To ensure the SSO is trained and qualified and required security records are maintained.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 6.6 Responsibilities under the International Ship and Port Facility Security Code For tankers at a terminal, while the PFSO is responsible for the port security plan, the Master has overriding authority to make decisions about the safety and security of the tanker. A Ship Security Officer (SSO) should be appointed ", "a": "• • • • Sight and verify the SSO’s Certificate of Proficiency. Sight and where necessary review, the sections of the SMS relating to ship security. Sight evidence of regular security inspections of the vessel by the SSO. Sight the ship security records for the last 10 port calls. • • Interview the SSO to verify their familiarity with their role, re", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: Guide to Maritime Security and the ISPS Code 2012 edition", "k": ["maintained", "solas", "officer", "valid", "understanding", "being", "proficiency", "required", "certificate", "calls", "security", "their"]},
  "7.5.1":{"ch": "7", "sec": "7.5", "s": "Cyber security risk management.", "d": "Were the Master and officers familiar with the company procedures for cyber security risk management, and had these procedures been fully implemented?", "o": "To ensure the vessel has in place effective technical and procedural measures to protect against a cyber incident and ensure continuity of operations.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 6.4 Cyber safety and security Cyber security is concerned with the protection of Information Technology (IT), Operational Technology (OT), information and data from unauthorised access, manipulation and disruption. Cyber safety covers the risks from the loss of availability or integrity of safety critical data and O", "a": "• Interview the officer with responsibility for cyber risk management on board to confirm the existence of o The company procedures for cyber risk management. o The inventory/register of sensitive IT/OT systems fitted on board. o Records of approval for external local or remote access to sensitive IT/OT systems. o Contact details for t", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: ISM Code IMO: MSC-FAL.1/Circ.3 Guidelines on maritime cyber risk management Industry: The Guidelines on Cyber S", "k": ["company", "master", "familiar", "procedures", "fully", "cyber", "officers", "management", "implemented", "these", "security"]},
  "8.1.1":{"ch": "8", "sec": "8.1", "s": "Inert gas system usage on oil tankers.", "d": "Were the Master and officers familiar with the company procedures for the use of the inert gas system, and had the inert gas system been used in accordance with ISGOTT guidance, with cargo tanks maintained in an inert condition at all times, except when it was necessary to be gas-free for entry?", "o": "To ensure the inert gas system is used in accordance with ISGOTT guidance, and cargo tanks are always maintained in an inert condition, except when it is necessary to be gas-free for entry.", "i": "OCIMF: Inert Gas Systems. The use of inert gas for the carriage of flammable oil cargoes 4. Guidance for the use of inert gas systems on oil tankers All vessels fitted with an inert gas system should maintain it fully functional, use it in accordance with ISGOTT guidance, and maintain cargo tanks in an inert condition at all times, except when it is necessary to be gas-free for entry. OCIMF/ICS: I", "a": "", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. OCIMF: Inert Gas Systems. The use of inert gas for the carriage of flammable oil cargoes", "k": ["company", "except", "inert", "familiar", "guidance", "system", "condition", "cargo", "isgott", "procedures", "usage", "officers"]},
  "8.1.2":{"ch": "8", "sec": "8.1", "s": "Crude Oil Washing operations (COW)", "d": "Were the Master and officers familiar with the company procedures and international regulations for the planning, preparation, conduct and documentation of crude oil washing operations (COW), and was the COW system in satisfactory condition and used in accordance with the company procedures for each COW operation?", "o": "To ensure crude oil washing operations are always planned, prepared, conducted and documented in accordance with international regulation and industry best practice.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 12.5 Crude Oil Washing (COW) 12.5.4 Control of tank atmosphere The oxygen content of the tank must not exceed 8% by volume, as described in section 11.1.6.9 12.5.5 Precautions against leaks from the washing system Before arriving in a port where it is intended to COW, the tank washing system should be pressure test", "a": "• • • • • Sight, and where necessary review the: o Company procedures for the planning, preparation, conduct and documentation of crude oil washing. o COW manual. o Records and checklists for previous COW operations. Where COW operations were planned or underway, review the: o COW plan for the current operation. o Completed COW checklists. o Ship S", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: MARPOL IMO: Crude Oil Washing Systems", "k": ["company", "international", "conduct", "operations", "documentation", "satisfactory", "familiar", "operation", "system", "crude", "condition", "regulations"]},
  "8.1.3":{"ch": "8", "sec": "8.1", "s": "Cargo tank isolation from venting system.", "d": "Were the Master and officers familiar with the company procedures for the isolation of individual cargo tanks from the common venting system in accordance with SOLAS, and were these procedures being followed?", "o": "To ensure there are no incidences of cargo tank over or under pressurisation as a result of the mishandling or failure of vapour or inert gas isolating valves.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.2.2.2 Causes of tank over pressurisation Over pressurisation usually occurs during ballasting, loading or internal transfer of cargo or ballast. It can be caused by one of the following: • • Incorrect setting of the tank’s vapour or IG isolating valve to the vapour line or IG line. Failure of an isolating valve t", "a": "• • • • Sight, and where necessary review, the company procedures for the isolation of individual cargo tanks from the common venting system. Sight the record or display of the current operational status of the isolating valves. During the course of the inspection, inspect the isolating valves and verify their operational status and condition, incl", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "venting", "master", "familiar", "procedures", "common", "isolation", "officers", "solas", "being", "these", "tanks"]},
  "8.1.4":{"ch": "8", "sec": "8.1", "s": "Oil cargo tank cleaning procedures.", "d": "Were the Master and deck officers familiar with the company procedures for planning and documenting cargo tank cleaning operations after the carriage of volatile products, and had these procedures been followed?", "o": "To ensure that tank cleaning and gas freeing operations after the carriage of volatile products are always carefully planned, conducted and documented.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals 12.3.2 Tank washing risk management All tank washing operations should be carefully planned and documented. The potential hazards of planned tank washing operations should be systematically identified, and risk assessed. Appropriate preventative measures should be put in place to reduce the risk to ALARP. 12.3.3 Supervision and pr", "a": "• • • Sight, and where necessary review, the company procedures for planning and documenting cargo tank cleaning operations after the carriage of volatile products. Review available tank cleaning plans, risk assessments, log books and records to verify compliance with company procedures. Interview the officer responsible for tank cleaning operation", "p": "EI: HM50 Guidelines for the cleaning of tanks and lines for marine tank vessels carrying petroleum and refined products 5th edition OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals.", "k": ["company", "master", "familiar", "procedures", "products", "officers", "operations", "documenting", "after", "carriage", "these", "planning"]},
  "8.2.1":{"ch": "8", "sec": "8.2", "s": "Chemical tanker inert gas system usage.", "d": "Were the Master and officers familiar with the company procedures for the operation of the inert gas system, and had the inert gas system been used in accordance with these procedures, industry guidance, and SOLAS and IBC regulations?", "o": "To ensure the inert gas system is always used in accordance with industry guidance, SOLAS and IBC regulations and company procedures to prevent fire and explosion.", "i": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 4.5 Inert gas requirements for chemical carriers The provision and use of an inert gas system is specified by the SOLAS Convention. To meet the SOLAS requirements for non-flammability, an inert gas system must be capable of delivering inert gas with an oxygen content of not more than 5% by volume in the inert gas main at any required flow rate. ", "a": "", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition IMO: MSC.1/Circ.1501 Unif", "k": ["company", "master", "familiar", "procedures", "guidance", "usage", "regulations", "operation", "officers", "solas", "chemical", "tanker"]},
  "8.2.2":{"ch": "8", "sec": "8.2", "s": "Carriage of inhibited chemical cargoes.", "d": "Were the Master and officers familiar with the company procedures that addressed the carriage of inhibited cargoes, and had these procedures been followed?", "o": "To ensure that inhibited cargoes are carried safely and in compliance with company procedures and the IBC Code.", "i": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 1.6.2 Unstable chemicals Reaction characteristics Unstable chemicals can self-react without the need for another substance to trigger a reaction. Decomposition or polymerisation are the most typical reactions that can occur within unstable chemicals carried on board chemical tankers. Chemicals that polymerise, such as styrene monomer and vinyl a", "a": "", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IBC Code", "k": ["company", "master", "familiar", "procedures", "chemical", "officers", "addressed", "cargoes", "carriage", "these", "inhibited", "followed"]},
  "8.2.3":{"ch": "8", "sec": "8.2", "s": "Procedures and Arrangements Manual.", "d": "Were the Master and officers familiar with the information contained in the Procedures and Arrangements Manual, Certificate of Fitness for the Carriage of Noxious Liquid Substances in Bulk, the IBC Code and the latest MEPC.2/Circular, and was this information readily available to the officers engaged in cargo planning and operations?", "o": "To ensure the Master and officers have the necessary information readily available to them to plan and perform safe cargo operations.", "i": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 4.3.2 MARPOL Annex II – Prevention of pollution by noxious liquid substances Discharging cargoes and the disposal of residues after cleaning should be carried out in accordance with the ship’s Procedures and Arrangements (P&A) Manual. The P&A Manual describes how the ship’s pumping and stripping system is to be operated in order to ensure that t", "a": "• Sight, in either hard copy or digital format, the P&A Manual, the list of permitted cargoes, the IBC Code and the latest edition available of the MEPC.2/Circular. • Interview the officer responsible for cargo planning and operations to verify their familiarity with the information contained in the Procedures and Arrangements Manual, Certificate o", "p": "IMO: ISM Code IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition IMO: MEPC.2/Circ.25 Provisional categorization of liquid substances in accordance with MARPOL Annex II and the IBC Code", "k": ["operations", "contained", "manual", "carriage", "circular", "engaged", "familiar", "cargo", "liquid", "procedures", "officers", "information"]},
  "8.2.4":{"ch": "8", "sec": "8.2", "s": "Chemical tank cleaning procedures.", "d": "Were the Master and deck officers familiar with the company procedures for planning and documenting cargo tank cleaning operations after the carriage of volatile and/or toxic products, and had these procedures been followed?", "o": "To ensure that tank cleaning and gas freeing operations after the carriage of volatile and/or toxic products are always carefully planned, conducted and documented.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals 12.3.2 Tank washing risk management All tank washing operations should be carefully planned and documented. The potential hazards of planned tank washing operations should be systematically identified, and risk assessed. Appropriate preventative measures should be put in place to reduce the risk to ALARP. ICS: Tanker Safety Guide ", "a": "", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. ICS: Tanker Safety Guide (Chemicals) - Fifth Edition", "k": ["company", "master", "familiar", "procedures", "products", "chemical", "officers", "operations", "documenting", "after", "carriage", "these"]},
  "8.2.5":{"ch": "8", "sec": "8.2", "s": "Chemical cargo compatibility charts.", "d": "Were the Master and deck officers familiar with the company procedures for identifying and segregating incompatible cargoes during cargo stowage planning, and had these procedures been followed?", "o": "To ensure cargo stowage is carefully planned to avoid the possibility of co-mingling of incompatible cargoes or their vapours.", "i": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 1.6.6 Incompatible Chemicals Reaction characteristics Certain groups of chemicals react with those of other groups if they come in contact with each other. Such reactions can be hazardous and result in the generation of toxic gases, heat, fire and explosion. A violent reaction can lead to an overflow and the possible rupture of a cargo tank. IBC", "a": "• • • • • Sight, and where necessary review, the company procedures for identifying and segregating incompatible cargoes during cargo stowage planning. Sight, and where necessary review, the compatibility chart in use and verify it contains the latest information. Review current and previous cargo stowage plans to verify compliance with company pro", "p": "IMO: ISM Code IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition USCG: Code of Federal Regulations. Title 46.", "k": ["company", "identifying", "master", "familiar", "procedures", "segregating", "compatibility", "during", "chemical", "officers", "charts", "stowage"]},
  "8.2.6":{"ch": "8", "sec": "8.2", "s": "Escape sets required by IBC Code.", "d": "Were there sufficient escape sets as required by the IBC Code for everyone on board, and did the sets provide suitable respiratory and eye protection?", "o": "To ensure that everyone on board is provided with a suitable emergency escape set to exit a hazardous atmosphere in case of an emergency.", "i": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 3.11.14 Emergency Escape Respiratory Protection Ships certified for the carriage of certain cargoes listed in the IBC Code are required to be provided with respiratory and eye protection sufficient for every person on board for emergency escape. Escape sets, known as emergency escape breathing devices (EEBDs), provide a supply of air for at leas", "a": "• • • Review the inspection and maintenance records for the EEBDs contained within the onboard maintenance plan. Inspect two escape sets at random. Interview a rating to verify their familiarity with the locations, purpose and operation of the escape sets provided. Expected Evidence • The inspection and maintenance records for the EEBDs contained w", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition", "k": ["protection", "provide", "suitable", "everyone", "there", "sufficient", "board", "required", "escape", "respiratory"]},
  "8.2.7":{"ch": "8", "sec": "8.2", "s": "Safety equipment required by the IBC Code.", "d": "Were the Master and officers familiar with the company procedures relating to the safety equipment required by the IBC Code, including SCBAs, and was the equipment in satisfactory condition ready for immediate use?", "o": "To ensure the safety equipment required by the IBC Code is always ready for immediate use in the event of an emergency.", "i": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 3.11.12 Self-contained breathing apparatus (SCBA) SCBA should be stowed outside hazardous areas in places that are easily accessible and should be maintained ready for immediate use. Air cylinders, including spares, should be kept fully charged and the adjusting straps kept slack so as to enable the SCBA to be quickly donned in an emergency. The", "a": "", "p": "IMO: ISM Code IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition", "k": ["company", "satisfactory", "master", "familiar", "procedures", "scbas", "officers", "relating", "required", "safety", "ready", "equipment"]},
  "8.2.8":{"ch": "8", "sec": "8.2", "s": "Protective equipment required by the IBC Code.", "d": "Were the Master and officers familiar with the company procedures addressing the protective equipment required by the IBC Code, and was this equipment in satisfactory condition and suitable for the products being handled?", "o": "To ensure crew members are protected from exposure to hazardous conditions when engaged in cargo operations.", "i": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 3.11 Personal Protective Equipment (PPE) 3.11.1 General PPE protects the wearer from exposure to hazardous working conditions by providing a barrier between the wearer and a hazardous environment. The effectiveness of that barrier will be lost if the PPE is incorrectly used or is the wrong type. It is therefore essential that the selection of PP", "a": "", "p": "IMO: ISM Code IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition", "k": ["addressing", "company", "protective", "satisfactory", "master", "familiar", "procedures", "suitable", "products", "handled", "officers", "being"]},
  "8.3.1":{"ch": "8", "sec": "8.3", "s": "Inert gas generator", "d": "Were the Master and officers familiar with the purpose, operation and testing of the inert gas generator, and had the system been operated and maintained in accordance with the manufacturer’s instructions and company procedures?", "o": "To ensure the inert gas generator always delivers inert gas in accordance with its design criteria.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.1.5.2 Inert Gas system maintenance The deck and engine departments should cooperate closely to ensure the IG system is maintained and operated properly. To demonstrate that the IG plant is fully operational and in good working order, a record of inspection of the plant, including defects and their rectification, ", "a": "• • • • Sight, and where necessary review, the company procedures for the operation, inspection, testing and maintenance of the vessel’s inert gas system which included the: o Inert gas generator o Gas regulating valve. Inspect the inert gas plant and verify that: o Where the inert gas systems and generator was contained in an enclosed room or spac", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: Inert Gas Systems", "k": ["company", "maintained", "manufacturer", "master", "familiar", "procedures", "operation", "officers", "system", "instructions", "accordance", "operated"]},
  "8.3.2":{"ch": "8", "sec": "8.3", "s": "Nitrogen generator inert gas system", "d": "Were the Master and officers familiar with the purpose, operation and testing of the nitrogen generator inert gas system, and had the system been operated and maintained in accordance with the manufacturer’s instructions and company procedures?", "o": "To ensure the nitrogen generator inert gas system always delivers inert gas in accordance with its design criteria.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.1.5.2 Inert Gas system maintenance The deck and engine departments should cooperate closely to ensure the IG system is maintained and operated properly. To demonstrate that the IG plant is fully operational and in good working order, a record of inspection of the plant, including defects and their rectification, ", "a": "• • • • • Sight, and where necessary review, the company procedures for the operation, inspection, testing and maintenance of the vessel’s inert gas system which included the nitrogen generator and its associated equipment. Inspect the nitrogen generator and its associated equipment including, where fitted: o Air and nitrogen compressor. o Feed air", "p": "IMO: ISM Code IMO SOLAS European Industrial Gases Association: Safe Installation And Operation Of PSA and Membrane Oxygen And Nitrogen Generators OCIMF/ICS: International Safety Guide for Oil Tankers ", "k": ["company", "maintained", "manufacturer", "master", "familiar", "procedures", "operation", "officers", "system", "instructions", "accordance", "nitrogen"]},
  "8.3.3":{"ch": "8", "sec": "8.3", "s": "Flue gas inert gas system", "d": "Were the Master and officers familiar with the purpose, operation and testing of the flue gas inert gas system, and had the system been operated and maintained in accordance with the manufacturer’s instructions and company procedures?", "o": "To ensure the flue gas inert gas system always delivers inert gas in accordance with its design criteria.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.1.5.2 Inert Gas system maintenance The deck and engine departments should cooperate closely to ensure the IG system is maintained and operated properly. To demonstrate that the IG plant is fully operational and in good working order, a record of inspection of the plant, including defects and their rectification, ", "a": "• • • • Sight, and where necessary review, the company procedures for the operation, inspection, testing and maintenance of the vessel’s inert gas system which included the: o Boiler uptake valves. o Scrubber. o Demister. o Blowers. o Gas regulating valve. Inspect the inert gas plant located in the machinery spaces and verify that: o Where the iner", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: FSS Code IMO: Inert Gas Systems", "k": ["company", "maintained", "manufacturer", "master", "familiar", "procedures", "operation", "officers", "system", "instructions", "accordance", "operated"]},
  "8.3.4":{"ch": "8", "sec": "8.3", "s": "Cargo tank high level and overfill alarms.", "d": "Were the Master and officers familiar with the company procedures for the maintenance, testing and setting of the cargo tank high-level and high-high-level alarms, and were these alarm systems fully operational and properly set?", "o": "To ensure that cargo tank high-level and high-high-level alarms are always fully operational, properly set and used during all cargo loading, discharging and transfer operations.", "i": "USCG: Code of Federal Regulations. Title 46. 46 CFR § 39.2007 - Tankship liquid overfill protection - T/ALL. (a) Each cargo tank of a tankship must be equipped with an intrinsically safe high-level alarm and a tank overfill alarm. (b) If installed after July 23, 1990, the high-level alarm and tank overfill alarm required by paragraph (a) of this section must - • • • • Be independent of each other.", "a": "Page 70 of 579 – SIRE 2.0 Question Library Part 2 – Version 1.0 (January 2022) • • • • • • Sight, and where necessary review, the company procedures for the maintenance, setting and testing of the cargo tank high-level and high-high-level alarm systems. Review the records of testing and maintenance of the cargo tank high-level and high-high-level a", "p": "USCG: Code of Federal Regulations. Title 46. ICS: Tanker Safety Guide (Chemicals) - Fifth Edition IMO: ISM Code IMO SOLAS IMO: IBC Code", "k": ["company", "master", "familiar", "procedures", "maintenance", "level", "setting", "fully", "officers", "properly", "overfill", "these"]},
  "8.3.5":{"ch": "8", "sec": "8.3", "s": "Gauging and sampling static accumulator cargo in non-inerted tanks.", "d": "Were the Master, deck officers and deck ratings familiar with the company procedures for dipping, ullaging and sampling flammable static accumulator cargoes in non-inerted tanks, and were these procedures being followed?", "o": "To ensure that the required additional precautions are taken when dipping, ullaging and sampling flammable static accumulator cargoes in non-inerted tanks.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals 3.2 General precautions against electrostatic hazards 3.2.1 Overview The safest way to protect from electrostatic risks is to conduct operations with tanks protected by IG. However, if a flammable atmosphere might be present, the following measures should be taken to prevent electrostatic hazards: • • Bond metal objects to the met", "a": "• • • • • • Sight, and where necessary review, the company procedures for dipping, ullaging and sampling flammable static accumulator cargoes in non-inerted tanks. If the vessel is fitted with a fixed tank level gauging system but is not fitted with IG and not fitted with full depth sounding pipes, the operator's procedure to be followed in the eve", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "accumulator", "dipping", "sampling", "being", "these", "gauging", "familiar", "cargoes", "cargo", "ullaging", "flammable"]},
  "8.3.6":{"ch": "8", "sec": "8.3", "s": "Loading static accumulator cargo into non-inerted tanks.", "d": "Were the Master and deck officers familiar with the company procedures for loading flammable static accumulator cargoes into non-inerted tanks, and were these procedures being followed?", "o": "To ensure suitable precautions are always taken when flammable static accumulator cargoes are loaded into non-inerted tanks.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 3.1.4.3 Conductivity Liquid non-conductors have conductivities of less than 50 pS/m (picoSiemens/metre). Such liquids are often referred to as static accumulators. Petroleum products, e.g. clean oils (distillates) including some low sulphur bunker fuels, frequently fall into this category with typical conductivitie", "a": "• • • Sight, and where necessary review the company procedures for loading flammable static accumulator cargoes into non-inerted tanks. Observe loading taking place, if possible. Review cargo log books and records to verify compliance with company procedures.", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "accumulator", "master", "familiar", "procedures", "flammable", "static", "officers", "cargoes", "inerted", "these", "tanks"]},
  "8.3.7":{"ch": "8", "sec": "8.3", "s": "IGS oxygen analyser", "d": "Were the Master and officers familiar with the purpose, operation and calibration of the inert gas system fixed oxygen analyser, and had the equipment been operated, maintained and calibrated in accordance with the manufacturer’s instructions and company procedures?", "o": "To ensure the inert gas system always delivers inert gas with an oxygen content of not more than 5% by volume to the cargo tanks at any rate of flow.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.1.6 Use during cargo tank operations Before the IG system is operated the tests required by the operations manual or the manufacturer’s instructions should be carried out. The fixed oxygen analyser and recorder should be tested and proved to be in good order. Portable oxygen and hydrocarbon meters should also be ", "a": "• • • • • • Sight, and where necessary review, the company procedures for the operation, inspection, testing and maintenance of the vessel’s inert gas system which included the fixed oxygen analyser. Inspect the fixed oxygen analyser including the fixed zero and/or span calibration arrangements. Verify that the local reading at the fixed oxygen ana", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: FSS Code IMO: Inert Gas Systems", "k": ["company", "calibrated", "operated", "inert", "purpose", "familiar", "operation", "system", "procedures", "officers", "equipment", "accordance"]},
  "8.3.8":{"ch": "8", "sec": "8.3", "s": "Oil and Chemical Tanker ESD and/or cargo pump emergency stop controls.", "d": "Were the Master, officers and ratings familiar with the cargo system Emergency Shutdown (ESD) system, where fitted, and/or the cargo pump emergency stop controls, and was there evidence that the systems and equipment had been tested in accordance with company procedures?", "o": "To ensure that the cargo handling system or individual cargo pumps will be brought to a safe, static condition, either automatically or manually, in abnormal circumstances.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 12.1.6.3 Emergency Shutdown Plan The ship and the terminal should have agreed an Emergency Shutdown (ESD) procedure and alarm and recorded it on an appropriate form. This agreement sets out those circumstances when operations should stop immediately. It also accounts for the possible dangers of a pressure surge cau", "a": "• • Sight, and where necessary review, the procedures which described the operation and testing of ESD systems and/or cargo pump emergency stop controls. Review the most recent records for the testing of: o The ESD system, where fitted. o The automated cargo pump shut down systems and associated sensors, where fitted. o The individual cargo pump em", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. USCG: Code of Federal Regulations. Title 33.", "k": ["company", "familiar", "shutdown", "system", "cargo", "procedures", "chemical", "tanker", "officers", "there", "fitted", "equipment"]},
  "8.3.9":{"ch": "8", "sec": "8.3", "s": "Pressure testing and inspection of cargo, inert gas and vapour pipelines.", "d": "Were the Master and officers familiar with the company procedures for the inspection and testing of cargo, vapour and inert gas pipelines, and were records available for these activities?", "o": "To ensure cargo, vapour and inert gas pipelines are regularly examined, and pressure tested when required, to verify their condition.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.3.2 Cargo and ballast system integrity Any latent defect in the cargo system will usually reveal itself when the system is pressurised during the discharge operation. It is good practice to pressure test cargo lines on a periodic basis, depending on the trade of the ship. Although these pressure tests may provide", "a": "• • • • • Sight, and where necessary review, the company procedures for the inspection and testing of cargo, vapour and inert gas pipelines. Review the records of the inspection and testing of cargo, vapour and inert gas pipelines and verify that: o The MAWP of the cargo transfer system had been determined and documented. o Each pipeline had been v", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. USCG: Code of Federal Regulations. Title 33. USCG: Code of Federal Regulations. Title 46. USCG: Marine Safety Manual", "k": ["company", "vapour", "master", "familiar", "procedures", "records", "pressure", "officers", "available", "these", "inert", "pipelines"]},
  "8.3.10":{"ch": "8", "sec": "8.3", "s": "Vapour collection system.", "d": "Were the Master and officers familiar with the company procedures for the inspection, testing and operation of the vapour collection system, and was this equipment in satisfactory condition?", "o": "To ensure that the vapour collection system is in satisfactory condition and operated correctly when required.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 11.5 Vapour recovery systems Vapour recovery systems fall into two categories: • • Those systems conforming to IMO guidelines that provide a system for returning cargo vapours to the shore for reclaiming or incinerating. These are known as VECS (see section 23.7.7) Proprietary systems for recovering petroleum liqui", "a": "• • • • • • Sight, and where necessary review, the company procedures for the inspection, testing and operation of the vapour collection system. Review, if available, the records of cargo operations, including tank pressures, where the vapour control system had been used. Review, where necessary, vapour collection system training/familiarisation re", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: MARPOL ICS: Tanker Safety Guide (Chemicals) - Fifth Edition IMO: MSC/Circ.585 Standards for vapou", "k": ["company", "satisfactory", "vapour", "master", "familiar", "procedures", "operation", "officers", "collection", "system", "equipment", "condition"]},
  "8.3.11":{"ch": "8", "sec": "8.3", "s": "Oil and chemical tank cleaning in non-inert tanks.", "d": "Were the Master, deck officers and deck ratings familiar with the company procedures for cargo tank washing after the carriage of volatile products in a non-inert atmosphere, and had these procedures been followed?", "o": "To ensure that tank washing operations after the carriage of volatile products in a non-inert atmosphere are always conducted safely, and in accordance with the recommendations of ISGOTT6.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. Reference should always be made to the full text of ISGOTT6 Section 12.3 Tank Cleaning. Edited extracts below are for reference only and are not exhaustive. 12.3.5.2 Washing in a non-inert atmosphere Non-inert cargo tank washing should only be done when both the source of ignition and the flammability of the tank a", "a": "• • • • • • Sight, and where necessary review, the company procedures for cargo tank washing after the carriage of volatile products in a non-inert atmosphere. Review available tank cleaning plans, risk assessments, log books and records to verify compliance with company procedures. Review records of electrical continuity testing of portable tank c", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "atmosphere", "carriage", "these", "inert", "familiar", "cargo", "procedures", "chemical", "officers", "after", "tanks"]},
  "8.3.12":{"ch": "8", "sec": "8.3", "s": "Portable ullage/temperature/interface (UTI) measurement and sampling equipment.", "d": "Were the Master and officers familiar with the company procedures for the use of portable cargo ullage/temperature/interface (UTI) measurement and sampling equipment, and was the equipment in satisfactory condition and used in accordance with the company procedures?", "o": "To ensure that portable UTI and sampling equipment is always used in accordance with international regulations and industry best practice.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Chapter 3 Static Electricity The main precaution for ships against electrostatic risks is to conduct operations with the tanks protected by IG. For tanks that are not protected by IG, section 3.2 describes, in general terms, precautions against electrostatic hazards during operations... 3.2.2 Bonding The most important countermea", "a": "• • • • • Sight, and where necessary review the company procedures describing the use, operation, testing, calibration and servicing of the of portable cargo ullage/temperature/interface (UTI) measurement and sampling equipment Review the service and calibration records for each portable cargo UTI measurement unit carried. Where necessary review th", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "satisfactory", "master", "familiar", "procedures", "ullage", "interface", "officers", "sampling", "measurement", "temperature", "portable"]},
  "8.3.13":{"ch": "8", "sec": "8.3", "s": "Secondary venting systems.", "d": "Were the Master and officers familiar with the company procedures for the operation of the primary and secondary cargo tank venting systems in accordance with SOLAS, and were these systems correctly set?", "o": "To ensure cargo tanks are always protected from over or under pressurisation in the event of inappropriate use of the ventilation system or a failure of a primary protection device.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.1.8.3 Full flow Pressure/Vacuum venting arrangements Protection from over or under pressurisation of the cargo tanks may be provided by installing, on each tank, full flow P/V valves rated at 125% of the maximum loading/discharge rate. Where the mast riser is the primary vent, the P/V valve may act as the seconda", "a": "", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition", "k": ["company", "venting", "master", "familiar", "procedures", "correctly", "operation", "officers", "secondary", "solas", "systems", "these"]},
  "8.3.14":{"ch": "8", "sec": "8.3", "s": "Cargo tank venting systems.", "d": "Were the Master and officers familiar with the company procedures for the operation, inspection, testing and maintenance of the cargo tank venting systems, and were the systems in satisfactory condition?", "o": "To ensure that cargo tank venting systems are maintained in satisfactory condition and operated correctly.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.1.8 Cargo tank protection against over/under pressure. Serious accidents have occurred on oil tankers as a result of cargo tanks being severely over or under pressure. Although SOLAS regulations have been modified to require tanks to be fitted with pressure monitors and safety devices, it is still essential that ", "a": "Page 109 of 579 – SIRE 2.0 Question Library Part 2 – Version 1.0 (January 2022) • • • • • • Sight, and where necessary review, the company procedures for the operation, inspection, testing and maintenance of the cargo tank venting systems. Review the records of inspection, maintenance and pre-operational tests of P/V valves and/or high velocity ven", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: Inert Gas Systems", "k": ["company", "venting", "satisfactory", "master", "familiar", "procedures", "maintenance", "operation", "officers", "systems", "condition", "cargo"]},
  "8.3.15":{"ch": "8", "sec": "8.3", "s": "Deepwell pump cofferdam purging.", "d": "Were the Master and officers familiar with the company procedures for monitoring leakage into the cofferdams of deepwell pumps, and had regular purging of the cofferdams taken place to identify any excessive leakage?", "o": "To ensure the vessel’s deep well pumps are always in full operational condition.", "i": "ICS: Tanker Safety Guide (Chemicals) Fifth Edition 5.5.2 Deepwell pumps …The pump’s cofferdam should be purged regularly to allow checking for any signs of leakage past the shaft seals that protect the cofferdam. TMSA KPI 4.1.1 requires that each vessel in the fleet is covered by a planned maintenance system and spare parts inventory which reflects the company’s maintenance strategy. The company i", "a": "• • Sight, and where necessary review, the company procedures for monitoring leakage into the cofferdams of deepwell pumps. Review the records of purging of the deepwell pump cofferdams. • While inspecting a deepwell pump, interview the accompanying officer to verify their familiarity with: o The company procedures for monitoring leakage into the c", "p": "IMO: ISM Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition", "k": ["company", "deepwell", "master", "familiar", "procedures", "taken", "pumps", "purging", "officers", "identify", "place", "excessive"]},
  "8.3.16":{"ch": "8", "sec": "8.3", "s": "Inert gas system non-return devices", "d": "Were the Master and officers familiar with the purpose, operation, testing and maintenance of the non-return devices installed in the inert gas system, and were these devices in satisfactory condition?", "o": "To ensure the devices installed in the inert gas system to prevent the return of vapour and liquid to the inert gas plant, or to any gas-safe spaces, function correctly.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.1.5.2 Inert gas system maintenance The deck and engine departments should cooperate closely to ensure the IG system is maintained and operated properly. It is important to make sure that non-return barriers function correctly, especially the deck water seal or block and bleed valves, so that there is no possibili", "a": "• • • • • • Sight, and where necessary review, the company procedures for the operation, inspection, testing and maintenance of the inert gas system which included the: o deck seal or double block and bleed arrangement o non-return valve Inspect the IG main non-return valve and verify it had been opened and inspected as required by company procedur", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: FSS Code IMO: Inert Gas Systems", "k": ["satisfactory", "master", "familiar", "maintenance", "operation", "officers", "condition", "these", "return", "system", "installed", "devices"]},
  "8.3.17":{"ch": "8", "sec": "8.3", "s": "Manifold reducers and spool pieces.", "d": "Were the Master and officers familiar with the company procedures for the use, inspection and testing of manifold reducers, spool pieces and other portable pipework, and were these items in satisfactory condition and properly fitted when in use?", "o": "To ensure manifold reducers, spool pieces and other items of portable pipework meet the required pressure rating for the cargo transfer system and will not leak at the flange face when used.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 23.6.3 Reducers and spool pieces Reducers and spool pieces should be made of steel and be fitted with flanges that conform to the American Society of Mechanical Engineers (ASME) Standard B16.5, Class 150 or equivalent (see OCIMF/CDI’s Recommendation for Oil and Chemical Tanker Manifolds and Associated Equipment). Al", "a": "• • • • • • Sight, and where necessary review, the company procedures for the use, inspection and testing of manifold reducers, spool pieces and other portable pipework. Review the inventory of manifold reducers, spool pieces and other portable pipework. Review the records of inspection and testing of manifold reducers, spool pieces and other porta", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. ICS: Tanker Safety Guide (Chemicals) - Fifth Edition OCIMF/CDI: Recommendations for Oil and Chemical Tanker Manifold", "k": ["company", "properly", "these", "other", "manifold", "pieces", "satisfactory", "familiar", "condition", "inspection", "spool", "procedures"]},
  "8.3.18":{"ch": "8", "sec": "8.3", "s": "Inert gas system pressure/vacuum-breaking (P/V) device(s)", "d": "Were the Master and officers familiar with the purpose, operation, testing and maintenance of the pressure/vacuum-breaking (P/V) device(s) installed in the inert gas main, and was this device(s) in satisfactory condition?", "o": "To ensure cargo tanks are not subject to excessive pressure or vacuum should the inert gas system fail or where the venting system is used inappropriately.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.1.8.1 Pressure/Vacuum breakers P/V breakers are usually liquid filled and it is important that the correct density liquid is used, and the appropriate level maintained. The P/V breakers should be marked with their High Pressure (HP) and vacuum opening pressures, the date of the last inspection, the type of anti-f", "a": "• • • • • Sight, and where necessary review, the company procedures for the operation, inspection, testing and maintenance of the inert gas system which included the pressure/vacuum-breaking devices. Inspect the P/V breaker(s) and verify that it is marked with the: o Design pressure and vacuum opening settings. o Date of the last inspection. o Type", "p": "IMO: ISM Code IMO SOLAS", "k": ["satisfactory", "master", "familiar", "maintenance", "installed", "vacuum", "operation", "officers", "device", "inert", "system", "breaking"]},
  "8.3.19":{"ch": "8", "sec": "8.3", "s": "Indicators and alarms for the inert gas system", "d": "Were the Master and officers familiar with the purpose, operation and testing of the indicators and alarms in the inert gas system, and had the equipment been operated, maintained and calibrated in accordance with the manufacturer’s instructions and company procedures?", "o": "To ensure the inert gas system always delivers inert gas in accordance with its design criteria.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition ISGOTT Checks pre-arrival Ship/Shore Safety Checklist Part 1B. Tanker: checks pre-arrival if using an inert gas system IMO: FSS Code Chapter 15 2.2.4 Indicators and alarms 2.2.4.1 The operation status of the inert gas system shall be indicated in a control panel. 2.2.4.2 Instrumentation shall be fitted for continuou", "a": "", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: FSS Code", "k": ["company", "calibrated", "operated", "inert", "purpose", "familiar", "testing", "operation", "system", "alarms", "procedures", "indicators"]},
  "8.3.20":{"ch": "8", "sec": "8.3", "s": "Connections and interconnections to/with the inert gas system piping", "d": "Were the Master and officers familiar with the purpose and operation of the connections and interconnections to the inert gas system for routine and emergency inert gas operations, and were these arrangements in satisfactory condition and clearly identified as to their purpose?", "o": "To ensure the Master and officers are familiar with the location and use of connections to, and interconnections with, the inert gas system, which may include: • • • • Connections for the emergency supply of inert gas from an external source. Connect", "i": "IMO: FSS Code Chapter 15 2.2.3.2.6 Arrangements shall be provided to enable the inert gas main to be connected to an external supply of inert gas. The arrangements shall consist of a 250 mm nominal pipe size bolted flange, isolated from the inert gas main by a valve and located forward of the non-return valve referred to in paragraph 2.3.1.4.3. The design of the flange should conform to the approp", "a": "• • • • Sight, and where necessary review, the company procedures for the operation, inspection and maintenance of the vessel’s inert gas system. which included the arrangements for the: o Supply of inert gas to the double-hull spaces in an emergency. o External supply of inert gas in the event of a failure of the vessel’s inert gas system. o Conne", "p": "IMO SOLAS IMO: FSS Code IMO: Inert Gas Systems IACS UI SC 272 Inert gas supply to double-hull spaces (SOLAS II-2/4.5.5.1)", "k": ["routine", "interconnections", "operations", "these", "inert", "purpose", "satisfactory", "familiar", "operation", "clearly", "system", "condition"]},
  "8.3.21":{"ch": "8", "sec": "8.3", "s": "Cargo heating system", "d": "Were the Master and officers familiar with the company procedure for cargo heating, and was the cargo heating system in satisfactory condition and tested and used in accordance with the company procedure?", "o": "To ensure cargo heating is always conducted in accordance with international regulations, industry guidance and within the design criteria of the vessel and its fittings.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 12.1.11.1 Loading heated products Unless the ship is specially designed to carry very hot cargoes, such as bitumen, high temperature cargoes can damage a tanker’s structure, the cargo tank coatings and equipment such as valves, pumps and gaskets. Some Classification Societies have rules on the maximum loading tempe", "a": "• • • • Sight, and where necessary review, the company procedures describing the operation, testing and maintenance of the cargo heating system. Inspect the cargo heating system including the: o Heating coil manifolds and associated pipework, where fitted. o Deck mounted heat exchangers and associated pipe work, where fitted. o Observation tank or ", "p": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IBC Code", "k": ["company", "satisfactory", "master", "familiar", "officers", "tested", "procedure", "heating", "system", "condition", "accordance", "cargo"]},
  "8.3.22":{"ch": "8", "sec": "8.3", "s": "Cargo doping and additives.", "d": "Were the Master and officers familiar with the company procedures for managing on-board doping operations, and had these procedures been complied with?", "o": "To ensure on-board doping operations are properly planned, risk assessed and performed safely.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals 12.1.6.16 Doping and additives: anti-static, inhibitors, dyes, hydrogen sulphide knockdown Doping is when cargoes are treated with small quantities of specialised additives and fluids, such as dyes, liquid markers, anti-static agents and lubricants, during loading or before leaving port. As far as possible, doping should be carrie", "a": "• • • • • • Sight, and where necessary review, the company procedures for managing on-board doping operations. Review records of current and/or past doping operations. If doping operations are taking place during the inspection, observe the operation including the method of doping used, supervision by ship’s crew, use of PPE and anti-static precaut", "p": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["complied", "company", "master", "familiar", "procedures", "officers", "operations", "board", "managing", "these", "additives", "cargo"]},
  "8.3.23":{"ch": "8", "sec": "8.3", "s": "Cargo tank temperature monitoring systems.", "d": "Were the Master and officers familiar with the company procedures for the maintenance, testing and calibration of the cargo temperature monitoring equipment, and was the equipment in satisfactory condition?", "o": "To ensure the cargo temperature monitoring equipment is maintained in full operational condition.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. 12.8.5 Closed gauging for custody transfer Temperatures can be taken using electronic thermometers inserted through the tank’s vapour locks. The thermometers should also be calibrated and have the appropriate approval certificates 12.8.6 Cargo tank monitoring systems Tank monitoring systems often have multiple functions, such as ", "a": "• Sight, and where necessary review the company procedures for the maintenance, testing and calibration of the cargo temperature monitoring equipment.", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition", "k": ["company", "satisfactory", "master", "familiar", "procedures", "maintenance", "officers", "calibration", "temperature", "systems", "equipment", "condition"]},
  "8.3.24":{"ch": "8", "sec": "8.3", "s": "Cargo manifold arrangements.", "d": "Were the Master and officers familiar with the company procedures for managing cargo and vapour connections at the cargo manifolds, and were the manifold arrangements in satisfactory condition?", "o": "To ensure that cargo and vapour manifolds are always properly connected and monitored throughout cargo transfer operations.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 9.9.1 Manifold platform Sometimes this platform is higher than two metres and may not have edge protection. Where fitted, edge protection may be temporarily removed to allow hose connection. The risk of falling from height means adequate safety precautions are needed. 18.1.8 Precautions when connecting and disconnec", "a": "", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition OCIMF/CDI: Recommendations for Oil ", "k": ["company", "satisfactory", "vapour", "master", "familiar", "procedures", "manifolds", "officers", "arrangements", "managing", "connections", "condition"]},
  "8.3.25":{"ch": "8", "sec": "8.3", "s": "Receiving nitrogen from shore", "d": "Were the Master and deck officers familiar with the company procedures for receiving nitrogen from shore for operations such as inerting, purging or padding cargo tank, or for clearing cargo lines?", "o": "To ensure cargo tanks are not over pressurised, possibly resulting in serious deformation or catastrophic failure of the tank structure.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 12.1.14.5 Clearing hoses and marine loading arms to the ship Do not clear hoses and loading arms to the ship using compressed air because of the risks of: • • • • Static charge generation. Compromising IG quality. Over pressurisation of tanks or pipelines. Oil mists coming from tank vents. 12.1.14.8 Receiving nitrog", "a": "• • • Sight, and where necessary review, the company procedures which described the procedure for receiving nitrogen from the shore for operations such as inerting or purging tanks, for padding cargo tanks or to clear lines. Review the records and completed risk assessments for at least one operation where nitrogen had been received from shore with", "p": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. CDI: Best Practice Recommendations Rega", "k": ["receiving", "company", "padding", "master", "familiar", "procedures", "purging", "officers", "operations", "shore", "clearing", "nitrogen"]},
  "8.4.1":{"ch": "8", "sec": "8.4", "s": "Carriage of inhibited cargoes.", "d": "Were the Master and officers familiar with the company procedures that addressed the carriage of inhibited cargoes, and had these procedures been followed?", "o": "To ensure that inhibited cargoes are carried safely and in compliance with company procedures and the IGC Code.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition 1.4.1 Self-reaction Some liquefied gas cargoes may react with themselves and may form solids. The most common form of self-reaction is polymerisation which may be initiated by the presence of small quantities of other cargoes or by certain metals. Polymerisation normally produces heat which may then accelerate self-reaction and contamination of the ca", "a": "• • • Sight, and where necessary review, the company procedures that addressed the carriage of inhibited cargoes. Review cargo operation logbooks and records, inhibited cargo certificates and contingency plans in the event of uncontrolled polymerisation. Interview the officer responsible for cargo planning to verify their familiarity with company p", "p": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IGC Code ICS", "k": ["company", "master", "familiar", "procedures", "officers", "addressed", "cargoes", "carriage", "these", "inhibited", "followed"]},
  "8.4.2":{"ch": "8", "sec": "8.4", "s": "Cargo sampling", "d": "Were the Master and officers familiar with the company procedures for carrying out cargo sampling operations?", "o": "To ensure LPG cargo sampling operations are performed safely.", "i": "ICS: Tanker Safety Guide (Liquefied Gas) 3rd Edition 6.19.2 Liquid Samples The following precaution should be taken when sampling cargo liquid or vapour. Reference should also be made to the guidance contained in SIGTTO: Liquefied Petroleum Gas Sampling Procedures First Edition 2010. The responsible officer should be present when any cargo sampling is carried out. The officer should be familiar wi", "a": "", "p": "IMO: MSC.1/Circ.1625 Unified Interpretation of the IGC Code. IMO: ISM Code IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition SIGTTO: Liquefied Petroleum Gas Sampling Procedures First Editio", "k": ["company", "master", "familiar", "procedures", "officers", "operations", "sampling", "cargo", "carrying"]},
  "8.4.3":{"ch": "8", "sec": "8.4", "s": "Segregating incompatible cargoes and refrigerants", "d": "Were the Master and officers familiar with the company procedures for identifying and segregating incompatible cargoes and refrigerants during cargo stowage planning, and had these procedures been followed?", "o": "To ensure cargo stowage is carefully planned to avoid the co-mingling of incompatible cargoes and refrigerants.", "i": "ICS: Tanker Safety Guide (Liquefied Gas) 3rd Edition 6.13 Separation of Cargoes When common pipeline systems are provided for various cargo-related operations, risk of contamination exists when different grades of cargo are carried simultaneously. If separation is needed to avoid cargo contamination, shipper’s instructions and regulatory requirements should be observed. If a common piping system h", "a": "• • • • • Sight and where necessary, review the company procedures for identifying and segregating incompatible cargoes and refrigerants during cargo stowage planning. Sight and where necessary, review the compatibility chart in use and any other available data. Review current and previous cargo stowage plans and supporting documents to verify comp", "p": "USCG: Code of Federal Regulations. Title 46. ICS: Tanker Safety Guide (Gas) - Third Edition IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edit", "k": ["company", "refrigerants", "identifying", "master", "familiar", "procedures", "segregating", "during", "officers", "stowage", "cargoes", "these"]},
  "8.4.4":{"ch": "8", "sec": "8.4", "s": "Carriage of propylene oxide (PO) and/or ethylene oxide (EO)", "d": "Were the Master and officers familiar with the company procedures for the safe carriage of propylene oxide (PO), ethylene oxide (EO) and PO-EO mixtures?", "o": "To ensure the safe carriage of propylene oxide (PO), ethylene oxide (EO) and PO-EO mixtures.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 2.2 The Chemical Gases Some non-hydrocarbon cargoes are carried on gas carriers, usually referred to as chemical gases, and their properties vary considerably. As these cargoes can be toxic, appropriate personal protective equipment (PPE) will be used when handling them and information on what PPE is required will", "a": "", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "master", "familiar", "procedures", "officers", "oxide", "carriage", "propylene", "ethylene", "mixtures"]},
  "8.4.5":{"ch": "8", "sec": "8.4", "s": "Escape sets as required by the IGC Code", "d": "Were there sufficient escape sets as required by the IGC Code for everyone on board, and did the sets provide suitable respiratory and eye protection?", "o": "To ensure that everyone on board is provided with a suitable emergency escape set to exit a hazardous atmosphere in case of an emergency.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition 3.11.5 Breathing Apparatus Ships carrying toxic cargoes are provided with sets of small breathing apparatus supplying air for approximately 15 minutes. This equipment is for emergency escape only and should not be used for other purposes. OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 10.13.3 Emergency Escape Breath", "a": "• • • Review the inspection and maintenance records for the EEBDs contained within the onboard maintenance plan. Inspect two escape sets at random. Interview a rating at random to verify their familiarity with the locations, purpose and operation of the escape sets provided. Expected Evidence", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["protection", "provide", "suitable", "everyone", "there", "sufficient", "board", "required", "escape", "respiratory"]},
  "8.4.6":{"ch": "8", "sec": "8.4", "s": "Cargo tank insulation", "d": "Were the Master and officers familiar with the company procedures for the inspection and maintenance of the cargo tank insulation, and was the insulation reported to be in good condition?", "o": "To ensure the cargo tank insulation is properly inspected and maintained.", "i": "IACS: Requirements Concerning Gas Tankers G1.8 Insulation G1.8.1 When liquified gas is carried at a temperature below –10°C, suitable insulation is to be provided to ensure that the minimum temperature of the hull structure does not fall below the minimum allowable service temperature given for the concerned grade of steel in W1 when the cargo tanks are at their design temperature and the ambient ", "a": "• • • • Sight, and where necessary review the company procedures for the inspection and maintenance of the cargo tank insulation. Review the: o Records of inspection of the cargo tank insulation. o Records of maintenance and repair of the cargo tank insulation. Where defects to the cargo tank insulation had been noted within an inspection report, v", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. IACS: Requirements Concerning Gas Tankers SIGTTO: Liquefied Gas Fire Hazard Management.", "k": ["company", "master", "familiar", "procedures", "maintenance", "officers", "insulation", "reported", "condition", "cargo", "inspection"]},
  "8.4.7":{"ch": "8", "sec": "8.4", "s": "Vent outlet protection screens or flame screens", "d": "Were the vent outlets from the cargo containment system fitted with the correct protection screen or flame screen required for the cargo being carried, and were the screens in satisfactory condition?", "o": "To ensure that the correct protection or flame screens are fitted to vent outlets in accordance with the cargo being carried, and that these screens are in satisfactory condition.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition 5.9.2 Vent Mast Protection Screens and Flame Screens The IGC Code requires specific vent mast protection screens and flame screens to be used when carrying particular cargoes: When carrying cargoes other than MARPOL Annex II Noxious Liquid Substances (NLS), cargo vent mast outlets are required to be fitted with a coarse protection screen (up to 13mm s", "a": "• • Verify from cargo records and/or maintenance plans that vent outlets from the cargo containment system are fitted with the correct flame screen or protection screen for the cargo being carried, and that these are in satisfactory condition. If flame screens or protection screens are available on board but not currently fitted, inspect the storag", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["outlets", "protection", "satisfactory", "screen", "carried", "screens", "correct", "outlet", "being", "fitted", "flame", "system"]},
  "8.5.1":{"ch": "8", "sec": "8.5", "s": "Custody transfer measurement system (CTMS)", "d": "Were the Master and officers familiar with the company procedures for the operation, testing and calibration of the custody transfer measurement system (CTMS), and was the system in satisfactory condition?", "o": "To ensure the vessel is able to measure the quantity of energy loaded from production facilities, unloaded to a receiving terminal, or transferred to another LNG carrier during ship-to-ship operations.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition 6.20 Custody Transfer Measurement Systems Cargo measurement is generally handled by the custody transfer measurement system (CTMS). The CTMS takes readings from the cargo level gauging system, together with measurements of cargo temperature, pressure and vessel trim and list, and calculates the volume of cargo on board, together with average cargo liq", "a": "", "p": "ICS: Tanker Safety Guide (Gas) - Third Edition GIIGNL: LNG Custody transfer handbook 6th edition", "k": ["company", "satisfactory", "master", "familiar", "procedures", "custody", "operation", "officers", "calibration", "measurement", "system", "condition"]},
