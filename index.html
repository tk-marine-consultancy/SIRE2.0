          <div style={{textAlign:"center",padding:24,color:"#64748b"}}>
            <div style={{fontSize:36,marginBottom:10}}>📂</div>
            <div style={{fontSize:13,marginBottom:4}}>No saved reports yet</div>
            <div style={{fontSize:11,marginBottom:16}}>Generate a report in the Report tab to save it here automatically.</div>
            <Btn onClick={()=>setTab("builder")} style={{width:"auto",padding:"10px 20px"}}>Go to Report Builder</Btn>
          </div>
        </Card>
      ):(
        <>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>{history.length} report{history.length!==1?"s":""} saved</div>
          {history.map(h=>(
            <Card key={h.id} style={{borderColor:selected===h.id?"#0ea5e9":"#1e3a5f"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:"#0ea5e9",marginBottom:3}}>
                    {h.company} · {new Date(h.savedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}
                  </div>
                  <div style={{fontSize:12,color:"#e2e8f0",marginBottom:3,lineHeight:1.5}}>
                    {h.obs}{h.obs?.length>=120?"…":""}
                  </div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {h.pif&&<span style={{fontSize:9,background:"rgba(14,165,233,.15)",color:"#0ea5e9",padding:"2px 6px",borderRadius:4}}>{h.pif}</span>}
                    {h.ch&&<span style={{fontSize:9,background:"rgba(34,197,94,.1)",color:"#22c55e",padding:"2px 6px",borderRadius:4}}>{h.ch}</span>}
                  </div>
                </div>
                <button onClick={()=>{delHistory(h.id);reload();}} style={{background:"none",border:"1px solid #dc262640",color:"#dc2626",padding:"5px 8px",borderRadius:6,cursor:"pointer",fontSize:11,marginLeft:8,whiteSpace:"nowrap"}}>🗑 Delete</button>
              </div>

              {selected===h.id?(
                <div className="fade">
                  {/* Mini report preview */}
                  {[
                    {label:"OBSERVATION",val:h.rpt?.observation_summary},
                    {label:"PRIMARY PIF",val:h.rpt?.primary_pif},
                    {label:"CORRECTION",val:h.rpt?.correction?.immediate_action},
                    {label:"ROOT CAUSE",val:h.rpt?.corrective_action?.root_cause},
                    {label:"SMS REVISION",val:h.rpt?.preventive_action?.sms_revision},
                    {label:"TMSA",val:h.rpt?.tmsa_reference},
                  ].map(({label,val})=>val?(
                    <div key={label} style={{marginBottom:8}}>
                      <div style={{fontSize:9,color:"#64748b",letterSpacing:2,marginBottom:2}}>{label}</div>
                      <div style={{fontSize:12,color:"#e2e8f0",lineHeight:1.5,borderLeft:"2px solid #1e3a5f",paddingLeft:8}}>{val}</div>
                    </div>
                  ):null)}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
                    <button onClick={()=>setSelected(null)} style={{background:"#1e3a5f",color:"#94a3b8",border:"1px solid #1e3a5f",padding:"8px",borderRadius:6,cursor:"pointer",fontSize:11}}>
                      ▲ Collapse
                    </button>
                    <button onClick={()=>{
                      // Copy full report text
                      const r=h.rpt;
                      const txt=[
                        `SIRE 2.0 RECTIFICATION REPORT — ${r.company}`,
                        `Date: ${new Date(h.savedAt).toLocaleDateString("en-GB")}`,
                        "=".repeat(50),
                        `OBSERVATION:\n${r.observation_summary}`,
                        `PRIMARY PIF: ${r.primary_pif}`,
                        "",
                        "LAYER 1 — CORRECTION:",
                        r.correction?.immediate_action,
                        `Officer: ${r.correction?.responsible_officer} | ${r.correction?.completion_timeframe}`,
                        "",
                        "LAYER 2 — CORRECTIVE ACTION:",
                        `Root Cause: ${r.corrective_action?.root_cause}`,
                        `PIF Analysis: ${r.corrective_action?.pif_analysis}`,
                        `SMS Gap: ${r.corrective_action?.sms_gap_identified}`,
                        "",
                        "LAYER 3 — PREVENTIVE ACTION:",
                        `SMS Revision: ${r.preventive_action?.sms_revision}`,
                        `Training: ${r.preventive_action?.training_action}`,
                        `Fleet-wide: ${r.preventive_action?.horizontal_deployment}`,
                        `Mgmt Review: ${r.preventive_action?.management_review}`,
                        `KPI: ${r.preventive_action?.kpi_monitoring}`,
                        "",
                        `TMSA: ${r.tmsa_reference}`,
                      ].filter(Boolean).join("\n");
                      navigator.clipboard.writeText(txt);
                      alert("Report copied to clipboard.");
                    }} style={{background:"#0ea5e9",color:"#fff",border:"none",padding:"8px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:"bold"}}>
                      📋 Copy Report
                    </button>
                  </div>
                </div>
              ):(
                <button onClick={()=>setSelected(h.id)} style={{width:"100%",background:"rgba(14,165,233,.08)",border:"1px solid #0ea5e9",color:"#0ea5e9",padding:"8px",borderRadius:6,cursor:"pointer",fontSize:11}}>
                  📋 View Report
                </button>
              )}
            </Card>
          ))}

          <Card style={{borderColor:"#dc262640"}}>
            <div style={{fontSize:11,color:"#dc2626",marginBottom:8}}>⚠️ Clear All History</div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>Permanently delete all {history.length} saved reports.</div>
            <button onClick={()=>{
              if(window.confirm(`Delete all ${history.length} saved reports? This cannot be undone.`)){
                localStorage.removeItem(HISTORY_KEY);
                setHistory([]);
              }
            }} style={{width:"100%",background:"transparent",border:"1px solid #dc2626",color:"#dc2626",padding:"10px",borderRadius:6,cursor:"pointer",fontSize:12}}>
              🗑️ Delete All Reports
            </button>
          </Card>
        </>
      )}
    </div>
  );
}


function Evidence({checklist,setChecklist}){
  const done=checklist.filter(e=>e.checked).length;
  const pct=checklist.length?Math.round(done/checklist.length*100):0;
  const guide=[
    {cat:"Layer 1 — Correction 증빙",items:["수리/교체 전·후 사진 (타임스탬프 포함)","정비 로그북/PMS 기록 사본","교체 부품 인증서 (CoC/Type Approval)","담당 책임자 서명 확인서"]},
    {cat:"Layer 2 — Corrective Action 증빙",items:["근본원인분석 (RCA) 보고서","SMS 절차서 해당 조항 사본 (개정 전)","PIF 분석 워크시트","관련 훈련 기록 (Training Record)","내부 감사 기록"]},
    {cat:"Layer 3 — Preventive Action 증빙",items:["개정된 SMS/PMS 절차서 사본 (개정일·번호 명시)","전 선원 서명 포함 TBT/Safety Meeting 기록","PMS 업데이트 스크린샷","Master/CE/DPA 관리검토 서명 (Management Review)","SIRE Inspection Guidance 이행 확인서"]},
    {cat:"Horizontal Deployment 증빙",items:["Fleet Circular 사본 (DPA 서명)","동형 선박 조치 완료 확인서","HSSEQ 담당자 승인 서신"]}
  ];
  return(
    <div className="fade">
      <div style={{fontFamily:"Georgia,serif",fontSize:18,color:"#e2e8f0",marginBottom:4}}>📁 Evidence Manager</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>SIRE 2.0 Inspection Guidance 기반 증빙 체크리스트</div>

      {checklist.length>0?(
        <Card>
          <div style={{fontSize:11,color:"#94a3b8",letterSpacing:1,marginBottom:10}}>📋 AI 생성 맞춤형 체크리스트</div>
          <div style={{height:4,background:"#1e3a5f",borderRadius:4,marginBottom:6,overflow:"hidden"}}>
            <div style={{height:"100%",background:"#22c55e",width:pct+"%",transition:"width .3s",borderRadius:4}}/>
          </div>
          <div style={{textAlign:"right",fontSize:10,color:"#64748b",marginBottom:12}}>{done}/{checklist.length} 완료 ({pct}%)</div>
          {checklist.map(item=>(
            <div key={item.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"9px 0",borderBottom:"1px solid #1e3a5f20"}}>
              <input type="checkbox" checked={item.checked} onChange={()=>setChecklist(checklist.map(e=>e.id===item.id?{...e,checked:!e.checked}:e))} style={{marginTop:2,cursor:"pointer",accentColor:"#22c55e"}}/>
              <span style={{fontSize:13,color:item.checked?"#64748b":"#e2e8f0",textDecoration:item.checked?"line-through":"none",lineHeight:1.5}}>{item.text}</span>
            </div>
          ))}
        </Card>
      ):(
        <Card><div style={{textAlign:"center",padding:20,color:"#64748b"}}>
          <div style={{fontSize:36,marginBottom:10}}>📂</div>
          <div style={{fontSize:13}}>Report Builder에서 보고서를 생성하면<br/>맞춤형 체크리스트가 자동 생성됩니다</div>
        </div></Card>
      )}

      <Card>
        <div style={{fontSize:11,color:"#94a3b8",letterSpacing:1,marginBottom:12}}>📚 SIRE 2.0 표준 증빙 가이드</div>
        {guide.map(g=>(
          <div key={g.cat} style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:"bold",color:"#0ea5e9",marginBottom:6}}>{g.cat}</div>
            {g.items.map((item,i)=><div key={i} style={{fontSize:12,color:"#94a3b8",padding:"3px 0"}}>✅ {item}</div>)}
          </div>
        ))}
      </Card>
    </div>
  );
}

// ============================================================
// EXIT CONFIRM MODAL
// ============================================================
function ExitConfirmModal({onStay,onLeave}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#0d1b2e",border:"2px solid #f59e0b",borderRadius:12,padding:24,width:"100%",maxWidth:340,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:12}}>⚓</div>
        <div style={{fontFamily:"Georgia,serif",fontSize:17,color:"#e2e8f0",marginBottom:8}}>Exit App?</div>
        <div style={{fontSize:12,color:"#64748b",lineHeight:1.7,marginBottom:20}}>
          Unsaved input data may be lost.<br/>
          Previously generated reports remain<br/>in History.<br/><br/>
          <span style={{color:"#94a3b8",fontSize:11}}>앱을 나가면 바탕화면으로 이동합니다.</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={onStay} style={{background:"linear-gradient(135deg,#0ea5e9,#0284c7)",color:"#fff",border:"none",padding:"12px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:"bold"}}>
            🔒 Stay in App
          </button>
          <button onClick={onLeave} style={{background:"#1e3a5f",color:"#94a3b8",border:"1px solid #374151",padding:"12px",borderRadius:8,cursor:"pointer",fontSize:13}}>
            🏠 Exit to Home
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App(){
  const [tab,setTab]=useState("home");
  const [evidence,setEvidence]=useState([]);
  const [showKey,setShowKey]=useState(false);
  const [hasKey,setHasKey]=useState(!!localStorage.getItem("sire_api_key"));
  const [showExit,setShowExit]=useState(false);
  const pendingLeave=useRef(null);

  useEffect(()=>{ if(!localStorage.getItem("sire_api_key")) setShowKey(true); },[]);

  // ── 뒤로가기 / 앱 종료 차단 ──
  useEffect(()=>{
    // Push a history state so back button hits us first
    window.history.pushState({sire:"app"},"","");

    const handlePop=(e)=>{
      // Re-push so next back also triggers
      window.history.pushState({sire:"app"},"","");
      // Show confirmation
      setShowExit(true);
      pendingLeave.current=()=>{ window.history.go(-2); };
    };

    const handleBeforeUnload=(e)=>{
      e.preventDefault();
      e.returnValue="입력 내용이 저장되지 않을 수 있습니다. 나가시겠습니까?";
      return e.returnValue;
    };

    window.addEventListener("popstate",handlePop);
    window.addEventListener("beforeunload",handleBeforeUnload);
    return()=>{
      window.removeEventListener("popstate",handlePop);
      window.removeEventListener("beforeunload",handleBeforeUnload);
    };
  },[]);

  const handleExitStay=()=>{ setShowExit(false); pendingLeave.current=null; };
  const handleExitLeave=()=>{
    setShowExit(false);
    // Strategy 1: iOS PWA standalone — window.close() works
    if(window.navigator && window.navigator.standalone){
      window.close();
      return;
    }
    // Strategy 2: Android TWA / PWA — try window.close()
    try{
      window.close();
      // If close didn't work (browser blocked it), fallback after short delay
      setTimeout(()=>{
        // Navigate away to blank page — effectively "empties" the app screen
        window.location.replace("about:blank");
      },200);
    }catch(e){
      window.location.replace("about:blank");
    }
  };

  const tabs=[
    {id:"home",icon:"⚓",label:"Home"},
    {id:"lookup",icon:"🔍",label:"Q Lookup"},
    {id:"pif",icon:"🧠",label:"PIF"},
    {id:"builder",icon:"📝",label:"Report"},
    {id:"evidence",icon:"📁",label:"Evidence"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#080f1a",paddingBottom:72}}>
      {showExit&&<ExitConfirmModal onStay={handleExitStay} onLeave={handleExitLeave}/>}
      {showKey&&<ApiKeyModal onClose={(saved)=>{setShowKey(false);setHasKey(!!localStorage.getItem("sire_api_key"));}}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0d1b2e,#0a1628)",borderBottom:"1px solid #1e3a5f",padding:"10px 14px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>⚓</span>
            <div>
              <div style={{fontSize:13,fontWeight:"bold",color:"#e2e8f0",letterSpacing:1,fontFamily:"Georgia,serif"}}>SIRE 2.0 Compliance Master</div>
              <div style={{fontSize:8,color:"#64748b",letterSpacing:2}}>OCIMF OFFICIAL Q LIBRARY · 385 QUESTIONS · AI POWERED</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={()=>setShowKey(true)} style={{background:hasKey?"rgba(34,197,94,.15)":"rgba(245,158,11,.15)",border:`1px solid ${hasKey?"#22c55e":"#f59e0b"}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:10,color:hasKey?"#22c55e":"#f59e0b"}}>
              🔑 {hasKey?"API ✓":"API 설정"}
            </button>
            <span style={{fontSize:9,background:"#0ea5e9",color:"#fff",padding:"2px 5px",borderRadius:3}}>v3.1</span>
          </div>
        </div>
        {!hasKey&&<div style={{background:"rgba(245,158,11,.1)",borderTop:"1px solid #f59e0b30",padding:"6px 14px",textAlign:"center",fontSize:11,color:"#f59e0b"}}>⚠️ <button onClick={()=>setShowKey(true)} style={{background:"none",border:"none",color:"#0ea5e9",cursor:"pointer",fontSize:11,textDecoration:"underline"}}>API Key 설정</button> 후 AI 기능 사용 가능</div>}
      </div>

      {/* Content */}
      <div style={{maxWidth:640,margin:"0 auto",padding:"16px 12px"}}>
        {tab==="home"&&<Home setTab={setTab}/>}
        {tab==="lookup"&&<QuestionLookup/>}
        {tab==="pif"&&<PIFAnalyzer/>}
        {tab==="builder"&&<ReportBuilder setEvidenceList={setEvidence}/>}
        {tab==="evidence"&&<Evidence checklist={evidence} setChecklist={setEvidence}/>}
        {tab==="history"&&<HistoryPage setTab={setTab}/>}
      </div>

      {/* Bottom Nav */}
      <div id="bnav" style={{position:"fixed",bottom:0,left:0,right:0,background:"#0d1b2e",borderTop:"1px solid #1e3a5f",display:"flex",justifyContent:"space-around",padding:"6px 0 8px",zIndex:100}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 8px"}}>
            <span style={{fontSize:19}}>{t.icon}</span>
            <span style={{fontSize:9,color:tab===t.id?"#0ea5e9":"#64748b",fontWeight:tab===t.id?"bold":"normal"}}>{t.label}</span>
            {tab===t.id&&<div style={{width:14,height:2,background:"#0ea5e9",borderRadius:1}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
