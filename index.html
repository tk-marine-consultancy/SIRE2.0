  "10.1.2":{"ch": "10", "sec": "10.1", "s": "Testing main propulsion, steering gear, thrusters & power generation plant", "d": "Were the Chief Engineer and engineer officers familiar with the company procedures for testing main propulsion, steering gear, thrusters and power generation plant prior to use and at critical points during a voyage or operation, and were checklists and log book entries completed as required?", "o": "To ensure that all machinery required for safe navigation is tested to verify full functionality and availability at key stages of a voyage or operation.", "i": "ICS: Engine Room Procedures Guide. First Edition. Annex A Manoeuvring Checklists A1 preparations for arrival A2 preparations for departure A3 Steering gear checks ICS: Bridge Procedures Guide. Fifth Edition. Chapter 3.18 Periodic Checks of Navigational Equipment Operational checks on navigational equipment should be undertaken when preparing for sea and prior to port entry (see Checklists B1, B6 &", "a": "• • • Sight, and where necessary review, the company procedures which defined the machinery tests required to be carried out pre-arrival, pre-departure and at defined stages during a voyage or operation. Review a recently completed pre-arrival, pre-departure and/or pre-transit machinery check list or record and verify that the required tests were c", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code ICS: Bridge Procedures Guide – Fifth Edition IMO SOLAS USCG: Code of Federal Regulations. Title 33.", "k": ["company", "checklists", "power", "completed", "points", "familiar", "during", "operation", "chief", "procedures", "propulsion", "officers"]},
  "10.1.3":{"ch": "10", "sec": "10.1", "s": "Periodic rounds of machinery space for non-UMS vessels", "d": "Were the Chief Engineer and engineer officers familiar with company procedures for periodic rounds and monitoring of the machinery space, and were log book entries and checklists available to confirm that the rounds had been completed as required?", "o": "To ensure that the machinery spaces had been effectively monitored to manage machinery in operation and on standby.", "i": "ICS: Engine Room Procedures Guide. First Edition. 8.5 Periodic Checks on Machinery and Related Equipment The EOOW should use all their senses as appropriate when verifying the correct operation of systems and machinery during frequent engine room rounds. Any abnormalities should be investigated immediately and rectified as appropriate. The Chief Engineer should be informed of any problems encounte", "a": "• • • • Sight, and where necessary review, the company procedures which defined the requirement for routine monitoring of machinery and machinery spaces. Review checklists and vessel logbooks and verify that the required machinery space rounds had been completed in accordance with the company procedures. Verify that the machinery space round checkl", "p": "IMO: ISM Code ICS: Engine Room Procedures Guide. First Edition. IMO SOLAS OCIMF: Recommendations on Engineering Watch/Duty Period Handover and Inspection Routines", "k": ["rounds", "company", "periodic", "monitoring", "familiar", "procedures", "checklists", "officers", "engineer", "machinery", "entries", "available"]},
  "10.1.4":{"ch": "10", "sec": "10.1", "s": "Periodic machinery space rounds during both manned and unmanned (UMS) periods", "d": "Were the Chief Engineer and engineer officers familiar with company procedures for periodic machinery space rounds and monitoring of the machinery space during both manned and unmanned (UMS) periods, and were log book entries and checklists available to confirm that the inspections had been completed as required?", "o": "To ensure that the machinery spaces had been monitored to effectively manage machinery in operation and on standby while in both manned and unmanned modes.", "i": "ICS: Engine Room Procedures Guide. First Edition. 7.6.1 Pre-UMS Rounds and Checklist Before changing over to unattended operation, the EEOW should complete a round of spaces, following a checklist which lists all the parameters to be tested and verified. See checklist B2: Preparations for UMS 8.9.3 The Complete Engine Room Round The most important duty of a watchkeeper is to carry out comprehensiv", "a": "• • • • Sight, and where necessary review, the company procedures which defined the requirement for routine monitoring of machinery during manned operation and prior to and during unmanned machinery space periods. Review checklists and vessel logbooks and verify that the machinery space rounds had been completed in accordance with the company proce", "p": "IMO: ISM Code ICS: Engine Room Procedures Guide. First Edition. IMO SOLAS OCIMF: Recommendations on Engineering Watch/Duty Period Handover and Inspection Routines", "k": ["company", "periods", "checklists", "manned", "confirm", "space", "completed", "familiar", "during", "chief", "procedures", "inspections"]},
  "10.1.5":{"ch": "10", "sec": "10.1", "s": "Local control of propulsion machinery", "d": "Were the Chief Engineer and engineer officers familiar with the operation, inspection and testing of the means provided to control propulsion machinery and related auxiliary systems locally in the event of failure of a remote-control system?", "o": "To ensure the engineer officers can respond promptly and effectively in the event of a failure of the remote control of propulsion machinery or a related auxiliary system.", "i": "ICS: Engine Room Procedures Guide. First Edition. 10.2.2 Emergency Operation All members of the engineering team should be trained and proficient in the local and emergency procedures for starting and manoeuvring the main engine. Periodic drills will help to maintain this proficiency. Clear instructions on this procedure should be posted next to the manual/emergency starting and manoeuvring statio", "a": "• • • • • • Sight, and where necessary review, the company procedures that defined the operation, inspection and testing of the means provided to control the propulsion machinery and related auxiliary systems locally. Inspect the manual controls or HMIs (human machine interfaces) at local control stations and the instructions posted nearby. Review ", "p": "IMO: ISM Code IMO SOLAS ICS: Engine Room Procedures Guide. First Edition.", "k": ["remote", "familiar", "operation", "means", "locally", "system", "event", "inspection", "control", "failure", "chief", "propulsion"]},
  "10.2.1":{"ch": "10", "sec": "10.2", "s": "Emergency generator", "d": "Were the officers familiar with the starting procedure for the emergency generator and were records available to demonstrate that the emergency generator had been tested according to company procedures?", "o": "To ensure the emergency generator will supply alternative power when needed.", "i": "U.K. MSA: MGN 52 Testing of emergency sources of electrical power. 6. It is to be ensured that the emergency generator prime mover can be satisfactorily started by all means fitted for this purpose including manual starting where this is provided in compliance with the Regulations and also including any cold starting arrangements. TMSA KPI 4A.1.4 requires that procedures are in place to record the", "a": "• • • • • • • • Sight, and where necessary review, the company procedures for the emergency generator. Sight and review the starting instructions posted adjacent to the equipment. Inspect the general condition of the emergency generator, the emergency switchboard and the emergency generator space. Verify that electrical insulation matting was in pl", "p": "IMO: ISM Code IMO SOLAS UK MSA: MGN 52. Testing of Emergency Sources of Electrical Power", "k": ["company", "familiar", "procedures", "starting", "officers", "tested", "procedure", "according", "available", "demonstrate", "records", "generator"]},
  "10.2.2":{"ch": "10", "sec": "10.2", "s": "Battery emergency source of power.", "d": "Were the Chief Engineer and engineer officers familiar with the company procedures for the regular inspection, maintenance and testing of the ship’s emergency batteries, and were the batteries fully charged and in satisfactory condition?", "o": "To ensure that the emergency source of electrical power is always ready in all respects.", "i": "TMSA KPI 4A.1.4 requires that procedures are in place to record the testing of critical equipment and systems that are not in continuous use. Testing is performed in accordance with mandatory requirements and manufacturers’ recommendations. IMO: ISM Code 10.3 The Company should identify equipment and technical systems the sudden operational failure of which may result in hazardous situations. The ", "a": "• • • • Sight and if necessary, review the company procedures for the regular inspection, maintenance and testing of the emergency battery source of electrical power. Review the records of: o Inspection of the batteries. o Assessment of the condition of the batteries. o Periodic testing of the complete emergency battery system including bringing it", "p": "IMO: ISM Code IMO SOLAS", "k": ["company", "batteries", "power", "satisfactory", "familiar", "source", "condition", "regular", "inspection", "chief", "procedures", "fully"]},
  "10.2.3":{"ch": "10", "sec": "10.2", "s": "Exhaust gas cleaning system (EGCS)", "d": "Were the Chief Engineer and engineer officers familiar with the company procedures for the operation, calibration and maintenance of the exhaust gas cleaning system (EGCS), and were required safety and regulatory measures being complied with?", "o": "To ensure the EGCS is operated safely in accordance with company procedures and applicable regulations and local/national limitations.", "i": "OCIMF: Guide for Implementation of Sulphur Oxide Exhaust Gas Cleaning Systems 5.6 Safety and crew training IMO has identified the following as potential safety hazards associated with EGCS: • • • • Handling and proximity of exhaust gases. Storage and use of pressurised containers of pure and calibrated gases. Position of permanent access platforms and sampling locations. Hazards associated with th", "a": "", "p": "IMO: MEPC.1/Circ.883 Guidance on indication of ongoing compliance in the case of the failure of a single monitoring instrument and recommended actions to take if the Exhaust Gas Cleaning System (ECGS)", "k": ["complied", "company", "familiar", "procedures", "maintenance", "operation", "officers", "engineer", "calibration", "regulatory", "measures", "being"]},
  "10.2.4":{"ch": "10", "sec": "10.2", "s": "Seawater pipelines", "d": "Were seawater pipelines, sea chests and seawater pumps in satisfactory condition and free of temporary repairs?", "o": "To ensure there are no weak points in seawater systems that might lead to failure and machinery space flooding.", "i": "TMSA KPI 4.1.1 requires that each vessel in the fleet is covered by a planned maintenance system and spare parts inventory which reflects the company’s maintenance strategy. The company identifies all equipment and machinery required to be included in the planned maintenance system, for example: • Engine machinery. IMO: ISM Code 10.1 The Company should establish procedures to ensure that the ship ", "a": "• • During the tour of the machinery spaces, inspect seawater pipelines, sea chests, storm valves, hull penetrations and seawater pumps. If necessary, review machinery space pipeline drawings and specifications. Expected Evidence • Machinery space pipeline drawings and specifications. Potential Grounds for a Negative Observation • • • • • • • • • •", "p": "IMO: ISM Code", "k": ["satisfactory", "repairs", "pumps", "pipelines", "seawater", "chests", "condition", "temporary"]},
  "10.2.5":{"ch": "10", "sec": "10.2", "s": "Bilge monitoring devices", "d": "Were the officers familiar with the company procedure for testing the bilge monitoring devices within their area of responsibility, and were records available to demonstrate that the bilge monitoring devices and associated alarms had been tested in accordance with the company procedure?", "o": "To ensure that the flooding detection systems fitted on board are always fully operational.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition Chapter 12.1.15.7 Miscellaneous A high-level alarm in the pumproom bilge which activates audible and visual alarms in the cargo control room, engine room and the navigating bridge. ICS: Engine Room Procedures Guide. First Edition. 8.4 Alarms and Actions High-level alarms for engine room bilges should be tested at le", "a": "• Sight, and where necessary review, the company procedure which required that bilge level monitoring devices and their associated alarms and indicators were periodically tested.", "p": "IMO: ISM Code ICS: Engine Room Procedures Guide. First Edition. IMO: A.1021(26) Codes on Alerts and Indicators 2009. IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixt", "k": ["company", "familiar", "records", "accordance", "officers", "tested", "procedure", "within", "available", "their", "demonstrate", "responsibility"]},
  "10.2.6":{"ch": "10", "sec": "10.2", "s": "Emergency compressed air machinery starting system.", "d": "Were the Chief Engineer and engineer officers familiar with the company procedures for the operation, inspection and testing of the emergency air compressor and emergency air reservoir, and was the equipment in satisfactory condition?", "o": "To ensure the emergency compressed air machinery starting system is always ready in all respects.", "i": "ICS: Engine Room Procedures Guide. First Edition. 8.9.3 The Complete Engine Room Round • Check the emergency generator and make sure it is ready for starting, synchronising and paralleling in auto. Also check the emergency air compressor, if fitted; TMSA KPI 4A.1.4 requires that procedures are in place to record the testing of critical equipment and systems that are not in continuous use. Testing ", "a": "", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code IMO SOLAS", "k": ["company", "satisfactory", "familiar", "starting", "operation", "compressor", "system", "condition", "inspection", "reservoir", "chief", "procedures"]},
  "10.3.1":{"ch": "10", "sec": "10.3", "s": "Switchboard deck insulation.", "d": "Was suitable deck insulation provided to the front and rear of electrical switchboards, and was it in good order?", "o": "To ensure that people are protected from injury when working on or around switchboards.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers 20.13 Electrical equipment 20.13.1 The risks of electric shock are much greater on-board ship than they are normally ashore because wetness, high humidity and high temperature (including sweating) reduce the contact resistance of the body. In those conditions, severe and even fatal shocks may be caused at voltages as low as 60V. It shou", "a": "• During the course of the inspection of the machinery spaces, verify that: o Switchboards were provided with the required deck insulation of an appropriate safe working voltage. o Insulating matting or composite deck material was complete and undamaged. Expected Evidence • Certification, marking or other documentary evidence of the safe working vo", "p": "IMO: ISM Code IMO SOLAS UK MCA: Code of Safe Working Practices for Merchant Seafarers USCG: Code of Federal Regulations. Title 46.", "k": ["switchboards", "suitable", "front", "order", "provided", "electrical", "switchboard", "insulation"]},
  "10.3.2":{"ch": "10", "sec": "10.3", "s": "Electrical distribution system switchboard earth monitoring.", "d": "Were the engineer officers familiar with the purpose and setting of the insulation monitoring devices provided on the primary and secondary distribution systems, and were the distribution switchboards free of significant earth faults?", "o": "To ensure that any significant earth faults are promptly addressed to prevent injury to personnel from electrical shock.", "i": "ICS: Engine Room Procedures Guide. First Edition. 10.7.5 Earth Faults Earth faults may occur within electric equipment, such as broken insulation on conductors. To maintain supply to essential equipment (for example, the steering gear) the electrical circuits for this equipment will usually have an insulated neutral system. This means that a single earth fault does not interrupt the system. But if", "a": "• • • If necessary, review the company procedure which provided guidance on the required alarm set point for the IMDs. During the inspection of the machinery spaces, examine the IMDs on each primary or secondary distribution system switchboard and note any indications: o Below 5 megohms on 440-volt systems, and/or below 2 megohms on 220-volt system", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code IMO SOLAS UK MCA: Code of Safe Working Practices for Merchant Seafarers USCG: Code of Federal Regulations. Title 46.", "k": ["secondary", "electrical", "insulation", "purpose", "switchboards", "familiar", "system", "devices", "officers", "significant", "switchboard", "primary"]},
  "10.3.3":{"ch": "10", "sec": "10.3", "s": "Entry into the machinery space during UMS.", "d": "Were the Chief Engineer and engineer officers familiar with the company procedures for safe entry into the machinery space(s) during UMS operation, including the operation and testing of the dead man alarm, if fitted?", "o": "To ensure safe entry into the machinery space(s) during UMS operation.", "i": "ICS: Engine Room Procedures Guide. First Edition. 4.4.2 Unattended Machinery Space (UMS) Operation The EOOW should inform the bridge before switching to Unattended Machinery Space (UMS) operation, whenever people enter and exit unattended machinery spaces and when the engine room is switched back to attended operation. When the EOOW needs to enter the machinery space outside of normal working hour", "a": "• • • Sight, and where necessary review, the company procedures for safe entry into the machinery space(s) during UMS operation. Review the records of testing of the dead man alarm (where fitted). Review the Bridge and Engine Room Log Books to ascertain the status of machinery space operation and records of entry during recent unattended periods.", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code IMO SOLAS IMO: A.1021(26) Codes on Alerts and Indicators 2009.", "k": ["company", "familiar", "procedures", "during", "operation", "officers", "engineer", "machinery", "entry", "fitted", "including", "alarm"]},
  "10.3.4":{"ch": "10", "sec": "10.3", "s": "Engineers' alarm.", "d": "Were the Chief Engineer and engineer officers familiar with the operation of the engineers’ alarm, and was the alarm in good order, tested regularly and the results recorded?", "o": "To ensure the engineers’ alarm is in good order and regularly tested.", "i": "ICS: Engine Room Procedures Guide. First Edition. 4.6.2 Engineers’ Call Alarm The engineers’ call alarm should be used in any engine room emergency. All engine room personnel should be trained and familiarised in their emergency duties and where to assemble upon hearing the engineers’ call alarm. IMO: A.1021(26) Codes on Alerts and Indicators, 2009. 3.3 The following alerts are classified as alarm", "a": "• • • Sight, and if necessary review, the company procedures for the operation and testing of the engineers’ alarm. Review the records of regular testing of the engineers’ alarm. Interview an engineer officer to verify their familiarity with the operation and testing of the engineers’ alarm, and request they identify the locations of the alarm acti", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code IMO SOLAS IMO: A.1021(26) Codes on Alerts and Indicators 2009.", "k": ["recorded", "familiar", "operation", "officers", "engineer", "tested", "results", "order", "alarm", "regularly", "engineers", "chief"]},
  "10.3.5":{"ch": "10", "sec": "10.3", "s": "Machinery alarm", "d": "Were the Chief Engineer and engineer officers familiar with the operation of the machinery alarm, and was the alarm in good order, tested regularly and the results recorded?", "o": "To ensure the machinery alarm is in good order and regularly tested.", "i": "ICS: Engine Room Procedures Guide. First Edition. 8.4 Alarms and Actions The EOOW should be familiar with the engine room’s control and alarm systems. All alarms must be acknowledged and acted on. Any alarms that cannot be cleared should be reported to the Chief Engineer. If it is necessary to inhibit an alarm, this should be done in line with SMS procedure. The reason for inhibiting the alarm sho", "a": "• • • • • Sight and if necessary, review the company procedures for the operation and testing of the machinery alarm. Review the records of regular testing of the machinery alarm. Interview an engineer officer to verify their familiarity with the operation and testing of the machinery alarm. During the inspection of the bridge, interview a navigati", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code IMO SOLAS IMO: A.1021(26) Codes on Alerts and Indicators 2009.", "k": ["recorded", "familiar", "operation", "officers", "engineer", "tested", "machinery", "order", "results", "alarm", "regularly", "chief"]},
  "10.3.6":{"ch": "10", "sec": "10.3", "s": "Watertight doors.", "d": "Were the Master and officers familiar with the company procedures for the operation, inspection and regular testing of watertight doors, and were the watertight doors in satisfactory condition?", "o": "To ensure watertight doors are regularly tested and ready to operate in an emergency.", "i": "ICS: Engine Room Procedures Guide. First Edition. 5.4.3 Watertight Doors Many lives have been lost and serious injuries caused as a result of incorrectly operated watertight doors. These doors are designed to close against any obstructions during an emergency in order to limit the spread of fire or flooding. Personnel should never try to cross through a watertight door if it is moving and is not f", "a": "• • • • Sight, and if necessary, review the company procedures for the operation, inspection and regular testing of watertight doors. Review records of the inspection and testing of watertight doors. During the tour of the bridge inspect the indication and control panel for the watertight doors. During the course of the inspection inspect the water", "p": "IMO: ISM Code IMO SOLAS ICS: Engine Room Procedures Guide. First Edition.", "k": ["company", "satisfactory", "master", "familiar", "procedures", "operation", "officers", "doors", "watertight", "condition", "regular", "inspection"]},
  "10.3.7":{"ch": "10", "sec": "10.3", "s": "Gas welding and cutting equipment.", "d": "Was gas welding and cutting equipment in good order, and spare oxygen and acetylene cylinders stored apart in a well-ventilated location outside of the accommodation and engine room?", "o": "To ensure gas welding and cutting equipment is properly installed and in satisfactory condition.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers 24.4.1 Personal protective equipment complying with the relevant standard specifications or their equivalent must be worn by the operator and as appropriate by those assisting with the operation to protect them from particles of hot metal and slag and protect their eyes and skin from ultra-violet and heat radiation. The operator should ", "a": "", "p": "UK HSE: Safety in gas welding cutting and similar processes IMO: ISM Code UK MCA: Code of Safe Working Practices for Merchant Seafarers USCG: Code of Federal Regulations. Title 46. BCGA: Code of Pract", "k": ["welding", "cylinders", "stored", "oxygen", "order", "accommodation", "engine", "location", "acetylene", "cutting", "equipment", "ventilated"]},
  "10.3.8":{"ch": "10", "sec": "10.3", "s": "Electric welding equipment.", "d": "Were engineer officers and ratings familiar with the safety precautions for the use of electric welding equipment, were these safety precautions posted, and was the equipment in satisfactory condition?", "o": "To ensure that electric welding equipment is always used safely.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 9.5 Electric welding equipment Electric welding equipment should be carefully inspected before each use to ensure it is in good condition. If necessary, it should be correctly earthed. When using electric arc equipment, pay special attention to ensure: • • • • • Electrical supply connections are made in a gas free s", "a": "Page 481 of 579 – SIRE 2.0 Question Library Part 2 – Version 1.0 (January 2022) • • • Inspect the electric welding equipment including the nameplate, local switching arrangement, electric cabling, electrode holder and spare electrodes. Sight the safety precautions for electric welding posted in the engine room workshop or other appropriate location", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. UK MCA: Code of Safe Working Practices for Merchant Seafarers", "k": ["satisfactory", "precautions", "familiar", "welding", "officers", "engineer", "ratings", "electric", "posted", "these", "safety", "equipment"]},
  "10.4.1":{"ch": "10", "sec": "10.4", "s": "Planned maintenance system (PMS)", "d": "Were the responsible vessel staff familiar with the company procedure for managing and using the planned maintenance system, and was the system updated with an accurate record of onboard maintenance and spare parts in accordance with the procedure?", "o": "To ensure that vessel structure, machinery and equipment is maintained in accordance with class requirements, manufacturer’s recommendations and company instructions.", "i": "OCIMF: Safety Critical Equipment and Spare Parts Guidance. First Edition. 4. Safety critical spare parts and safety management systems It is recommended that a proactive risk-based approach to the carriage of safety critical spare parts is taken for the management of hazardous situations. This approach may need to be above and beyond minimum regulatory requirements. Companies should apply this app", "a": "• • • • • Sight, and where necessary review, the company procedure for managing the planned maintenance system provided onboard. Review the planned maintenance system filtered for overdue planned or unplanned tasks and identify tasks that were either overdue by the original due date or by more than the company’s documented grace period where such p", "p": "OCIMF: Safety Critical Equipment and Spare Parts Guidance. First Edition. IMO: ISM Code IACS: A Guide to Managing Maintenance in accordance with the requirements of the ISM Code.", "k": ["company", "familiar", "staff", "planned", "maintenance", "updated", "record", "procedure", "vessel", "using", "parts", "responsible"]},
  "10.4.2":{"ch": "10", "sec": "10.4", "s": "Lube oil and hydraulic oil analysis program", "d": "Did the vessel operator subscribe to a lube oil and hydraulic oil analysis program and was a procedure in place to act on the results and trends identified by the analysis?", "o": "To ensure that the quality of lube oils and hydraulic oils is monitored, and action taken when necessary to avoid machinery damage. IACS: UR_Z21 Surveys of Propeller Shafts and Tube Shafts.", "i": "The vessel operator should have established an oil analysis programme to monitor the quality of lubrication and hydraulic oils used in key items of machinery. The programme should be aligned with manufacturer’s recommendations and Classification Society requirements. The vessel operator should have developed a procedure setting out the actions to be taken when a deficiency in a sampled oil is iden", "a": "Review the vessel’s lubricating and hydraulic oil analysis records and verify that: • • Each oil declared as being included within the lube oil analysis program had been tested within the required time frame. Where the results of oil analysis had resulted in either a “critical” (red) or “warning” (amber) alert: o The testing company or shore-based ", "p": "IACS Rec. 36 Recommended procedure for the determination of contents of metals and other contaminants in stern tube lubricating oil. IACS: UR_Z21 Surveys of Propeller Shafts and Tube Shafts.", "k": ["operator", "results", "procedure", "vessel", "analysis", "subscribe", "place", "trends", "hydraulic", "identified", "program"]},
  "10.5.1":{"ch": "10", "sec": "10.5", "s": "Conventional bunkering operations", "d": "Were the Master, Chief Engineer, officers, and ratings involved in bunkering operations, familiar with the company bunkering procedures, and were records available to demonstrate that bunker operations had been planned and conducted in accordance with the company procedure?", "o": "To ensure that bunkering operations are planned and conducted in accordance with Industry best practice guidance.", "i": "OCIMF: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. Chapter 24.1 Bunkering in General Bunkering is a critical operation and requires care to ensure safety and to reduce the risk of pollution. Bunkering operations should be planned and carried out in-line with legislation, standards and best practice guidelines to minimize the risk from the flammability, toxicity, cryoge", "a": "• • Sight, and where necessary review, the company procedures for bunkering operations. Review a recent bunker transfer plan and verify that it:", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "planned", "involved", "operations", "procedure", "conventional", "demonstrate", "records", "familiar", "chief", "procedures", "officers"]},
  "10.5.2":{"ch": "10", "sec": "10.5", "s": "Bunker fuel oil sampling and analysis", "d": "Were the Chief Engineer and engineer officers familiar with the company procedures for bunker fuel oil sampling and analysis, and were records available to demonstrate that samples had been taken and retained or analysed in accordance with the procedure?", "o": "To ensure that marine distillate and residual fuel oils meet the defined quality and environmental standards for use onboard in propulsion and power generating machinery.", "i": "IACS No.151 (July 2017) Recommendation for petroleum fuel treatment systems for marine diesel engines. 3.4 Verification requirements. 3.4.2.4 Records of fuel sample analysis according to ISO 8217 (latest revision) should be retained on board the ship and should be presented to the surveyor during regular surveys. 3.4.2.5 It is recommended that a drip sample of fuel should be taken during bunkering", "a": "• • • • Sight, and where necessary review, the company procedures for managing fuel oil samples, arranging fuel oil analysis and, where necessary, the remedial actions to be taken where fuel oil quality raises a concern. Review recent bunkering records and verify that bunker samples had been taken and either retained or analysed as required by comp", "p": "IMO: MARPOL IMO Resolution MEPC.182(59) 2009 Guidelines for the sampling of fuel oil for determination of compliance with the revised MARPOL Annex VI IACS: No.151 (July 2017) Recommendation for petrol", "k": ["company", "familiar", "procedures", "bunker", "taken", "officers", "engineer", "retained", "analysis", "procedure", "sampling", "available"]},
  "10.5.3":{"ch": "10", "sec": "10.5", "s": "Fuel change over procedures", "d": "Were the Chief Engineer and senior engineer officers familiar with the company and vessel specific fuel changeover procedures, and were records available to demonstrate that fuel grade changeovers had been completed in compliance with the procedures and MARPOL regulations?", "o": "To ensure that fuel grade changeovers are conducted in accordance with regulations while maintaining the safe and continuous availability of propulsion and electrical power.", "i": "ICS: Engine Room Procedures Guide. First Edition. 10.3.4 Changeover Procedure The issues associated with changing between different grades of fuel can be managed by using a system-specific procedure. All ships should have a system-specific changeover calculator, which should give enough time to ensure a complete and smooth change between different grades. See checklist B4: Fuel changeover for exam", "a": "• • • Sight, and where necessary review, the company procedures describing the changeover of fuel grades onboard. Review fuel change over records for a recent voyage where fuel grades had been changed and verify that the change had been completed in accordance with the company procedures. Review the location of the vessel during the changeover proc", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: MARPOL Joint Industry Guidance: The supply and use of 0.50% sulphur marine fuel OCIMF / INTERTANKO Recommendations on the Hazard Assessment of Fu", "k": ["company", "grade", "demonstrate", "changeovers", "records", "completed", "familiar", "change", "regulations", "chief", "procedures", "marpol"]},
  "10.6.1":{"ch": "10", "sec": "10.6", "s": "LNG fuel tank water-spray system", "d": "Were the Master and officers familiar with the location, purpose and operation of the LNG fuel tank water-spray system for cooling and fire prevention on deck, and was the equipment in good working order, regularly inspected, tested and maintained?", "o": "To ensure that crewmembers can respond effectively to a fire situation in accordance with the shipboard emergency plan.", "i": "IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protection systems and appliances 2 Operational readiness All fire protection systems and appliances should at all times be in good order and readily available for immediate use while the ship is in service. If a fire protection system is undergoing maintenance, testing or repair, then suitable arrangements should b", "a": "• • • • • • • • Inspect the space(s) containing the remote controls for the water-spray system for cooling and fire prevention on deck. Review the operating instructions for the system posted in the space(s) and verify that the system valves and controls are properly marked and set. Review inspection and servicing data available in the space(s). In", "p": "IMO: ISM Code IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protection systems and appliances. IMO: IGF Code", "k": ["maintained", "prevention", "master", "familiar", "inspected", "operation", "officers", "tested", "order", "water", "location", "system"]},
  "10.6.2":{"ch": "10", "sec": "10.6", "s": "LNG gas fuel bunkering ESD system", "d": "Were the Chief Engineer, and those officers and ratings, involved in LNG bunkering operations, familiar with the functions of the vessel’s LNG (or other lowflashpoint fuel) bunkering Emergency Shut Down (ESD) systems, and was the equipment in good working order, regularly inspected, tested and maintained?", "o": "To ensure that crewmembers can respond effectively to an emergency while bunkering LNG (or other lowflashpoint fuel) in accordance with the shipboard emergency plan.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 24.3.2 Transfer equipment requirements for LNG bunkering Different types of equipment are used to perform LNG bunker transfers: rigid arms, hybrid systems, (rigid structure handling flexible lines) and flexible hoses. All LNG transfer systems must be equipped with ERS and ESD systems connected via a bunkering safety", "a": "", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IGF Code IACS: Rec 142. LNG Bunkering Guidelines (2016)", "k": ["involved", "operations", "other", "regularly", "lowflashpoint", "familiar", "system", "chief", "inspected", "officers", "order", "bunkering"]},
  "10.6.3":{"ch": "10", "sec": "10.6", "s": "LNG (or other low-flashpoint fuel) bunkering procedures.", "d": "Were the Chief Engineer, and those officers and ratings involved in LNG bunkering operations, familiar with the company LNG (or other low-flashpoint fuel) bunkering procedures, and were records available to demonstrate that bunker operations had been planned and conducted in accordance with the company procedures?", "o": "To ensure that LNG (or other low-flashpoint fuel) bunkering operations are planned and conducted in accordance with industry best practice guidance.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 24.1 Bunkering in General Bunkering is a critical operation and requires care to ensure safety and to reduce the risk of pollution. Bunkering operations should be planned and carried out in line with legislation, standards and best practice guidelines to minimize the risk from the flammability, toxicity, cryogenic n", "a": "", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IGF Code", "k": ["company", "planned", "involved", "operations", "other", "demonstrate", "records", "familiar", "flashpoint", "chief", "procedures", "officers"]},
  "10.6.4":{"ch": "10", "sec": "10.6", "s": "LNG fuel bunkering control station and manifold.", "d": "Were the safety measures at the bunkering control station and bunkering manifold area in satisfactory condition?", "o": "To ensure safety measures at the bunker control station and in the bunker manifold area are in satisfactory condition.", "i": "IACS: Rec 142. LNG Bunkering Guidelines (2016) 1.5.6 Protection of the hull plate, shell side and ship structure Protection from cryogenic brittle fracture of the receiving ship deck and structure caused by leakage of LNG should be fitted as per IGF code requirements. When appropriate one or more of the following protective measures may be utilised: • • • A water curtain may be installed to protec", "a": "• • Inspect the bunkering manifold area. Inspect the bunkering control location and as far as is safe and practicable, verify the controls, instrumentation and alarms located there are operational. Expected Evidence None Potential Grounds for a Negative Observation • • • • • • • • • The bunkering control location was not in a safe area. The bunkeri", "p": "IMO: ISM Code IMO: IGF Code IACS: Rec 142. LNG Bunkering Guidelines (2016)", "k": ["satisfactory", "station", "bunkering", "safety", "condition", "manifold", "measures", "control"]},
  "10.7.1":{"ch": "10", "sec": "10.7", "s": "Remote controls for fuel and lube oil system valves", "d": "Were the Master and officers familiar with the location, purpose, testing and operation of the vessel’s remote controls for fuel and lube oil valves, emergency fuel and lube oil pump shut-offs and oil tank quick closing valves, and were the systems in good working order?", "o": "To ensure that crewmembers can respond effectively to a fire situation in accordance with the shipboard emergency plan.", "i": "IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protection systems and appliances. 2 Operational readiness All fire protection systems and appliances should at all times be in good order and readily available for immediate use while the ship is in service. If a fire protection system is undergoing maintenance, testing or repair, then suitable arrangements should ", "a": "• • • • • Sight, and where necessary review the company procedures for the inspection, testing and maintenance of the remote controls for fuel and lube oil valves and emergency fuel and lube oil pump shut-offs and oil tank quick closing valves. Inspect the remote controls for fuel and lube oil valves and emergency fuel and lube oil pump shut-offs a", "p": "IMO: ISM Code IMO SOLAS IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protection systems and appliances.", "k": ["controls", "master", "familiar", "operation", "officers", "closing", "vessel", "remote", "order", "systems", "location", "working"]},
  "10.7.2":{"ch": "10", "sec": "10.7", "s": "Fire prevention in machinery spaces - hot surfaces and oil spray", "d": "Were the Master and officers familiar with the measures to prevent fire in the machinery spaces caused by flammable liquid spraying onto a hot surface and, were the protective measures provided regularly inspected and properly maintained?", "o": "To ensure fire prevention measures relating to hot surfaces and flammable liquids in the machinery space are understood and properly maintained.", "i": "IMO: MSC.1/Circ.1321 Guidelines for measures to prevent fires in engine-rooms and cargo pump-rooms Part 2 Chapter 2 Piping system 2 Flexible pipes, hoses and hose assemblies 2.5.1 Hose assemblies should be inspected frequently and maintained in good order or replaced when there is evidence of distress likely to lead to failure. Any of the following conditions may require replacement of the hose as", "a": "• • • • • Sight, and where necessary review, the company procedures that set out the actions to be taken to ensure the integrity of the measures in place to prevent fires in the machinery spaces caused by a flammable liquid spraying onto a hot surface. Where necessary review the records of periodic inspections of the fire prevention measures in the", "p": "IMO SOLAS IMO: MSC.1/Circ. 1321 Guidelines for measures to prevent fires in engine-rooms and cargo pump-rooms. IMO: ISM Code IACS: Recommendation No.18. Fire Prevention in Machinery Spaces of Ships in", "k": ["properly", "prevent", "spray", "regularly", "protective", "familiar", "spraying", "caused", "flammable", "liquid", "spaces", "inspected"]},
  "10.7.3":{"ch": "10", "sec": "10.7", "s": "Main engine crank case monitoring.", "d": "Were the main engine crankcase oil mist detectors, engine bearing temperature monitors or equivalent devices and associated alarms in good order?", "o": "To ensure the monitoring arrangements to warn of potential crankcase explosion are always effective.", "i": "ICS: Engine Room Procedures Guide. First Edition. Emergency checklists C6 – Oil Mist in Crankcase IACS: Unified Requirements M67 Type Testing Procedure for Crankcase Oil Mist Detection and Alarm Equipment 6.3 The oil mist detector monitoring arrangements are to be capable of detecting oil mist in air concentrations of between: (a) 0 and 10% of the lower explosive limit (LEL) or (b) between 0 and a", "a": "• • • • Sight, and where necessary, review the company procedures for the operation and maintenance of the crankcase oil mist detectors, engine bearing temperature monitors or equivalent devices. Where necessary, review the records for the testing and servicing of the crankcase oil mist detectors, engine bearing temperature monitors or equivalent d", "p": "ICS: Engine Room Procedures Guide. First Edition. IMO: ISM Code IMO SOLAS IACS Unified Requirements M67 Type Testing Procedure for Crankcase Oil Mist Detection and Alarm Equipment", "k": ["crankcase", "bearing", "crank", "order", "engine", "temperature", "equivalent", "detectors", "alarms", "monitors", "devices", "associated"]},
  "10.7.4":{"ch": "10", "sec": "10.7", "s": "Hydraulic power packs fire protection measures.", "d": "Where hydraulic power packs were located within the main engine compartment, were fire protection measures provided, and if so, where they in satisfactory condition?", "o": "To ensure the machinery space is protected from a fire or explosion resulting from a hydraulic oil mist caused by high pressure leakage.", "i": "OCIMF: Safety Critical Equipment and Spare Parts Guidance. First Edition. 3.2 Safety critical equipment Safety critical equipment is an individual piece of equipment, a control system or an individual protection device which in the event of a single point failure may: • • Result in a hazardous situation which could lead to an accident, or Directly cause an accident that results in harm to people o", "a": "• • During the tour of the main machinery space, inspect the hydraulic power packs and their location and: o If fitted in the main machinery space, determine whether:  An oil mist detector is fitted, or  The design encapsulated the pumps and high pressure piping and provided warning of leakage by means of a level alarm or other means. o If fitted", "p": "IMO: ISM Code IMO: MSC.1/Circ. 1321 Guidelines for measures to prevent fires in engine-rooms and cargo pump-rooms. OCIMF: Safety Critical Equipment and Spare Parts Guidance. First Edition. ISO 16437:2", "k": ["protection", "satisfactory", "within", "measures", "provided", "engine", "hydraulic", "compartment", "power", "where", "condition", "located"]},

async function callClaude(system,user,retries=3){
  const key=getApiKey();
  if(!key) throw new Error("API Key is not set. Please tap the 🔑 button at the top right.");
  // Prepend universal English-only instruction to every system prompt
  const ENGLISH_RULE="LANGUAGE RULE (non-negotiable): Your ENTIRE response must be written in formal professional English only — all sections, labels, analysis, guidance, and commentary. The user may submit observations in any language (Korean, English, etc.) but you must always reply exclusively in English. Do not include any Korean, Chinese, Japanese, or other non-English text anywhere in your response.\n\n";
  const finalSystem=ENGLISH_RULE+system;
  for(let attempt=1;attempt<=retries;attempt++){
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:3500,system:finalSystem,messages:[{role:"user",content:user}]})
    });
    if((res.status===529||res.status===429||res.status===503)&&attempt<retries){
      await new Promise(r=>setTimeout(r,attempt*9000));
      continue;
    }
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      const msg=e?.error?.message||res.statusText;
      if(res.status===529) throw new Error("Server overloaded (529) — please retry in 1-2 minutes.");
      if(res.status===429) throw new Error("Rate limit exceeded (429) — please retry shortly.");
      if(res.status===401) throw new Error("API Key error (401) — please check your key via the 🔑 button.");
      throw new Error(`API Error ${res.status}: ${msg}`);
    }
    const d=await res.json();
    return d.content.map(b=>b.text||"").join("\n");
  }
  throw new Error("Server overloaded — failed after 3 retries. Please try again later.");
}

// Smart question matching using SIRE_Q DB
function matchQuestions(text){
  if(!text||text.length<5) return[];
  const t=text.toLowerCase();
  const scores={};
  Object.entries(SIRE_Q).forEach(([qno,q])=>{
    let s=0;
    // keyword match
    (q.k||[]).forEach(kw=>{ if(t.includes(kw)) s+=2; });
    // desc/short word match
    const words=(q.s+" "+q.d).toLowerCase().split(/\W+/).filter(w=>w.length>4);
    words.forEach(w=>{ if(t.includes(w)) s+=1; });
    if(s>0) scores[qno]=s;
  });
  return Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([qno])=>({qno,...SIRE_Q[qno]}));
}

// ============================================================
// EXPERT-LEVEL SIRE 2.0 PIF DETECTION ENGINE
// 실제 SIRE 검사관 판단 로직 구현
// ============================================================
function expertDetectPIF(text){
  const t=text.toLowerCase();

  // ── 판단 트리: 실제 SIRE 검사관의 5Why 접근법 ──
  const scores={};

  // PIF 3: 절차 자체 없음/불적절 — 가장 먼저 확인
  const p3kw=["no procedure","절차서","체크리스트","checklist","procedure not","without procedure",
    "no written","기재 안","명시 안","명확하지","불명확","구체적이지","기준 없","checklist did not","not specified",
    "not detailed","guidance not","매뉴얼 없","manual not available","procedure unavailable"];
  p3kw.forEach(k=>{ if(t.includes(k)) scores[3]=(scores[3]||0)+3; });

  // PIF 1: 절차 있는데 위반
  const p1kw=["failed to comply","did not follow","despite procedure","procedure not followed",
    "disregarded","절차 위반","무시","not in accordance with procedure","contrary to","bypass",
    "override","했음에도","있었으나 따르지"];
  p1kw.forEach(k=>{ if(t.includes(k)) scores[1]=(scores[1]||0)+3; });

  // PIF 2: 관행·습관화
  const p2kw=["custom","practice","habit","habitually","routinely","always done","관행","습관",
    "항상 이렇게","formal inspection","형식적","retrospective","소급","after the fact","우리 방식",
    "traditionally","normalization","정상으로","당연하게","이전에도 같은","previous occasion"];
  p2kw.forEach(k=>{ if(t.includes(k)) scores[2]=(scores[2]||0)+3; });

  // PIF 4: 교육 부족
  const p4kw=["training","educated","instruction","familiar with","unfamiliar","교육","훈련","모르",
    "알지 못","knowledge","competency","qualification","certificate","stcw","familiarisation",
    "ojt","not trained","미교육","no training","never trained","unaware of","몰랐","인지 못"];
  p4kw.forEach(k=>{ if(t.includes(k)) scores[4]=(scores[4]||0)+3; });

  // PIF 5: 상황 인식
  const p5kw=["situational","awareness","not noticed","failed to notice","didn't notice",
    "not observed","missed","overlooked","distracted","주의 분산","인식하지 못","감지 못",
    "모니터링 실패","알아채지 못","during other task","busy with","attention","집중하다","focus"];
  p5kw.forEach(k=>{ if(t.includes(k)) scores[5]=(scores[5]||0)+3; });

  // PIF 6: 소통
  const p6kw=["communication","communicated","language","briefing","handover","인수인계",
    "소통","전달","언어","지시","브리핑","misunderstanding","오해","ship shore","ship-shore",
    "not informed","informed","not aware that","알리지 않","보고 안"];
  p6kw.forEach(k=>{ if(t.includes(k)) scores[6]=(scores[6]||0)+3; });

  // PIF 7: 작업환경·설계
  const p7kw=["ergonomic","access","accessibility","lighting","light","illumination","signage",
    "labelling","layout","noise","heat","space","tool","접근","접근 불량","조명","표시","공간",
    "설계","배치","도구","표시판","signboard","marking","difficult to reach","hard to access",
    "not visible","볼 수 없","보이지 않","어두워","어둠","explosion proof","방폭","ex-d","ex-e",
    "cramped","狭い","difficult to inspect","점검 어려","접근이 어"];
  p7kw.forEach(k=>{ if(t.includes(k)) scores[7]=(scores[7]||0)+3; });

  // PIF 8: 리더십·감독
  const p8kw=["supervision","supervisor","leadership","officer","chief","master","감독","리더십",
    "관리","책임자","승인","authorized","authorised","permit issued without","without checking",
    "not verified","검증 안","확인 안","officer failed to","responsible officer","oversee",
    "management","pressure","압박","일정 우선","schedule priority"];
  p8kw.forEach(k=>{ if(t.includes(k)) scores[8]=(scores[8]||0)+2; });

  // PIF 9: 실습 기회 부족
  const p9kw=["practice","drill","exercise","frequency","interval","opportunity","실습","연습",
    "드릴","훈련 기회","경험 부족","inexperienced","lack of experience","seldom","rarely","낮은 빈도",
    "cbt only","computer based","이론만","이론 교육만","실제 장비","real equipment","no hands-on",
    "simulator","시뮬레이터","last practiced","마지막 훈련","long interval"];
  p9kw.forEach(k=>{ if(t.includes(k)) scores[9]=(scores[9]||0)+3; });

  // ── 문맥 가중치 추가 ──
  // 점검 누락 관련: PIF 2, 3, 7 우선
  if(t.includes("inspect") || t.includes("점검") || t.includes("inspection")) {
    scores[2]=(scores[2]||0)+2;
    scores[3]=(scores[3]||0)+2;
    scores[7]=(scores[7]||0)+2;
  }
  // 장비 결함: PIF 7, 3 우선
  if(t.includes("defect")||t.includes("결함")||t.includes("damage")||t.includes("손상")) {
    scores[7]=(scores[7]||0)+1;
    scores[3]=(scores[3]||0)+1;
  }
  // 안전검사: PIF 2, 8
  if(t.includes("safety inspection")||t.includes("안전점검")||t.includes("area safety")) {
    scores[2]=(scores[2]||0)+3;
    scores[8]=(scores[8]||0)+2;
  }
  // 인증서·자격: PIF 4
  if(t.includes("certificate")||t.includes("qualification")||t.includes("자격")||t.includes("인증")) {
    scores[4]=(scores[4]||0)+2;
  }
  // PMS/유지보수: PIF 2, 3
  if(t.includes("pms")||t.includes("maintenance")||t.includes("정비")||t.includes("planned maintenance")) {
    scores[2]=(scores[2]||0)+2;
    scores[3]=(scores[3]||0)+2;
  }

  // 점수 정규화 및 상위 3개 반환
  const sorted=Object.entries(scores)
    .filter(([,s])=>s>0)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3)
    .map(([code])=>SIRE_PIF_CODES.find(p=>p.code===parseInt(code)));

  // 아무것도 감지 안 되면 기본값 PIF 2 반환
  if(sorted.length===0) return[SIRE_PIF_CODES[1]];
  return sorted.filter(Boolean);
}

// Auto-resizing textarea — starts at 4 rows, grows with content
function AutoTextarea({value,onChange,placeholder,style={}}){
  const ref=useRef(null);
  const LINE_HEIGHT=21; // px per line at fontSize:13, lineHeight:1.6
  const MIN_ROWS=4;
  useEffect(()=>{
    const el=ref.current;
    if(!el) return;
    el.style.height="auto";
    const minH=MIN_ROWS*LINE_HEIGHT+20; // 20px = top+bottom padding
    el.style.height=Math.max(minH,el.scrollHeight)+"px";
  },[value]);
  return(
    <textarea
      ref={ref}
      value={value}
      onChange={onChange}
      placeholder={placeholder}
      style={{
        width:"100%",minWidth:0,
        background:"#080f1a",border:"1px solid #1e3a5f",borderRadius:6,
        color:"#e2e8f0",padding:"10px 12px",fontSize:13,
        resize:"none", // no manual resize handle — auto only
        lineHeight:"1.6",
        wordBreak:"break-word",whiteSpace:"pre-wrap",
        overflow:"hidden",  // hide scrollbar while auto-sizing
        transition:"height .1s ease",
        ...style
      }}
    />
  );
}

function QuestionLookup(){
  const [qnum,setQnum]=useState("");
  const [search,setSearch]=useState("");
  const [results,setResults]=useState([]);
  const [selected,setSelected]=useState(null);
  const [chFilter,setChFilter]=useState("all");

  const doSearch=()=>{
    if(search.trim().length<3){alert("Please enter at least 3 characters.");return;}
    const r=matchQuestions(search);
    setResults(r);setSelected(null);
  };

  const lookupByNum=()=>{
    const q=SIRE_Q[qnum.trim()];
    if(q){setSelected({qno:qnum.trim(),...q});setResults([]);}
    else alert(`Q ${qnum} 을(를) 찾을 수 없습니다.`);
  };

  const chapterList=["all",...Object.keys(CH_NAMES).sort((a,b)=>parseInt(a)-parseInt(b))];

  const browseList=Object.entries(SIRE_Q)
    .filter(([qno,q])=>chFilter==="all"||q.ch===chFilter)
    .sort(([a],[b])=>{
      const ap=a.split(".").map(Number);
      const bp=b.split(".").map(Number);
      for(let i=0;i<Math.max(ap.length,bp.length);i++) if((ap[i]||0)!==(bp[i]||0)) return (ap[i]||0)-(bp[i]||0);
      return 0;
    });

  return(
    <div className="fade">
      <div style={{fontFamily:"Georgia,serif",fontSize:18,color:"#e2e8f0",marginBottom:4}}>🔍 Question Lookup</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>SIRE 2.0 공식 Question Library 전체 385문항 검색</div>

      <Card>
        <SLabel>질문번호 직접 입력</SLabel>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <SInput value={qnum} onChange={e=>setQnum(e.target.value)} placeholder="예: 5.8.1, 9.1.1, 8.99.2..." style={{flex:1}}/>
          <button onClick={lookupByNum} style={{background:"#0ea5e9",color:"#fff",border:"none",padding:"9px 14px",borderRadius:6,cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>검색</button>
        </div>
        <SLabel>키워드 검색</SLabel>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <SInput value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="예: lifeboat, mooring brake, enclosed space..." style={{flex:1}}/>
          <button onClick={doSearch} style={{background:"#0ea5e9",color:"#fff",border:"none",padding:"9px 14px",borderRadius:6,cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>검색</button>
        </div>
        <SLabel>Chapter 브라우즈</SLabel>
        <select value={chFilter} onChange={e=>setChFilter(e.target.value)} style={{width:"100%",background:"#080f1a",border:"1px solid #1e3a5f",borderRadius:6,color:"#e2e8f0",padding:"8px 11px",fontSize:13}}>
          <option value="all">전체 챕터 ({Object.keys(SIRE_Q).length}문항)</option>
          {Object.entries(CH_NAMES).map(([ch,name])=>{
            const cnt=Object.values(SIRE_Q).filter(q=>q.ch===ch).length;
            return <option key={ch} value={ch}>Ch.{ch} — {name} ({cnt})</option>;
          })}
        </select>
      </Card>

      {/* Keyword search results */}
      {results.length>0&&(
        <Card>
          <div style={{fontSize:11,color:"#0ea5e9",letterSpacing:1,marginBottom:10}}>🎯 검색 결과 ({results.length}건)</div>
          {results.map((r,i)=>(
            <div key={r.qno} onClick={()=>setSelected(r)} style={{background:selected?.qno===r.qno?"rgba(14,165,233,.1)":"#080f1a",border:`1px solid ${selected?.qno===r.qno?"#0ea5e9":"#1e3a5f"}`,borderLeft:`4px solid ${i===0?"#0ea5e9":i===1?"#f59e0b":"#64748b"}`,borderRadius:8,padding:12,marginBottom:8,cursor:"pointer"}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:"bold",color:"#0ea5e9"}}>{r.qno}</span>
                <span style={{fontSize:9,color:"#64748b"}}>Ch.{r.ch} — {CH_NAMES[r.ch]}</span>
                {i===0&&<span style={{fontSize:9,background:"#0ea5e9",color:"#fff",padding:"1px 5px",borderRadius:3}}>TOP</span>}
              </div>
              <div style={{fontSize:12,fontWeight:"bold",color:"#e2e8f0",marginBottom:3}}>{r.s}</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{r.d?.slice(0,120)}...</div>
            </div>
          ))}
        </Card>
      )}

      {/* Browse list (when no search) */}
      {results.length===0&&!selected&&(
        <Card>
          <div style={{fontSize:11,color:"#94a3b8",letterSpacing:1,marginBottom:10}}>
            📋 {chFilter==="all"?"전체":CH_NAMES[chFilter]} — {browseList.length}문항
          </div>
          <div style={{maxHeight:400,overflowY:"auto"}}>
            {browseList.map(([qno,q])=>(
              <div key={qno} onClick={()=>setSelected({qno,...q})} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid #1e3a5f20",cursor:"pointer"}}>
                <span style={{fontSize:11,color:"#0ea5e9",minWidth:52,fontWeight:"bold"}}>{qno}</span>
                <span style={{fontSize:11,color:"#94a3b8"}}>{q.s}</span>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Selected question detail */}
      {selected&&(
        <div className="fade">
          <Card style={{borderColor:"#0ea5e9"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontSize:10,color:"#0ea5e9",letterSpacing:2,marginBottom:2}}>SIRE 2.0 Q{selected.qno} — Ch.{selected.ch}</div>
                <div style={{fontSize:13,color:"#64748b"}}>{CH_NAMES[selected.ch]}</div>
              </div>
              <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:16}}>✕</button>
            </div>
            <div style={{fontFamily:"Georgia,serif",fontSize:15,color:"#e2e8f0",lineHeight:1.6,marginBottom:14}}>{selected.d}</div>
            
            {selected.o&&<>
              <div style={{fontSize:10,color:"#f59e0b",letterSpacing:2,marginBottom:4}}>OBJECTIVE</div>
              <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:12,borderLeft:"2px solid #f59e0b",paddingLeft:10}}>{selected.o}</div>
            </>}
            
            {selected.i&&<>
              <div style={{fontSize:10,color:"#22c55e",letterSpacing:2,marginBottom:4}}>INSPECTION GUIDANCE</div>
              <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:12,borderLeft:"2px solid #22c55e",paddingLeft:10}}>{selected.i}</div>
            </>}
            
            {selected.a&&<>
              <div style={{fontSize:10,color:"#0ea5e9",letterSpacing:2,marginBottom:4}}>SUGGESTED INSPECTOR ACTIONS</div>
              <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,marginBottom:12,borderLeft:"2px solid #0ea5e9",paddingLeft:10}}>{selected.a}</div>
            </>}
            
            {selected.p&&selected.p!=="None"&&<>
              <div style={{fontSize:10,color:"#64748b",letterSpacing:2,marginBottom:4}}>PUBLICATIONS</div>
              <div style={{fontSize:11,color:"#64748b",lineHeight:1.6}}>{selected.p}</div>
            </>}
          </Card>
        </div>
      )}
    </div>
  );
}

function PIFAnalyzer(){
  const [obs,setObs]=useState("");
  const [detected,setDetected]=useState([]);
  const [selectedCode,setSelectedCode]=useState(null); // 최종 선정 PIF
  const [role,setRole]=useState("Senior Deck Officer");
  const [verdict,setVerdict]=useState("Not as expected");
  const [aiAnalysis,setAiAnalysis]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [showDecisionTree,setShowDecisionTree]=useState(false);
  const [showAllPIF,setShowAllPIF]=useState(false);

  const roles=["Senior Deck Officer","Junior Deck Officer","Senior Engineer Officer","Junior Engineer Officer","Rating"];
  const verdicts=["Exceeded normal expectation","As expected","Not as expected","Not answerable"];

  useEffect(()=>{
    if(obs.length>15){
      const d=expertDetectPIF(obs);
      setDetected(d);
      if(d.length>0&&!selectedCode) setSelectedCode(d[0].code);
    } else {
      setDetected([]);
    }
  },[obs]);

  const analyze=async()=>{
    if(!obs){setErr("Please enter the observation text.");return;}
    if(!selectedCode){setErr("Please select a PIF code first.");return;}
    setLoading(true);setErr("");setAiAnalysis(null);

    const pif=SIRE_PIF_CODES.find(p=>p.code===selectedCode);
    const qMatches=matchQuestions(obs).slice(0,2);
    const qCtx=qMatches.map(q=>`Q${q.qno}: ${q.s}\n  Objective: ${q.o?.slice(0,120)}\n  Inspection Guidance: ${q.i?.slice(0,150)}`).join("\n\n");

    const sys=`You are a 20-year veteran Master Mariner, SIRE 2.0 Lead Inspector and Vetting Superintendent.
You are analyzing a SIRE 2.0 Human element observation for an ${role}.
The inspector has selected PIF code: ${pif.sireCode}
Verdict: ${verdict}

CRITICAL RULES:
- ALWAYS respond in professional English only. The user may write in any language (Korean, English, etc.) but your response must be entirely in English.
- NEVER blame the individual. Focus ONLY on systemic/organisational causes.
- Use the exact SIRE 2.0 PIF language: "${pif.sireCode}"
- Reference the SIRE Q Library inspection guidance where available
- Provide analysis that a senior vetting superintendent would write`;

    const msg=`OBSERVATION: "${obs}"

ROLE OBSERVED: ${role}
VERDICT: ${verdict}
SELECTED PIF: ${pif.code}. ${pif.sireCode}
PIF Description: ${pif.desc}

RELATED SIRE QUESTIONS:
${qCtx}

Provide expert SIRE 2.0 Human element analysis in this EXACT format using section markers:

##WHY_THIS_PIF##
[2-3 sentences: Why PIF ${pif.code} (${pif.sireLabel}) is the most appropriate selection for this observation. Reference the SIRE inspection guidance. Do NOT blame the individual.]

##5WHY_ANALYSIS##
[5-Why root cause chain — start from the observed behaviour, go to systemic root cause. Each "Why" on a new line starting with "Why N:"]

##SYSTEMIC_GAP##
[1-2 sentences: The specific SMS/procedure/system failure that allowed this to occur. Reference ISM Code, SMS requirements.]

##INSPECTOR_EVIDENCE##
[3-4 bullet points: What specific evidence the inspector should sight to support this PIF selection]

##OPERATOR_RESPONSE_GUIDANCE##
[What the operator's Rectification Report MUST address to satisfy this PIF selection. Be specific — not generic.]

Keep each section concise. Total under 500 words.`;

    try{
      const raw=await callClaude(sys,msg);
      const get=(key)=>{
        const m=raw.match(new RegExp(`##${key}##([\\s\\S]*?)(?=##[A-Z_]+##|$)`,"i"));
        return m?m[1].trim():"";
      };
      setAiAnalysis({
        whyPif:get("WHY_THIS_PIF"),
        fiveWhy:get("5WHY_ANALYSIS"),
        systemicGap:get("SYSTEMIC_GAP"),
        evidence:get("INSPECTOR_EVIDENCE"),
        operatorGuidance:get("OPERATOR_RESPONSE_GUIDANCE"),
        pif,role,verdict,obs:obs.slice(0,200)
      });
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  const copyResult=()=>{
    if(!aiAnalysis) return;
    const {pif,role,verdict,obs}=aiAnalysis;
    const txt=`SIRE 2.0 HUMAN ELEMENT OBSERVATION ANALYSIS
${"=".repeat(50)}
Role: ${role}
Verdict: ${verdict}
PIF Selected: ${pif.code}. ${pif.sireCode}

Observation: ${obs}

WHY THIS PIF:
${aiAnalysis.whyPif}

5-WHY ROOT CAUSE:
${aiAnalysis.fiveWhy}

SYSTEMIC GAP:
${aiAnalysis.systemicGap}

EVIDENCE TO SIGHT:
${aiAnalysis.evidence}

OPERATOR RESPONSE REQUIRED:
${aiAnalysis.operatorGuidance}`;
    navigator.clipboard.writeText(txt);
  };

  const pifColor=(code)=>code===selectedCode?"#0ea5e9":detected.find(d=>d.code===code)?"#f59e0b":"#1e3a5f";
  const pifBg=(code)=>code===selectedCode?"rgba(14,165,233,.12)":detected.find(d=>d.code===code)?"rgba(245,158,11,.06)":"transparent";

  return(
    <div className="fade">
      <div style={{fontFamily:"Georgia,serif",fontSize:18,color:"#e2e8f0",marginBottom:4}}>🧠 Expert PIF Analyzer</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>SIRE 2.0 공식 9개 PIF 코드 기반 전문가 수준 선정 · 검사관·선박회사 공용</div>

      {/* INPUT */}
      <Card>
        <SLabel>Observation / 지적사항 *</SLabel>
        <AutoTextarea
          value={obs}
          onChange={e=>setObs(e.target.value)}
          placeholder="Enter observation here (English or Korean). e.g.: The free fall lifeboat release mechanism was found to be inadequately lubricated. Maintenance records showed last service was 14 months ago despite PMS requiring 12-monthly intervals..."
          style={{marginBottom:10}}
        />
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:0}}>
          <div>
            <SLabel>평가 대상 역할</SLabel>
            <select value={role} onChange={e=>setRole(e.target.value)} style={{width:"100%",background:"#080f1a",border:"1px solid #1e3a5f",borderRadius:6,color:"#e2e8f0",padding:"8px 10px",fontSize:12}}>
              {roles.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
          <div>
            <SLabel>평가 결과 (Verdict)</SLabel>
            <select value={verdict} onChange={e=>setVerdict(e.target.value)} style={{width:"100%",background:"#080f1a",border:"1px solid #1e3a5f",borderRadius:6,color:verdict==="Not as expected"?"#fca5a5":verdict==="Exceeded normal expectation"?"#22c55e":"#e2e8f0",padding:"8px 10px",fontSize:12}}>
              {verdicts.map(v=><option key={v}>{v}</option>)}
            </select>
          </div>
        </div>
      </Card>

      {/* DECISION TREE — 전문가 판단 흐름 */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:11,color:"#f59e0b",letterSpacing:1,fontWeight:"bold"}}>⚡ PIF 판단 흐름도 (전문가용)</div>
          <button onClick={()=>setShowDecisionTree(!showDecisionTree)} style={{background:"none",border:"1px solid #1e3a5f",color:"#64748b",borderRadius:4,padding:"3px 8px",cursor:"pointer",fontSize:10}}>
            {showDecisionTree?"접기 ▲":"펼치기 ▼"}
          </button>
        </div>
        {showDecisionTree&&(
          <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.8,borderLeft:"3px solid #f59e0b",paddingLeft:10}}>
            <div style={{color:"#f59e0b",fontWeight:"bold",marginBottom:4}}>Q1. 관련 절차서·체크리스트가 존재했나?</div>
            <div style={{paddingLeft:10,marginBottom:8}}>
              <span style={{color:"#dc2626"}}>→ 없었다 / 불충분했다:</span> <span style={{color:"#0ea5e9",fontWeight:"bold"}}>PIF 3</span> (절차 접근성·정확성)<br/>
              <span style={{color:"#22c55e"}}>→ 있었다: Q2로</span>
            </div>
            <div style={{color:"#f59e0b",fontWeight:"bold",marginBottom:4}}>Q2. 작업자가 절차를 알고 있었나?</div>

function ReportBuilder({setEvidenceList}){
  const [obs,setObs]=useState("");
  const [sireQ,setSireQ]=useState("");
  const [shipType,setShipType]=useState("Oil Tanker");
  const [company,setCompany]=useState("Shell");
  const [matched,setMatched]=useState([]);
  const [selPIFs,setSelPIFs]=useState([]);
  const [detectedPIFs,setDetectedPIFs]=useState([]);
  const [report,setReport]=useState(null);
  const [regRefs,setRegRefs]=useState([]);
  const [loading,setLoading]=useState(false);
  const [step,setStep]=useState("");
  const [err,setErr]=useState("");
  const [copied,setCopied]=useState(false);
  const [showHist,setShowHist]=useState(false);
  const [history,setHistory]=useState(()=>getHistory());

  useEffect(()=>{
    if(obs.length>10){
      const m=matchQuestions(obs);
      setMatched(m);
      if(m.length>0&&!sireQ) setSireQ(m[0].qno);
      const p=detectPIFs(obs);
      setDetectedPIFs(p);
      if(selPIFs.length===0) setSelPIFs(p.slice(0,2).map(x=>x.id));
    }
  },[obs]);

  // Delimiter-based parsing
  const parseReport=(raw)=>{
const get=(key)=>{
      const tag="##"+key+"##";
      const i=raw.indexOf(tag);
      if(i<0) return "";
      const s=raw.slice(i+tag.length);
      const n=s.search(/\n##[A-Z_0-9]+##/);
      return (n>=0?s.slice(0,n):s).trim();
    };
    const getList=(key)=>{
      const block=get(key);
      if(!block) return[];
      return block.split("\n").map(l=>l.replace(/^[-•*\d.]+\s*/,"").trim()).filter(Boolean);
    };
    return{
      observation_summary:get("OBSERVATION_SUMMARY"),
      sire_chapter:get("SIRE_CHAPTER"),
      applicable_regulations:getList("REGULATIONS"),
      primary_pif:get("PRIMARY_PIF"),
      correction:{immediate_action:get("CORRECTION_ACTION"),responsible_officer:get("RESPONSIBLE_OFFICER"),completion_timeframe:get("TIMEFRAME"),evidence_required:getList("EVIDENCE_REQUIRED")},
      corrective_action:{root_cause:get("ROOT_CAUSE"),pif_analysis:get("PIF_ANALYSIS"),sms_gap_identified:get("SMS_GAP"),investigation_finding:get("INVESTIGATION_FINDING")},
      preventive_action:{sms_revision:get("SMS_REVISION"),training_action:get("TRAINING_ACTION"),horizontal_deployment:get("HORIZONTAL_DEPLOYMENT"),management_review:get("MANAGEMENT_REVIEW"),kpi_monitoring:get("KPI_MONITORING")},
      evidence_checklist:getList("EVIDENCE_CHECKLIST"),
      tmsa_reference:get("TMSA_REFERENCE"),
    };
  };

  const generate=async()=>{
    if(!obs){setErr("Please enter the observation text.");return;}
    setLoading(true);setErr("");setReport(null);setRegRefs([]);

    try{
      const selPIFObjs=PIF_LIB.filter(p=>selPIFs.includes(p.id));
      const pifTxt=selPIFObjs.map(p=>`PIF ${p.code}. ${p.name}: ${p.desc}`).join("\n");
      const qData=sireQ&&SIRE_Q[sireQ]?SIRE_Q[sireQ]:null;
      const qCtx=qData
        ?`SIRE Q${sireQ}: ${qData.d}\nObjective: ${qData.o}\nGuidance: ${qData.i?.slice(0,200)}\nPublications: ${qData.p}`
        :`SIRE QUESTION: ${sireQ||"N/A"}`;

      // STEP 1: Translate Korean observation to English
      setStep("Translating to English...");
      let obsEn=obs;
      if(/[\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F]/.test(obs)){
        try{
          obsEn=await callClaude(
            "You are a maritime translator. Translate the following ship inspection observation to formal maritime English. Output ONLY the translated text with no prefix, explanation, or notes.",
            obs
          );
          obsEn=obsEn.trim();
        }catch(e2){ obsEn=obs; }
      }

      // STEP 2: Generate report
      setStep("Generating Rectification Report...");

      const sys=`You are a 20-year veteran Master Mariner, SIRE 2.0 Lead Inspector and Vetting Superintendent writing a Rectification Report for ${company}.
ABSOLUTE RULES:
1. Write EVERYTHING in English only — no Korean, no other language anywhere.
2. Never blame individuals — focus only on systemic/SMS failures.
3. Cite PIFs by number and official SIRE 2.0 name.
4. Every section must contain specific, substantive English content.
5. Place each ##MARKER## on its own line, followed immediately by the content on the next line.
6. Do NOT add any preamble, title, or text before the first ##MARKER##.`;

      const msg=`SHIP: ${shipType} | COMPANY: ${company} | DATE: ${new Date().toLocaleDateString("en-GB")} | SIRE Q: ${sireQ||"N/A"}
${qCtx}

OBSERVATION (English): ${obsEn}

PIFs: ${pifTxt}

Fill every section below with specific content. Start your response immediately with ##OBSERVATION_SUMMARY##.

##OBSERVATION_SUMMARY##
[2-sentence factual summary in English]

##SIRE_CHAPTER##
[e.g. Ch.5 — Safety Management]

##REGULATIONS##
[3 regulations, one per line: e.g. ISM Code Section 6.3 — Resources and Personnel]

##PRIMARY_PIF##
[e.g. PIF 3 (Procedures) — SMS checklist lacked specific inspection criteria for explosion-proof fittings]

##CORRECTION_ACTION##
[2-3 sentences: specific physical action taken immediately after inspection]

##RESPONSIBLE_OFFICER##
[Officer rank]

##TIMEFRAME##
[e.g. Completed within 24 hours of inspection date]

##EVIDENCE_REQUIRED##
[4 items, one per line]

##ROOT_CAUSE##
[2-3 sentences: the specific SMS/procedure gap that allowed this deficiency to exist]

##PIF_ANALYSIS##
[2-3 sentences: explain specifically why the selected PIF applies, referencing SIRE 2.0 PIF framework]

##SMS_GAP##
[1-2 sentences: which specific SMS/PMS element was absent or ineffective]

##INVESTIGATION_FINDING##
[1 clear sentence: the key systemic finding]

##SMS_REVISION##
[2-3 sentences: specific procedure or PMS section revised, with document reference and revision date]

##TRAINING_ACTION##
[2-3 sentences: specific training conducted, topic, participants, date]

##HORIZONTAL_DEPLOYMENT##
[2-3 sentences: how finding shared fleet-wide — DPA notification, fleet circular reference, sister vessel actions]

##MANAGEMENT_REVIEW##
[1-2 sentences: Master/CE/DPA review outcome and sign-off confirmation]

##KPI_MONITORING##
[1-2 sentences: one specific measurable KPI with monitoring frequency]

##EVIDENCE_CHECKLIST##
[5 items, one per line]

##TMSA_REFERENCE##
[e.g. TMSA 3 Element 4 KPI 4A.1 — Planned Maintenance System]`;

      const raw=await callClaude(sys,msg);

      // Robust parsing
      const get=(key)=>{
        const tag="##"+key+"##";
        const i=raw.indexOf(tag);
        if(i<0) return "";
        const s=raw.slice(i+tag.length);
        const n=s.search(/\n##[A-Z_0-9]+##/);
        return (n>=0?s.slice(0,n):s).trim();
      };
      const getList=(key)=>{
        const b=get(key);
        if(!b) return[];
        return b.split("\n").map(l=>l.replace(/^[-•*\d.]+\s*/,"").trim()).filter(Boolean);
      };

      const parsed={
        company,
        obs_translated:obsEn,
        observation_summary:get("OBSERVATION_SUMMARY")||obsEn.slice(0,300),
        sire_chapter:get("SIRE_CHAPTER")||(sireQ?`Ch.${sireQ.split(".")[0]} — ${CH_NAMES[sireQ.split(".")[0]]||""}`:""),
        applicable_regulations:getList("REGULATIONS"),
        primary_pif:get("PRIMARY_PIF"),
        correction:{
          immediate_action:get("CORRECTION_ACTION"),
          responsible_officer:get("RESPONSIBLE_OFFICER"),
          completion_timeframe:get("TIMEFRAME"),
          evidence_required:getList("EVIDENCE_REQUIRED")
        },
        corrective_action:{
          root_cause:get("ROOT_CAUSE"),
          pif_analysis:get("PIF_ANALYSIS"),
          sms_gap_identified:get("SMS_GAP"),
          investigation_finding:get("INVESTIGATION_FINDING")
        },
        preventive_action:{
          sms_revision:get("SMS_REVISION"),
          training_action:get("TRAINING_ACTION"),
          horizontal_deployment:get("HORIZONTAL_DEPLOYMENT"),
          management_review:get("MANAGEMENT_REVIEW"),
          kpi_monitoring:get("KPI_MONITORING")
        },
        evidence_checklist:getList("EVIDENCE_CHECKLIST"),
        tmsa_reference:get("TMSA_REFERENCE"),
      };

      setReport(parsed);
      setEvidenceList((parsed.evidence_checklist||[]).map((e,i)=>({id:i,text:e,checked:false})));
      saveHistory(parsed,obsEn,company);

      // STEP 3: Regulatory references
      setStep("Fetching regulatory references...");
      try{
        const refRaw=await callClaude(
          "Maritime legal expert. English only. Max 350 tokens. Concise mobile display.",
          `Observation: ${obsEn.slice(0,120)}\nSIRE Q: ${qData?.d?.slice(0,100)||""}\nPublications: ${qData?.p?.slice(0,120)||""}\n\nList 3 regulations. Format:\n##REG_1##\nSource: [e.g. ISM Code]\nTitle: [Specific article]\nRelevance: [One sentence why it applies.]\n\n##REG_2##\n...`
        );
        const refs=[];
        [...refRaw.matchAll(/##REG_\d+##\s*\n([\s\S]*?)(?=\n##REG_\d+##|$)/gi)].forEach(m=>{
          const b=m[1];
          const src=(b.match(/Source:\s*(.+)/i)?.[1]||"").trim();
          const title=(b.match(/Title:\s*(.+)/i)?.[1]||"").trim();
          const rel=(b.match(/Relevance:\s*(.+)/i)?.[1]||"").trim();
          if(src&&title) refs.push({src,title,relevance:rel});
        });
        if(refs.length>0) setRegRefs(refs);
        else if(qData?.p) setRegRefs([{src:"SIRE 2.0",title:qData.p.slice(0,80),relevance:"Referenced in SIRE 2.0 Q Library."}]);

      }
      setStep("");

    }catch(e){
      const msg=e.message||"";
      if(msg.includes("401")) setErr("API Key error — check via 🔑 button.");
      else if(msg.includes("429")) setErr("Rate limit exceeded — retry shortly.");
      else if(msg.includes("529")) setErr("Server overloaded — retry in 1-2 minutes.");

      else setErr("Error: "+msg.slice(0,150));
      setStep("");

          {/* Regulatory References */}

            <Card>
              <div style={{fontSize:11,fontWeight:"bold",color:"#0ea5e9",letterSpacing:1,marginBottom:14}}>

      {/* History Panel */}
      {showHist&&(
        <div style={{background:"#0d1b2e",border:"1px solid #f59e0b",borderRadius:10,padding:16,marginTop:8}} className="fade">

            <div key={h.id} style={{background:"#080f1a",border:"1px solid #1e3a5f",borderRadius:8,padding:12,marginBottom:8}}>

                <button onClick={()=>{setReport(h.rpt);setShowHist(false);}} style={{background:"#1e3a5f",border:"1px solid #0ea5e9",color:"#0ea5e9",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:11}}>📋 불러오기</button>
                <button onClick={()=>{delHistory(h.id);setHistory(getHistory());}} style={{background:"none",border:"1px solid #dc262640",color:"#dc2626",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:11}}>🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function F({label,val}){
  return(
    <div style={{marginBottom:12}}>
      <div style={{fontSize:9,color:"#64748b",letterSpacing:2,marginBottom:3,textTransform:"uppercase"}}>{label}</div>
      <div style={{fontSize:13,color:"#e2e8f0",lineHeight:1.7}}>{val||"—"}</div>
    </div>
  );
}
