  "5.2.16":{"ch": "5", "sec": "5.2", "s": "Fire doors", "d": "Were the Master, officers and crew familiar with the location, purpose, testing and operation of the vessel’s fire doors?", "o": "To ensure that crewmembers can respond effectively to a fire situation in accordance with the shipboard emergency plan.", "i": "IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protection systems and appliances 2 Operational readiness All fire protection systems and appliances should at all times be in good order and readily available for immediate use while the ship is in service. If a fire protection system is undergoing maintenance, testing or repair, then suitable arrangements should b", "a": "• • • • • Inspect a sample of fire doors throughout the accommodation, machinery and storage spaces and verify that: o They were free of obstructions. o No non-approved hold-open methods such as tiebacks, hooks, wedges or other arrangements were used to hold the door open where it was required to be self-closing. o Self-closing arrangements closed ", "p": "IMO: ISM Code IMO SOLAS IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protection systems and appliances.", "k": ["master", "familiar", "operation", "officers", "vessel", "doors", "location", "testing", "purpose"]},
  "5.3.1":{"ch": "5", "sec": "5.3", "s": "Firefighter’s outfits including self-contained breathing apparatus (SCBA)", "d": "Were the Master, officers and ratings familiar with the location and use of the vessel’s firefighter’s outfits including the self-contained breathing apparatus (SCBA), and was the equipment maintained in good condition and ready for immediate use in accordance with company procedures?", "o": "To ensure that crewmembers can respond effectively to a fire or enclosed space rescue situation in accordance with the shipboard emergency plans.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals Sixth Edition 10.13.4 Equipment maintenance A responsible person should examine all respiratory equipment at regular intervals. Defects should be made good promptly and a record should be kept of inspections and repair. Air cylinders should be recharged as soon as possible after use. Air cylinders that are damaged or corroded shou", "a": "", "p": "UK MCA: MSIS 12 Fire protection arrangements. For the guidance of surveyors in surveying fire protection arrangements to ensure compliance with requirements covering merchant ships. IMO: ISM Code IMO ", "k": ["company", "breathing", "contained", "ready", "familiar", "apparatus", "firefighter", "condition", "including", "immediate", "procedures", "outfits"]},
  "5.3.2":{"ch": "5", "sec": "5.3", "s": "Fire hoses, nozzles and international shore connection", "d": "Were the Master, officers and crew familiar with the location, purpose and operation of the vessel’s fire hoses, nozzles and international shore connection, and was the equipment in good working order and available for immediate use?", "o": "To ensure that crewmembers can respond effectively to a fire situation in accordance with the shipboard emergency plan.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 5.3.1.1 Water All tankers have a firefighting system that consists of pumps permanently connected to the sea, a fire main with hydrant points, fire hoses with couplings and jet nozzles or preferably jet/spray nozzles. Hydrants are located to ensure that two jets of water can reach any part of the ship. 5.5 Internat", "a": "• Inspect a random sample of the vessel’s fire hoses and nozzles from the accommodation, machinery spaces and main deck areas and verify that the washers, connecting spanners, connecting mechanisms and nozzle jet/spray controls were present and/or fully functional.", "p": "IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: FSS Code IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protectio", "k": ["connection", "equipment", "master", "familiar", "international", "operation", "officers", "vessel", "nozzles", "order", "available", "shore"]},
  "5.3.3":{"ch": "5", "sec": "5.3", "s": "Portable fire extinguishers", "d": "Were the Master, officers and ratings familiar with the location, purpose and operation of the vessel’s portable fire extinguishers, and were the extinguishers in good order and readily available for immediate use with operating instructions clearly marked?", "o": "To ensure that crewmembers can respond effectively to a fire situation in accordance with the shipboard emergency plan.", "i": "OCIMF: International Safety Guide for Oil Tankers and Terminals. Sixth Edition All fire extinguishers should be maintained and available for immediate use. The system for managing safety should contain procedures for maintenance, including that done by service agents. As a minimum, all fire extinguishers should be formally checked once a year that they are in the right location, have the right cha", "a": "• • • • Inspect a representative sample of each type of portable extinguisher found onboard and verify that each fire extinguisher was: o Marked with the information required under A.951(23) 8.1. o Marked with the date of the last annual service. o Marked with the date of the last check by vessel staff. o In the correct position as indicated by the", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: ISM Code IMO SOLAS IMO: Resolution A.951(23) Improved Guidelines for Marine Portable fire extinguishers. IMO: M", "k": ["extinguishers", "master", "familiar", "operating", "operation", "officers", "clearly", "ratings", "vessel", "order", "available", "location"]},

  "5.3.5":{"ch": "5", "sec": "5.3", "s": "Wheeled (mobile) fire extinguishers", "d": "Were the Master, officers and engine ratings familiar with the purpose and operation of the vessel’s wheeled (mobile) fire extinguishers, and was the equipment in good order and available for immediate use with operating instructions clearly marked?", "o": "To ensure that crewmembers can respond effectively to a fire situation in accordance with the shipboard emergency plan.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals Sixth Edition Chapter 5 Fire Protection. All fire extinguishers should be maintained and available for immediate use. The system for managing safety should contain procedures for maintenance, including that done by service agents. As a minimum, all fire extinguishers should be formally checked once a year that they are in the righ", "a": "• • • • Inspect the wheeled fire extinguishers in the machinery spaces and verify each extinguisher was: o Marked with the required information. o Marked with the date of the last annual service. o Marked with the date of the last check by vessel staff. o In the correct position as indicated by the fire control plan. If necessary, review the record", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protectio", "k": ["wheeled", "purpose", "familiar", "operating", "operation", "clearly", "engine", "marked", "mobile", "immediate", "officers", "order"]},

  "5.4.5":{"ch": "5", "sec": "5.4", "s": "Liferafts, hydrostatic releases and liferaft launching appliances", "d": "Were the Master and officers familiar with the operation of the liferafts, hydrostatic releases and liferaft launching appliances, where provided, and were they in good order with records available to demonstrate that they had been serviced, inspected and tested as required?", "o": "To ensure that liferafts, hydrostatic releases and, liferaft launching appliances, where fitted, will function correctly in an emergency.", "i": "IMO: LSA Code 4.1.6 Float-free arrangements for liferafts, 4.1.6.3 Hydrostatic release units If a hydrostatic release unit is used in the float-free arrangements, it shall: 1. 2. 3. be permanently marked on its exterior with its type and serial number. be permanently marked on the unit or identification plate securely attached to the unit, with the date of manufacture, type, and serial number and ", "a": "", "p": "IMO: ISM Code IMO SOLAS IMO: LSA Code IMO: MSC.1/Circ.1490/Rev 1. Revised Unified Interpretation of SOLAS Regulation III/31.1.4 (MSC.1/Circ.1490)", "k": ["appliances", "serviced", "demonstrate", "records", "familiar", "operation", "hydrostatic", "inspected", "officers", "order", "available", "liferafts"]},
  "5.4.6":{"ch": "5", "sec": "5.4", "s": "Lifebuoys, and associated lights, smoke floats and lifelines", "d": "Were the lifebuoys, and associated lights, smoke floats and lifelines, in good order, clearly marked and correctly distributed around the ship?", "o": "To ensure that all life-saving appliances are in working order and ready for immediate use.", "i": "IMO: LSA Code 2.1.1 Every lifebuoy shall: .7 If it is intended to operate the quick-release arrangement provided for the self-activated smoke signals and selfigniting lights, have a mass of not less than 4 kg. IMO: Resolution A.658 (16) Use and fitting of retro-reflective materials on life-saving appliances 3 Lifebuoys Retro-reflective materials of a sufficient width (approximately 5 cm) should be", "a": "• • Sight, and where necessary review, the company procedure to ensure that lifebuoys, and associated lights, smoke floats and lifelines, were in good order, clearly marked and correctly distributed around the ship. Inspect a selection of the ship’s lifebuoys, and associated lights, smoke floats and lifelines. Any matters relating to the lifebuoy a", "p": "IMO: ISM Code IMO SOLAS IMO: LSA Code IMO: Resolution A 658 (16) Use and fitting of retro-reflective materials on life-saving appliances", "k": ["lifebuoys", "correctly", "lifelines", "smoke", "clearly", "order", "floats", "distributed", "lights", "marked", "associated", "around"]},
  "5.4.7":{"ch": "5", "sec": "5.4", "s": "Immersion suits", "d": "Were the Master, officers and ratings familiar with the immersion suits, and were the immersion suits in good order, readily accessible and their location(s) clearly indicated?", "o": "To ensure that all life-saving appliances are in working order and ready for immediate use.", "i": "IMO: LSA Code 2.3 Immersion suits 2.3.1 General requirements for immersion suits 2.3.1.1 An immersion suit shall be constructed with waterproof materials such that: .1 it can be unpacked and donned without assistance within 2 min, taking into account donning of any associated clothing, donning of a life jacket if the immersion suit is to be worn in conjunction with a lifejacket to meet the require", "a": "", "p": "IMO: ISM Code IMO SOLAS IMO: LSA Code IMO: MSC/Circ.1047 Guidelines for monthly shipboard inspection of immersion suits and anti-exposure suits by ships’ crews IMO: MSC/Circ.1114 Guidelines for period", "k": ["indicated", "master", "familiar", "immersion", "officers", "suits", "ratings", "order", "clearly", "accessible", "location", "their"]},
  "5.4.8":{"ch": "5", "sec": "5.4", "s": "Lifejackets and personal flotation devices (PFDs)", "d": "Were the Master, officers and ratings familiar with the lifejackets and personal flotation devices (PFDs) provided on board, and was the equipment in good condition, and properly maintained?", "o": "To ensure that all life-saving appliances are in working order and ready for immediate use.", "i": "IMO: LSA Code 2.2.1.13 Each lifejacket shall be provided with means of securing a lifejacket light… 2.2.1.14 Each lifejacket shall be fitted with a whistle firmly secured by a lanyard. 2.2.1.15 Lifejacket lights and whistles shall be selected and secured to the lifejacket in such a way that their performance in combination is not degraded. 2.2.1.16 A lifejacket shall be provided with a releasable ", "a": "• • • • • • Sight, and where necessary review, the company procedures to ensure that the lifejackets required by SOLAS were in good order, readily accessible and their location(s) clearly indicated. Sight, and where necessary review, the company procedures providing guidance on the use of “working lifejackets”, including the servicing of inflatable", "p": "IMO: ISM Code IMO SOLAS UK MCA: Code of Safe Working Practices for Merchant Seafarers IMO: LSA Code IMO: Resolution A 658 (16) Use and fitting of retro-reflective materials on life-saving appliances", "k": ["maintained", "master", "familiar", "properly", "lifejackets", "officers", "personal", "ratings", "board", "provided", "condition", "equipment"]},
  "5.4.9":{"ch": "5", "sec": "5.4", "s": "Emergency lighting.", "d": "Were the Master and officers familiar with the company procedures for the periodic testing and maintenance of the emergency lighting system, was there evidence of periodic testing, and was the system in proper operating condition?", "o": "To ensure that the emergency lighting system will operate correctly in the event of a loss of primary power and lighting.", "i": "USCG: Code of Federal Regulations. Title 46. 97.15-30 Emergency lighting and power systems. (a) Where fitted, it shall be the duty of the master to see that the emergency lighting and power systems are operated and inspected at least once in each week that the vessel is navigated to be assured that the system is in proper operating condition. (d) The date of the tests and the condition and perform", "a": "• • • • • • • Sight and where necessary review, the company procedures for the inspection and testing of the emergency lighting system. Check records to verify that inspection and testing of the emergency lighting had taken place in accordance with the company procedures. Request a demonstration of the emergency lighting. Inspect a representative s", "p": "IMO: ISM Code IMO SOLAS IACS: UI SC 213 Arrangements for remotely located survival craft USCG: Code of Federal Regulations. Title 46.", "k": ["proper", "company", "periodic", "master", "familiar", "procedures", "maintenance", "operating", "lighting", "officers", "there", "evidence"]},
  "5.5.1":{"ch": "5", "sec": "5.5", "s": "Enclosed space entry procedures", "d": "Were the Master, officers and ratings familiar with the company enclosed space entry procedures, and was evidence available to demonstrate that all enclosed space entries had been made in strict compliance with the procedures?", "o": "To ensure that enclosed space entry is always strictly controlled and conducted in accordance with industry best practice.", "i": "", "a": "", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: Resolution A.1050(27) Revised Recommendations for Entering Enclosed Spaces Aboard Ships.", "k": ["enclosed", "company", "master", "familiar", "procedures", "officers", "ratings", "evidence", "entries", "available", "entry", "demonstrate"]},
  "5.5.2":{"ch": "5", "sec": "5.5", "s": "Hot work procedure", "d": "Were the Master, officers and, where directly involved, ratings familiar with the company hot work procedure, and was evidence available to demonstrate that hot work had been conducted in accordance with the procedure?", "o": "To ensure that hot work is always carried out in a controlled manner.", "i": "The vessel operator should have developed procedures for managing hot work onboard which should include but not be limited to: • • • • • • • The definition of hot work. The control of hot work. Work planning, risk assessment and the issue of hot work permits. Hot work inside a designated space. Hot work outside a designated space. o Hot Work in a gas safe area. o Hot work inside the machinery spac", "a": "• • Sight, and where necessary review, the company hot work procedures. If hot work had taken place within any hazardous area during the previous six months, select not more than two permits, and verify that:", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["conducted", "company", "master", "familiar", "involved", "officers", "procedure", "ratings", "evidence", "available", "directly", "where"]},
  "5.5.3":{"ch": "5", "sec": "5.5", "s": "Working at height", "d": "Were the Master, officers and ratings familiar with the company procedure for working at height, and was there evidence that risk control measures such as permits to work or documented risk assessments were consistently used whenever work was undertaken at height?", "o": "To ensure that work at height is always conducted in a controlled manner with procedures to manage and mitigate risk to workers.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers. Chapter 14.2 Permit to work systems 14.2.1 There are many types of operation on board ship when the routine actions of one person may inadvertently endanger another, or when a series of action steps need to be taken to ensure the safety of those engaged in a specific operation. In all circumstances it is necessary, before the work is d", "a": "• • • • • Sight, and where necessary review, the company safe work procedure for working at height. Review several recent work at height permits or risk assessments and verify that: o The work described in the permits and/or risk assessments reflected the circumstances found onboard the vessel being inspected. o The permits and/or risk assessments ", "p": "IMO: ISM Code UK MCA: Code of Safe Working Practices for Merchant Seafarers", "k": ["company", "permits", "master", "familiar", "documented", "consistently", "height", "undertaken", "assessments", "officers", "there", "procedure"]},
  "5.5.4":{"ch": "5", "sec": "5.5", "s": "Working over the side", "d": "Were the Master, officers and ratings familiar with the company procedures for working over the side, and was there evidence that risk control measures such as standard work procedures, permits to work or documented risk assessments were consistently used whenever work was undertaken over the side?", "o": "To ensure that work over the side is always conducted in a controlled manner with procedures to manage and mitigate risk to workers.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers. Chapter 14.2 Permit to work systems 14.2.1 There are many types of operation on board ship when the routine actions of one person may inadvertently endanger another, or when a series of action steps need to be taken to ensure the safety of those engaged in a specific operation. In all circumstances it is necessary, before the work is d", "a": "• • • Sight, and where necessary review, the company safe work procedures for working over the side. Review any standard work procedures for working over the side while the vessel was underway such as for rigging a combination or accommodation ladder. Review several recent work over the side permits or risk assessments and verify that: o The work d", "p": "UK MCA: Code of Safe Working Practices for Merchant Seafarers", "k": ["company", "permits", "master", "familiar", "procedures", "documented", "consistently", "undertaken", "assessments", "officers", "there", "ratings"]},
  "5.5.5":{"ch": "5", "sec": "5.5", "s": "Working on electrical equipment and systems", "d": "Were the Master and officers familiar with the company procedures for working on electrical equipment and systems, and was there evidence that risk control measures such as permits to work and/or documented risk assessments were consistently used whenever work was undertaken on electrical equipment and systems?", "o": "To ensure that work on electrical equipment and systems is always conducted in a controlled manner with procedures to manage and mitigate risk to workers.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers. Chapter 14.2 Permit to work systems 14.2.1 There are many types of operation on board ship when the routine actions of one person may inadvertently endanger another, or when a series of action steps need to be taken to ensure the safety of those engaged in a specific operation. In all circumstances it is necessary, before the work is d", "a": "• • • Sight, and where necessary review, the company safe work procedures for working on electrical equipment or systems. Where necessary, review the planned maintenance system or daily work planning meeting records to identify when work on electrical equipment or systems may have taken place. Review at least two recent permits and/or risk assessme", "p": "IMO: ISM Code UK MCA: Code of Safe Working Practices for Merchant Seafarers", "k": ["company", "undertaken", "consistently", "electrical", "familiar", "control", "procedures", "officers", "there", "working", "equipment", "measures"]},
  "5.5.6":{"ch": "5", "sec": "5.5", "s": "Control of hazardous energy", "d": "Were the Master and officers familiar with the company procedures for the control of hazardous energy, and was evidence available, through documented risk assessment or permits, that hazardous energy sources were routinely identified and isolated before working on, or in, machinery, systems or spaces where hazardous energy could be present?", "o": "To ensure that hazardous energy sources are always identified and effectively isolated before work starts on, or in, machinery, systems or spaces where hazardous energy sources could be present.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. Chapter 4.4 Lock-out/Tag-out Specially designed LO/TO equipment is widely available that provides a system for preventing a valve or device being operated until the lock or tag has been removed, usually under a documented system of safe management control. Uses vary but could include the isolation of overboard sea ", "a": "• • • • Sight, and where necessary review, the company control of hazardous energy procedures. Review at least two recent permits, risk assessments or other work process documents which were used to identify and control hazardous energy sources before work on, or in, machinery, systems or spaces. If necessary, review the planned maintenance system ", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "isolated", "assessment", "energy", "routinely", "sources", "familiar", "control", "through", "procedures", "spaces", "officers"]},
  "5.6.1":{"ch": "5", "sec": "5.6", "s": "Portable and personal gas measurement instruments", "d": "Were the Master and officers familiar with the purpose, operation, testing, maintenance and calibration of the vessel’s portable and personal gas measurement instruments, and was the equipment on board sufficient, in good working order, regularly tested and periodically calibrated?", "o": "To ensure sufficient calibrated portable and personal gas measurement instruments are always available on board to enable safe enclosed space entry and cargo operations.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 2.4.2 Gas measurement instruments Some gas measurement instruments can analyse only one type of gas. Other can analyse several pre-set types of gases at the same time (multi-gas detectors) and have a range of capabilities based on different technologies. They can be divided into personal, portable and fixed gas meas", "a": "", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IGC Code IMO: IBC Code IMO: MSC.1/Circ.1456 Unified interpretations of SOLAS Chapter II", "k": ["periodically", "personal", "sufficient", "calibrated", "regularly", "purpose", "familiar", "operation", "officers", "board", "order", "portable"]},
  "5.6.2":{"ch": "5", "sec": "5.6", "s": "Testing the atmosphere in double-hull and double bottom spaces for flammable gas", "d": "Were the Master and deck officers familiar with the company procedures for testing the atmosphere in double-hull and double bottom spaces for flammable gas, and were records available to confirm that appropriate measurements had been taken using the equipment fitted to, or provided on, the vessel?", "o": "To ensure that structural failures between cargo tanks adjacent to ballast tanks and void spaces of doublehull and double-bottom spaces are promptly detected.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.3.4 Monitoring of Void and Ballast Spaces. Void and ballast spaces in the cargo tank block should be regularly monitored for leaks from nearby tanks. Monitoring should include regular atmosphere checks for hydrocarbon content and regular sounding/ullaging of the empty spaces. TMSA KPI 4.2.2 requires that cargo, v", "a": "• • • • • • Sight, and where necessary review, the company procedures for detecting and monitoring flammable gas concentrations in double-hull, double-bottom and void spaces. Review the records of flammable gas measurements in double-hull and double-bottom spaces and verify that tests had been completed in accordance with company procedures. Where ", "p": "IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: FSS Code", "k": ["company", "appropriate", "atmosphere", "confirm", "records", "familiar", "measurements", "flammable", "procedures", "spaces", "double", "officers"]},
  "5.6.3":{"ch": "5", "sec": "5.6", "s": "Fixed gas detection systems required by the IGC Code", "d": "Were the Master and officers familiar with the location, purpose and operation of the vessel’s fixed gas detection systems required by the IGC Code, and was the equipment in good working order, regularly maintained and calibrated?", "o": "To ensure that the vessel staff can detect unintentional releases or leaks from the cargo system.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 4.11.5 Gas detection systems Releases of flammable or toxic gases pose an immediate threat to both personnel and equipment. It is necessary to detect accidental discharge as early as possible to avoid the possibility of confined or partially confined vapour cloud explosions, flash fires and the presence of asphyxi", "a": "", "p": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. IMO: ISM Code IMO: IGC Code", "k": ["maintained", "master", "familiar", "operation", "officers", "detection", "vessel", "order", "systems", "location", "required", "working"]},
  "5.6.4":{"ch": "5", "sec": "5.6", "s": "Fixed gas detection system required by the IGF Code", "d": "Were the Master and officers familiar with the location, purpose and operation of the vessel’s fixed gas detection system required by the IGF Code, and was the equipment in good working order, regularly maintained and calibrated in accordance with company procedures and manufacturer’s instructions?", "o": "To ensure that the vessel is protected from the consequences of unintentional releases or leaks from the gas or other low-flashpoint fuel system.", "i": "IMO: A 31/Res.1140 Survey guidelines under the harmonized system of survey and certification (HSSC) (Cargo Ship Safety Construction Certificate, Annual Survey) 2.2.5.5 confirming the availability of test and calibration records of the gas detection systems (IGF Code ch.15). TMSA KPI 3.1.4 requires that formal familiarisation procedures are in place for vessel personnel, including contractors. The ", "a": "• • • • • • Sight, and where necessary review, the company procedure which defined the operation and maintenance requirements for the fixed gas detecting system required by the IGF Code. Inspect the central control station for the gas detection system and verify that: o The gas detecting system was fully operational. o The system was not indicating", "p": "IMO: ISM Code IMO: IGF Code IMO: A 31/Res.1140 Survey guidelines under the harmonized system of survey and certification (HSSC)", "k": ["company", "calibrated", "regularly", "purpose", "familiar", "operation", "system", "procedures", "officers", "order", "location", "working"]},
  "5.6.5":{"ch": "5", "sec": "5.6", "s": "Cargo pump room fixed gas detection system", "d": "Were the Master and officers familiar with the operation and maintenance of the cargo pump room fixed gas detection system, and was the equipment fully operational with sensors calibrated and alarm activation points set in accordance with company procedures and manufacturer's instructions?", "o": "To ensure that measures specifically designed to prevent fire in the pumproom are effective.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 12.1.14.7 The safety of pump rooms can be enhanced in a number of other ways, some of which are mandatory for certain ships: A fixed gas detection system capable of continuously monitoring for hydrocarbon, oxygen and toxic gases. Where such equipment is fitted, procedures should be developed to ensure it is regular", "a": "• • • • • Sight, and where necessary review, the company procedure for the operation and maintenance of the cargo pump room fixed gas detection system. Inspect the central control station for the pump room fixed gas detection system and verify that: o The gas detection system was fully operational. o The system was not indicating any faults. o The ", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: MSC.1/Circ. 1321 Guidelines for measures to prevent fires in engine-rooms and cargo pum", "k": ["company", "calibrated", "operational", "points", "familiar", "operation", "sensors", "system", "cargo", "activation", "procedures", "fully"]},
  "5.6.6":{"ch": "5", "sec": "5.6", "s": "Oxygen sensors in inert gas system spaces.", "d": "Were the Master and officers familiar with the operation and maintenance of the oxygen sensors and associated alarms fitted in the space, or spaces, containing the inert gas system, and was the equipment fully operational with sensors calibrated and alarm activation points set in accordance with company procedures and manufacturer's instructions?", "o": "To ensure that entry into the space, or spaces, containing the inert gas plant is always made safely.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 10.4.3 Risk from inert gas including nitrogen IG produced from boiler flue gas, or an IG generator, may contain carbon monoxide (CO) and CO2, both of which can cause death. CO is a toxic gas that may be present in cargo tank atmospheres after gas freeing and in spaces containing components of the IG plant. CO2 is no", "a": "• Sight, and where necessary review, the company procedures that described the calibration, testing and maintenance of the oxygen sensors and associated alarms fitted in the space, or spaces, containing the inert gas system.", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: FSS Code", "k": ["company", "calibrated", "operational", "containing", "space", "inert", "points", "familiar", "operation", "sensors", "system", "alarms"]},
  "5.7.1":{"ch": "5", "sec": "5.7", "s": "Incident investigation reports for defined incidents", "d": "Had all onboard incidents been reported and investigated in accordance with company procedures, and was an incident investigation report or a summarised lessons learned bulletin available for each incident at or above a defined threshold?", "o": "To ensure that seafarers can learn from incidents which occurred onboard their vessel to improve safety and pollution prevention standards.", "i": "OCIMF / INTERTANKO: Sharing Lessons Learned from Incidents. First Edition 2018. Purpose and Scope The shipping industry has worked hard in recent years to eliminate personal injuries and reduce damage to the environment and assets. Though we have taken big steps towards ensuring that each day ends safely for everybody in our industry, we still need to do more. In particular, we must make sure that", "a": "• • • Review the incidents reported through the HVPQ and the PIQ and verify that either an incident investigation report or a lesson learned bulletin was available onboard for each reported incident where the vessel operator had declared that the incident investigation had been completed. Review the onboard system for recording and tracking inciden", "p": "IMO: ISM Code OCIMF/INTERTANKO: Sharing Lessons Learned from Incidents (first edition 2018)", "k": ["company", "report", "learned", "incident", "threshold", "above", "reported", "reports", "defined", "investigation", "bulletin", "summarised"]},
  "5.7.2":{"ch": "5", "sec": "5.7", "s": "Incident and near-miss reporting procedure", "d": "Were the Master, officers and ratings familiar with the company incident and nearmiss reporting procedure and was evidence available to demonstrate that incidents and near-misses had been investigated and closed out in accordance with the company procedure?", "o": "To ensure that seafarers can learn from incidents and near-misses onboard their vessel to improve safety and pollution prevention.", "i": "OCIMF / INTERTANKO: Sharing Lessons Learned from Incidents (First edition 2018) 1.1 Background: why we need guidelines Vessel operators have different ways of managing the lessons learned from incidents. Some have detailed programmes, while some use simpler procedures. In either case, an operator’s response will have evolved over time to suit its own organisational structure and needs. While each ", "a": "• • • Sight, and where necessary review, the company procedure that required incidents and near-misses were promptly reported and investigated. Review the system for recording and tracking incident and near-miss reports, select two reports and verify that: o The details of each incident or near-miss had been recorded in the format required by the c", "p": "IMO: ISM Code IMO: MSC-MEPC.7/Circ.7 Guidance on near-miss reporting IMO: MSC-MEPC.7/Circ.8 Revised guidelines for the operational implementation of the international safety management (ISM) code by c", "k": ["closed", "company", "nearmiss", "reporting", "master", "familiar", "incidents", "investigated", "incident", "officers", "misses", "procedure"]},
  "5.7.3":{"ch": "5", "sec": "5.7", "s": "Shipboard safety meetings", "d": "Were the Master, officers and ratings familiar with the company procedure for holding and documenting shipboard safety meetings and was evidence available that safety concerns raised at the meetings were acknowledged and addressed by shore management?", "o": "To ensure that there is an effective two-way dialogue between the vessel staff and shore-based management in matters relating to safety and pollution prevention at both the fleet and individual vessel level. UK MCA: Code of Safe Working Practices for", "i": "The vessel operator should have developed procedures for shipboard safety meetings which required the following: • • • • • • • To hold a shipboard safety meeting: o At a defined frequency. o After a serious incident onboard or in the fleet. o During shore management representative visits onboard, where practical based on shipboard operations and hours of rest considerations. To define who should a", "a": "• • • Sight, and where necessary review, the company procedures which defined the requirements for holding shipboard safety meetings. Review the safety meeting minutes held within the previous six months, select one for detailed review and verify that: o A routine safety meeting had been held at approximately monthly intervals. o An extraordinary s", "p": "IMO: ISM Code UK MCA: Code of Safe Working Practices for Merchant Seafarers", "k": ["company", "procedure", "shore", "holding", "raised", "acknowledged", "familiar", "concerns", "officers", "meetings", "documenting", "shipboard"]},
  "5.7.4":{"ch": "5", "sec": "5.7", "s": "Work planning procedure", "d": "Were the Master, officers and ratings familiar with the company work planning procedures and were records available to demonstrate that onboard work planning meetings had been conducted and documented in accordance with the procedures?", "o": "To ensure that all onboard work activities are planned to agree the scope of work and specific safety requirements applicable to each task, and to avoid operational, departmental or rest hour conflicts.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 4.7.5 Work Planning Meetings Work planning meetings should be held to ensure that operations and maintenance tasks are correctly planned and managed, with the aim of completing all tasks safely and efficiently. These meetings may include discussion of: • • • • Risk assessments. Work permits. Isolation and tagging r", "a": "• • • • Sight, and where necessary review, the company procedure which defined the requirements for documented work planning meetings. Review several work planning meeting records from the previous month and verify that: o Work planning meetings had been held at the frequency defined by the company procedure. o The outcome of the work planning meet", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["conducted", "company", "documented", "master", "familiar", "procedures", "officers", "meetings", "procedure", "ratings", "available", "onboard"]},
  "5.7.5":{"ch": "5", "sec": "5.7", "s": "Stop Work Authority", "d": "Were the Master, officers and ratings familiar with the purpose and implementation of the company Stop Work Authority policy and procedure?", "o": "To ensure that vessel staff are aware of their responsibility and authority to stop unsafe work.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition Chapter 4.2 Stop Work Authority It is recommended that tanker and terminal safety management systems include a Stop Work Authority (SWA) policy and procedure. The SWA gives employees and contractors the responsibility and obligation to intervene and stop work if they see something unsafe that may cause an accident. ", "a": "• • Review the company Stop Work Authority policy and procedure. Randomly question at least three, but not more than five, crewmembers during the inspection about the company Stop Work Authority procedure to verify their understanding. • Under no circumstances deliberately commit any act to test whether a crew-member is aware of the company expecta", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "master", "familiar", "authority", "officers", "procedure", "ratings", "implementation", "policy", "purpose"]},
  "5.7.6":{"ch": "5", "sec": "5.7", "s": "Risk assessments for new, non-routine, unplanned or specified tasks", "d": "Were the Master, officers and ratings familiar with the company procedures for risk assessment, as appropriate to their duties, and was there evidence of the development and review of risk assessments in accordance with the procedures?", "o": "To ensure that new, non-routine or unplanned tasks, not covered by existing procedures, are subject to risk assessment before work starts, and that risk assessments are reviewed before work starts on other specified tasks such as enclosed space entry", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. Chapter 4.2.2 Risk Assessment A key tool used by the industry, and a function of all SMSs for managing potential risks, is the process of a risk assessment. A risk assessment can identify potential hazards, i.e. anything that may cause harm, and analyse the likelihood and severity of a hazard arising and the conseq", "a": "• • • • Sight, and where necessary review, the company procedure for developing and / or reviewing a risk assessment. Review two sample risk assessments relating to new, non-routine, unplanned or specified tasks onboard during the previous three months and verify that they: o Contained details that were pertinent and relevant to the task that was b", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IACS: Rec No.127. A Guide to Risk Assessment in Ship Operations UK MCA: Code of Safe Working Practices", "k": ["company", "appropriate", "routine", "assessment", "familiar", "development", "procedures", "officers", "there", "duties", "accordance", "master"]},
  "5.7.7":{"ch": "5", "sec": "5.7", "s": "Safety Data Sheets.", "d": "Were Safety Data Sheets (SDS) available on board for all cargo, bunkers, chemicals, paints and other products being handled, and were crew members familiar with their use?", "o": "To ensure crew members are provided with clear, accurate information on the health and environmental effects of all hazardous and toxic substances carried on board, including guidance on their safe handling.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 1.4.4 Safety Data Sheets The Safety Data Sheets (SDSs) should indicate the type and probable concentrations of hazardous or toxic components in the cargo or bunkers to be loaded, particularly H2S and benzene. The SDS should be United Nations Globally Harmonized System of Classification and Labelling of Chemicals (UN", "a": "• • • • Sight and where necessary review the company procedures to ensure that up to date Safety Data Sheets (SDS) are readily available for all hazardous or toxic substances carried on board and to give guidance on the handling and stowage of these substance", "p": "IMO: Resolution MSC.286(86) Recommendations for material safety data sheets (MSDS) for MARPOL Annex I oil cargo and oil fuel IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tanke", "k": ["chemicals", "familiar", "members", "paints", "handled", "sheets", "board", "bunkers", "available", "being", "safety", "other"]},
  "5.7.8":{"ch": "5", "sec": "5.7", "s": "Simultaneous Operations (SIMOPS) procedure", "d": "Were the Master, officers and ratings familiar with the company Simultaneous Operations (SIMOPS) procedure and was there evidence that SIMOPS were considered during work planning and the required controls implemented for the duration of such operations?", "o": "To ensure that the impact of Simultaneous Operations (SIMOPS) is understood and managed effectively.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. Chapter 4.6 Simultaneous Operations Simultaneous Operations (SIMOPS) are activities that take place at the same time in the same area or that could directly or indirectly affect the safety of any other activity on the ship or at the terminal. SIMOPS should be established at an early stage so that the risk assessmen", "a": "• • • • • Sight, and where necessary review, the company procedure which provided guidance and instruction on Simultaneous Operations. Review the SIMOPS guidance tools, where provided: o The decision matrix. o The matrix of permitted operations. Review recent examples where the vessel staff had identified potential SIMOPS and documented the appropr", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "considered", "controls", "master", "familiar", "during", "officers", "operations", "procedure", "ratings", "there", "evidence"]},
  "5.8.1":{"ch": "5", "sec": "5.8", "s": "Safety inspection of the main deck and mooring areas.", "d": "Were the Master and officers familiar with the company procedure for safety inspections of the main deck areas, and had inspections been effective in identifying hazards to health, safety and the environment?", "o": "To ensure that the main deck areas are always maintained in a safe condition.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers 2.5 Good housekeeping 2.5.1 All ships move in a seaway and as space is very limited aboard any vessel, good housekeeping is essential for safe working/access and hygiene control. Attention should be paid in particular to the: • • • safe and secure stowage of loose items; proper securing of doors, etc.; adequate illumination of all work/", "a": "• • Sight, and where necessary review, the company procedure which requires that safety inspections of the main deck are conducted at appropriate intervals by the designated Safety Officer to identify hazards and potential hazards to health, safety and the environment Where necessary review the records of safety inspections of the main deck areas, ", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. UK MCA: Code of Safe Working Practices for Merchant Seafarers OCIMF: Mooring Equipment Guidelines. Fou", "k": ["company", "effective", "master", "familiar", "identifying", "health", "inspections", "hazards", "mooring", "officers", "procedure", "safety"]},
  "5.8.2":{"ch": "5", "sec": "5.8", "s": "Safety inspection of the machinery space.", "d": "Were the Master and officers familiar with the company procedure for safety inspections of the machinery spaces, and had inspections been effective in identifying hazards to health, safety and the environment?", "o": "To ensure that the machinery spaces are always maintained in a safe condition.", "i": "ICS: Engine Room Procedures Guide. First Edition. 11.14 Essential Engine Room Seamanship. Good housekeeping is a routine matter that should not be neglected in an engine room, even during times of heavy workload or in the event of reactive breakdown maintenance. Ships are huge moving objects on frequently unstable seas. Good housekeeping is therefore essential to ensure safety, hygiene and securit", "a": "", "p": "IMO: ISM Code IMO SOLAS UK MCA: Code of Safe Working Practices for Merchant Seafarers ICS: Engine Room Procedures Guide. First Edition.", "k": ["company", "effective", "master", "familiar", "spaces", "identifying", "inspections", "hazards", "health", "officers", "procedure", "machinery"]},
  "5.8.3":{"ch": "5", "sec": "5.8", "s": "Safety inspections of the cargo pumproom", "d": "Were the Master and officers familiar with the company procedure for safety inspections of the cargo pumproom, and had inspections been effective in identifying hazards to health, safety and the environment?", "o": "To ensure that the cargo pump room is always maintained in a safe condition.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 4.11.7 Inspection, maintenance and testing of electrical equipment 4.11.7.1 Inspection and checks Typical inspections should include checking: Cracks in metal casings or covers, cracked or broken glass, or failure of cement around glass in flame-proof or explosion-proof enclosures. Covers of flame-proof enclosures, ", "a": "• • • • Sight, and where necessary review, the company procedure which required that safety inspections of the cargo pumproom were conducted at appropriate intervals by the designated Safety Officer to identify hazards and potential hazards to health, safety and the environment Where necessary review the records of safety inspections of the cargo p", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: MSC.1/Circ. 1321 Guidelines for measures to prevent fires in engine-rooms and cargo pump-rooms.", "k": ["company", "effective", "master", "familiar", "pumproom", "identifying", "inspections", "hazards", "health", "officers", "procedure", "safety"]},

  "5.8.5":{"ch": "5", "sec": "5.8", "s": "Safety inspection of the forecastle spaces", "d": "Were the Master and officers familiar with the company procedure for safety inspections of the forecastle, and had inspections been effective in identifying hazards to health, safety and the environment?", "o": "To ensure that the forecastle is always maintained in a safe condition.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers 2.5 Good housekeeping 2.5.1 All ships move in a seaway and as space is very limited aboard any vessel, good housekeeping is essential for safe working/access and hygiene control. Attention should be paid in particular to the: • • safe and secure stowage of loose items; adequate illumination of all work/transit areas; OCIMF/ICS: Internat", "a": "• • • Sight, and where necessary review, the company procedure which required that safety inspections of the forecastle were conducted at appropriate intervals by the designated Safety Officer to identify hazards and potential hazards to health, safety and the environment. Where necessary review the records of safety inspections of the forecastle, ", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. UK MCA: Code of Safe Working Practices for Merchant Seafarers", "k": ["company", "effective", "master", "familiar", "identifying", "health", "inspections", "hazards", "spaces", "officers", "procedure", "forecastle"]},
  "5.8.6":{"ch": "5", "sec": "5.8", "s": "Safety inspections of the accommodation spaces", "d": "Were the Master and officers familiar with the company procedure for safety inspections of the accommodation, and had inspections been effective in identifying hazards to health, safety and the environment?", "o": "To ensure that the accommodation is always maintained in a safe condition.", "i": "UK MCA: Code of Safe Working Practices for Merchant Seafarers 2.2.3 Fire aboard a vessel can be disastrous. Common causes are: • • • • • • • faulty electrical appliances/circuitry; overloading of electrical circuitry; careless disposal of cigarette ends; damp storage of linen/materials; galley fires due to overheating of cooking oils; carelessness with hand-pressing irons; or incorrect methods of ", "a": "• • Sight, and where necessary review, the company procedure which required that safety inspections of the accommodation were conducted at appropriate intervals by the designated Safety Officer to identify hazards and potential hazards to health, safety and the environment Where necessary review the records of safety inspections of the accommodatio", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. UK MCA: Code of Safe Working Practices for Merchant Seafarers", "k": ["company", "effective", "master", "familiar", "identifying", "health", "inspections", "hazards", "spaces", "officers", "procedure", "accommodation"]},
  "5.8.7":{"ch": "5", "sec": "5.8", "s": "Ballast and/or bunker pumproom safety inspection", "d": "Were the Master and officers familiar with the company procedure for safety inspections of the ballast and/or bunker pumproom, and had inspections been effective in identifying hazards to health, safety and the environment?", "o": "To ensure that the ballast and/or bunker pump room is always maintained in a safe condition.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 4.11.7 Inspection, maintenance and testing of electrical equipment 4.11.7.1 Inspection and checks Typical inspections should include checking: Cracks in metal casings or covers, cracked or broken glass, or failure of cement around glass in flame-proof or explosion-proof enclosures. Covers of flame-proof enclosures, ", "a": "• • • Sight, and where necessary review, the company procedure which required that safety inspections of the ballast and/or bunker pumproom were conducted at appropriate intervals by the designated Safety Officer to identify hazards and potential hazards to health, safety and the environment Where necessary review the records of safety inspections ", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "effective", "master", "familiar", "bunker", "pumproom", "inspections", "identifying", "hazards", "officers", "health", "procedure"]},
  "5.9.1":{"ch": "5", "sec": "5.9", "s": "Lifting and rigging equipment procedures, maintenance and inspection", "d": "Were the Master, officers and ratings familiar with the company lifting and rigging procedures, and was evidence available to demonstrate that each item of lifting and rigging equipment had been maintained, inspected and tested in accordance with the procedure?", "o": "To ensure that all lifting and rigging equipment has been thoroughly inspected at least annually and is always fit for purpose when used.", "i": "OCIMF: Recommendations for the Tagging/Labelling, Testing and Maintenance, Documentation/Certification for Ships' Lifting Equipment May 2005 UK MCA: Code of Safe Working Practices for Merchant Seafarers. Chapter 19 Lifting Equipment and Operations 19.1.2 ‘Lifting equipment’ means work equipment used for lifting or lowering loads and includes the attachments used for anchoring, fixing or supporting", "a": "• • • Sight, and where necessary review, the company procedure for the management of lifting and rigging equipment. Verify the validity of the certificates for lifting equipment and loose gear required to be inspected and certified under the vessel’s Classification Society and/or Flag administration rules. Review the inventory of lifting and riggin", "p": "IMO: ISM Code UK MCA: Code of Safe Working Practices for Merchant Seafarers OCIMF: Recommendations for the Tagging/Labelling Testing and Maintenance Documentation/Certification for Ships' Lifting Equi", "k": ["company", "procedure", "demonstrate", "rigging", "familiar", "inspection", "procedures", "inspected", "officers", "available", "lifting", "equipment"]},
  "5.9.2":{"ch": "5", "sec": "5.9", "s": "Spare parts for a single cargo hose handling crane.", "d": "Where the vessel was fitted with a single cargo hose handling crane, was a risk assessment available which identified the minimum spare parts that must be carried onboard to ensure continued operation in the event of a single component failure, and were the identified spare parts available onboard?", "o": "To ensure that a hose crane is always available to connect and disconnect cargo hoses.", "i": "TMSA KPI 4.1.1 requires that each vessel in the fleet is covered by a planned maintenance system and spare parts inventory which reflects the company’s strategy. The company identifies all equipment and machinery required to be included in the planned maintenance system, for example: • • Deck machinery. Cargo handling machinery/equipment. The spare parts inventory may be standalone or integrated i", "a": "• • • • Review the risk assessment for the continued operation of a single hose crane. Review the inventory of spare hydraulic hoses for the cargo hose handling crane and verify that at least one spare hose with the same specification and rating was available for each diameter and length of hydraulic hose fitted to the crane. Review the inventory o", "p": "IMO: ISM Code", "k": ["assessment", "component", "single", "minimum", "crane", "handling", "carried", "operation", "event", "cargo", "failure", "available"]},
  "5.10.1":{"ch": "5", "sec": "5.10", "s": "Pilot boarding arrangements", "d": "Were the Master, deck officers and deck ratings familiar with the company procedures for rigging the pilot boarding arrangements, and was the equipment provided in satisfactory condition and used in accordance with industry best practice?", "o": "To ensure pilot boarding arrangements are always correctly rigged under the supervision of a responsible officer.", "i": "ICS: Bridge Procedures Guide. Fifth Edition. 5.3.2 Embarking the Pilot The Master should ensure the availability of a properly maintained means of pilot embarkation and disembarkation that is positioned, rigged, checked and manned in accordance with IMO recommendations (see Checklist A4) and, where applicable, local requirements… The Pilot should: • • Use appropriate personal protective equipment;", "a": "• • • • • • • • • • Sight, and where necessary review, the company procedure which described the requirements for the rigging and recovery of the pilot boarding arrangements. Where necessary review the certification and maintenance records for the pilot ladders. Inspect at least one pilot ladder and verify that: o The ladder was clearly identified ", "p": "ICS: Bridge Procedures Guide – Fifth Edition IMO: ISM Code IMO SOLAS IMO: Resolution A.1045(27) Recommendation on pilot transfer arrangements IMO: Resolution A.1108(29) Amendments to the Recommendatio", "k": ["company", "rigging", "satisfactory", "master", "familiar", "procedures", "practice", "industry", "officers", "pilot", "ratings", "boarding"]},
  "5.10.2":{"ch": "5", "sec": "5.10", "s": "Accommodation ladders", "d": "Were the Master, deck officers and deck ratings familiar with the company procedures for rigging the accommodation ladders, and were the accommodation ladders in good order and used in accordance with the company procedure and manufacturer’s instructions?", "o": "To ensure accommodation ladders are always correctly rigged under the supervision of a responsible person or officer.", "i": "IMO: MSC.1/Circ.1331 Guidelines for Construction, Installation, Maintenance and Inspection/Survey of Means of Embarkation and Disembarkation. 3.3 Lifebuoy A lifebuoy equipped with a self-igniting light and a buoyant lifeline should be available for immediate use in the vicinity of the embarkation and disembarkation arrangement when in use. 3.5 Marking Each accommodation ladder or gangway should be", "a": "• • • • Sight, and where necessary review, the company procedure which described the requirements for the rigging and recovery of the accommodation ladders. Where necessary, review the manufacturer’s instructions and/or drawings for the accommodation ladders. Where necessary review the maintenance and load test records for the accommodation ladders", "p": "IMO: MSC.1/Circ.1331 Guidelines for Construction Installation Maintenance and Inspection/Survey of Means of Embarkation and Disembarkation. IMO: ISM Code IMO SOLAS", "k": ["company", "rigging", "master", "familiar", "procedures", "ladders", "officers", "procedure", "ratings", "accommodation", "order", "instructions"]},
  "5.10.3":{"ch": "5", "sec": "5.10", "s": "Safe access to the vessel while alongside a terminal/berth", "d": "Were the Master, officers and ratings familiar with the company procedure for providing safe access to the vessel while alongside a terminal/berth, and was safe access provided by the ship’s portable gangway, the vessel’s accommodation ladder or a shore gangway?", "o": "To ensure safe access is always provided between the ship and a berth, whether by a ship’s portable gangway, accommodation ladder or a gangway provided by the terminal.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. Chapter 16.4 Tanker/terminal access 16.4.2 Provision of tanker/terminal access Responsibility for the provision of safe tanker/terminal access is jointly shared between tanker and terminal personnel. Requirements for provision of safe access should be detailed in the pre-arrival communications. The preferred means ", "a": "", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: MSC.1/Circ.1331 Guidelines for Construction Installation Maintenance and Inspection/Survey of Means of Embarkat", "k": ["company", "ladder", "procedure", "shore", "familiar", "alongside", "berth", "gangway", "providing", "terminal", "officers", "while"]},
  "5.10.4":{"ch": "5", "sec": "5.10", "s": "Personnel transfer by crane", "d": "Were the Master and officers familiar with the company personnel transfer by crane procedure, and where a personnel transfer basket (PTB) and accessories were provided, were these in satisfactory condition and used in accordance with company procedures and manufacturer’s recommendations?", "o": "To ensure personnel transfer by crane is always conducted in accordance with industry best practice guidance.", "i": "OCIMF: Transfer of Personnel by Crane between Vessels. First Edition 1 Introduction …Crane transfers are typically completed using a Personnel Transfer Basket (PTB). In this paper, the term PTB is used to describe the piece of equipment in which personnel are transferred and includes collapsible basket and rigid capsule types. It is recommended that the transfer of personnel between vessels should", "a": "• • • • • • • • Sight, and where necessary review, the company procedure describing the requirements for personnel transfer by crane. Sight the manufacturer’s test certificates for the PTB and any accessories. Where the vessel declared that the crane(s) were certified for personnel transfer through HVPQ 13.1.7, sight the appropriate crane certifica", "p": "IMO: ISM Code OCIMF: Transfer of Personnel by Crane between Vessels. First Edition", "k": ["company", "personnel", "accessories", "procedure", "these", "crane", "basket", "satisfactory", "familiar", "condition", "procedures", "officers"]},
  "5.10.5":{"ch": "5", "sec": "5.10", "s": "Helicopter operations", "d": "Were the Master and officers familiar with the company procedures for helicopter/ship operations, and had these procedures been complied with?", "o": "To ensure helicopter/ship operations are performed safely and in a controlled manner.", "i": "OCIMF: Guidelines for Offshore Tanker Operations 7.4 - Helicopter transfer 7.4.1 Conventional tankers Conventional tankers do not usually have specialised offshore helicopter facilities. Any helicopter transfer operations should follow the guidance and practices in the International Chamber of Shipping (ICS) publication Guide to Helicopter/Ship Operations. The helicopter operating company will nee", "a": "• • • • • • Sight, and where necessary review, the company procedures providing guidance on helicopter/ship operations. Review the helicopter operations risk assessment and evidence of last review. Sight the ICS Guide to Helicopter/Ship Operations. Review completed ICS Shipboard Safety Checklists for Helicopter Operations (or equivalent). Review re", "p": "OCIMF Guidelines for Offshore Tanker Operations ICS: Guide to Helicopter/Ship Operations 5th Edition", "k": ["complied", "company", "helicopter", "master", "familiar", "procedures", "officers", "operations", "these"]},
  "5.10.6":{"ch": "5", "sec": "5.10", "s": "Helicopter facilities", "d": "Were the Master and officers familiar with the company procedures for helicopter/ship operations, and had the crew involved received appropriate training?", "o": "To ensure helicopter/ship operations on vessels equipped with helicopter facilities are performed safely and in a controlled manner.", "i": "OCIMF: Guidelines for Offshore Tanker Operations 7.4 - Helicopter transfer 7.4.2 DP bow loading tankers with helidecks DP bow loading tankers are normally fitted with offshore standard helicopter decks. These decks are normally constructed and equipped to comply with the Civil Aviation Authority (CAA) publication CAP437: Standards for Offshore Helicopter Landing Areas. Although this is a UK public", "a": "", "p": "IMO: ISM Code IMO SOLAS OCIMF Guidelines for Offshore Tanker Operations ICS: Guide to Helicopter/Ship Operations 5th Edition Civil Aviation Authority: CAP437 Standards for Offshore Helicopter Landing ", "k": ["company", "helicopter", "appropriate", "master", "familiar", "procedures", "involved", "officers", "operations", "facilities", "received", "training"]},
  "5.10.7":{"ch": "5", "sec": "5.10", "s": "Escape routes", "d": "Were the Master, officers and crew familiar with the escape routes from the machinery spaces, pump rooms, compressor rooms, accommodation spaces and, when in port, from the vessel, and were these routes clearly marked, unobstructed and well illuminated?", "o": "To ensure that there are marked escape routes available to ship and shore personnel in the event of an emergency on the vessel.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 12.1.15 Pumproom operational procedures 12.1.15.3 Routine maintenance and housekeeping issues Emergency escape routes should be regularly checked to ensure they are properly marked and clear of obstructions. When an escape trunk is fitted, check doors for ease of operation. Door seals should be effective and lighti", "a": "• • • • Sight, and where necessary review, the company procedure defining the requirements for identifying and marking escape routes. Inspect the designated escape routes from the accommodation spaces, machinery spaces, pump room, etc. and verify that: o The escape routes were clearly identified by signs in accordance with IMO guidance. o Where an ", "p": "IMO Resolution A.1116(30) Escape route signs and equipment location markings IMO: MSC/Circ.1120 Unified interpretations of SOLAS Chapter II-2 The FSS Code The FTP Code and related fire test procedures", "k": ["master", "familiar", "spaces", "officers", "clearly", "routes", "machinery", "accommodation", "vessel", "these", "marked", "compressor"]},
  "5.11.1":{"ch": "5", "sec": "5.11", "s": "Cargo and bunker sample management.", "d": "Were the Master and officers familiar with the company procedures addressing the management of samples of bunker fuel oil and Annex I and/or Annex II cargoes as applicable, and were samples being properly stored and eventually disposed of?", "o": "To ensure cargo and bunker samples are safely stored on board and properly disposed of in a timely manner.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals 13.3 Cargo and bunker samples The operator’s SMS should include guidance on managing and storing cargo and bunker samples. The quantity of samples kept on board should be carefully managed and reduced to a minimum number required. When they are no longer required, they should be disposed of in an appropriate cargo or slop tank on ", "a": "", "p": "IMO: MEPC/Circ.864/Rev.1 2019 Guidelines for on board sampling for the verification of the sulphur content of the fuel used on board ships. IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil ", "k": ["addressing", "company", "properly", "being", "samples", "familiar", "disposed", "applicable", "cargoes", "cargo", "procedures", "officers"]},
  "5.12.1":{"ch": "5", "sec": "5.12", "s": "Respiratory protective equipment", "d": "Were the Master, officers and ratings familiar with the company procedures that addressed the use of respiratory protective equipment during cargo operations, and did the procedures prohibit the use of filter type respirators for this purpose?", "o": "To ensure the correct respiratory protective equipment is worn during cargo operations.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 10.13 Respiratory Protective Equipment Cartridge or canister face masks will not protect the user against concentrations of hydrocarbon or toxic vapours or against oxygen deficiency. They should never be used in place of breathing apparatus. ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 3.11.11 Respiratory Pr", "a": "• • • Sight, and where necessary review, the company procedures for the use of respiratory protective equipment during cargo operations. During the course of the inspection, observe any respiratory protective equipment in use during cargo operations. Interview the accompanying officer to verify their familiarity with company procedures for the use ", "p": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "protective", "master", "familiar", "procedures", "during", "officers", "operations", "prohibit", "ratings", "addressed", "respirators"]},
  "5.12.2":{"ch": "5", "sec": "5.12", "s": "Decontamination showers and eyewash stations.", "d": "Were the Master, officers and ratings familiar with the location and operation of the decontamination showers and eyewash stations on deck, and were these facilities suitably marked, easily accessible and ready for use?", "o": "To ensure the decontamination showers and eyewash stations provided on deck are always ready to use in an emergency.", "i": "ICS: Tanker Safety Guide (Chemicals) - Fifth Edition 2.7.3 Cold Weather Special attention should be paid to emergency showers and eye wash stations to ensure they continue to function. Water pipes supplying these should be insulated and provided with heat tracing to prevent freezing. 8.3.4 Preparations Before commencing tank cleaning or gas freeing operations, the responsible officer should confir", "a": "• • • • Sight, and where necessary review, the company procedure which ensures that decontamination showers and eye wash stations on deck are ready for use. Inspect the decontamination showers and eye wash stations, select one and, o If the temperature is at or below freezing, verify that the selected shower or eye wash was not frozen. o If the tem", "p": "IMO: ISM Code IMO: IGC Code IMO: IBC Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition", "k": ["stations", "master", "familiar", "operation", "officers", "suitably", "ratings", "facilities", "these", "location", "showers", "marked"]},

  "6.1.5":{"ch": "6", "sec": "6.1", "s": "Ozone Depleting Substances Record Book", "d": "Were the Master and engineer officers familiar with the company procedure for maintaining the Ozone-depleting Substances Record Book, and did the entries contained in the Ozone-depleting Substances Record Book accurately record the operations and emissions required to be documented by MARPOL Annex VI?", "o": "To ensure all operations involving ozone-depleting substances, including any deliberate and non-deliberate emissions, are recorded in compliance with MARPOL Annex VI.", "i": "IMO: MEPC.312(74) Guidelines for the Use of Electronic Record Books under MARPOL 2.1 These Guidelines are only applicable to the use of electronic record books on board to meet the requirements of the following record books and recording requirements under the MARPOL Annexes and the Technical Code on Control of Emission of Nitrogen Oxides from Marine Diesel Engines (NOX Technical Code): .4 Ozone-d", "a": "• • • • • Sight, and where necessary review, the company procedures that described the requirements for maintaining the Ozone-depleting Substances Record Book, either in paper or electronic format, in accordance with MARPOL Annex VI and any Flag Administration guidance. Review the list of equipment on board containing ozone-depleting substances inc", "p": "IMO: ISM Code IMO: MARPOL IMO: MEPC.312(74) Guidelines for the Use of Electronic Record Books under MARPOL", "k": ["company", "operations", "procedure", "accurately", "contained", "emissions", "ozone", "familiar", "marpol", "officers", "entries", "maintaining"]},

  "6.2.1":{"ch": "6", "sec": "6.2", "s": "Flooding or accidental leakage of cargo pumproom bilges", "d": "Were the Master and officers familiar with the arrangements to drain the cargo pumproom bilges in the event of flooding or accidental leakage, and were these arrangements in good order?", "o": "To ensure that the cargo pumproom bilge pump could be operated when the pumproom was flooded.", "i": "USCG: Code of Federal Regulations. Title 46. • 32.52-5 Bilge piping for pump rooms and adjacent cofferdams on tank vessels constructed or converted on or after November 19, 1952—TB/ALL. (a) Provisions shall be made for removing drainage from the pumproom bilges and adjacent cofferdams. A separate bilge pump, ejector, or bilge suction from a cargo pump or cargo stripping pump may be provided for th", "a": "• • • • Sight, and where necessary review, the company procedures for draining the pumproom bilges. Inspect the arrangements for draining the pumproom bilges, including the controls on platforms above the freeboard deck or the upper deck and verify that: o Valves required to remain open were correctly set. o Valves or controls were marked with thei", "p": "IMO: ISM Code IMO: MARPOL USCG: Code of Federal Regulations. Title 46.", "k": ["master", "familiar", "pumproom", "drain", "officers", "arrangements", "order", "leakage", "these", "bilges", "flooding", "event"]},
  "6.2.2":{"ch": "6", "sec": "6.2", "s": "Cargo system overboard and sea suction valves", "d": "Were cargo system overboard and sea suction valves checked and verified as closed and secured prior to commencement of cargo transfer, and where provided, were sea valve-testing arrangements in order and regularly monitored for leakage?", "o": "To ensure all precautions are taken to prevent cargo spillages through cargo system overboard and sea suction valves.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 12.1.14.2 Line displacement with water On ships with a segregated ballast system, avoid the practice of using cargo pumps on a sea suction. However, at the end of cargo operations, some terminals require ships to displace the contents of the hoses or MLAs, and perhaps the shorelines, with water. This practice risks ", "a": "• • • Sight, and where necessary review the company procedures to prevent cargo spillages through cargo system overboard and sea suction valves. Review records of: o Checks that cargo system overboard and sea suction valves are closed and secured prior to commencement of cargo transfer in the bridge or cargo logbook. o Checks of cargo system overbo", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: ISM Code OCIMF/ICS: Prevention of Oil Spillages through Cargo Pumproom Sea Valves. Second Edition", "k": ["valve", "monitored", "valves", "regularly", "system", "verified", "cargo", "arrangements", "order", "leakage", "commencement", "transfer"]},
  "6.2.3":{"ch": "6", "sec": "6.2", "s": "Bunker pipeline system pressure testing", "d": "Were the Master and officers familiar with the company procedures for inspections and pressure tests of the bunker oil (HFO and MDO) pipeline system, and had the tests been performed and the results suitably recorded?", "o": "To ensure the bunker pipeline system is regularly inspected and tested.", "i": "USCG: Code of Federal Regulations. Title 33. 156.170 Equipment tests and inspections. (a) Except as provided in paragraph (d) of this section, no person may use any equipment listed in paragraph (c) of this section for transfer operations unless the vessel or facility operator, as appropriate, tests and inspects the equipment in accordance with paragraphs (b), (c) and (f) of this section and the e", "a": "• • • • • Sight, and where necessary, review the company procedures for the inspection and pressure testing of the bunker pipeline system. Review the records of inspection and testing of the bunker pipeline system. Review records of the disposal of the liquid used to test the pipeline system. During the inspection, observe the condition of the bunk", "p": "IMO: ISM Code USCG: Code of Federal Regulations. Title 33. USCG: Marine Safety Manual Vol. II: Materiel Inspection", "k": ["company", "recorded", "master", "familiar", "procedures", "tests", "inspections", "bunker", "testing", "officers", "results", "suitably"]},
  "6.3.1":{"ch": "6", "sec": "6.3", "s": "Ballast water management system (BWMS)", "d": "Were the Master and officers familiar with the company procedures for the safe operation of the ballast water management system (BWMS), and was the equipment in satisfactory condition and used in accordance with the company procedures and manufacturer’s instructions?", "o": "To ensure that ballast is always handled safely in accordance with company procedures and manufacturer’s instructions.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 10.3 Identifying enclosed spaces Some spaces that do not meet the criteria for an enclosed space may have an unsafe atmosphere and should be subject to the enclosed space procedures. A list should identify these spaces on every tanker. Examples include: Ballast water treatment room. 10.4 The hazards of enclosed spa", "a": "• • • • • • Sight and where necessary, review the company procedures for the operation, inspection and maintenance of the ballast water management system (BWMS). Inspect the BWMS control panel and verify that the system is operational with no apparent faults or alarms. Review available self-monitoring data to verify satisfactory operation. Inspect ", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: Ballast Water Management Convention and BWMS Code", "k": ["company", "satisfactory", "master", "familiar", "procedures", "operation", "officers", "management", "water", "system", "equipment", "accordance"]},
  "6.4.1":{"ch": "6", "sec": "6.4", "s": "Main deck oil or chemical spill clean up equipment.", "d": "Were the Master, officers and ratings familiar with the company procedures for the removal of small quantities of oil or chemical spilled and contained on deck, and was suitable response equipment available, in satisfactory condition and effectively deployed?", "o": "To ensure any oil or chemical spills contained on deck are promptly and safely cleaned up.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 23.7.5 Spill containment A permanently fitted spill tank, with suitable means of draining, should be fitted under all tanker/terminal manifold connections. If no permanent spill tank is fitted, portable drip trays should be placed under each connection to catch any leaks. Avoid plastic and other non-metallic contai", "a": "Page 664 of 711 – SIRE 2.0 Question Library: Part 1 Version 1.0 (January 2022) • • • • Sight, and where necessary review, the SOPEP or SMPEP. Sight, and where necessary review, the company procedures for the removal of oil or chemical spilled and contained on deck. Review the inventory of spill clean-up equipment provided on board and the records o", "p": "IMO: MARPOL USCG: Code of Federal Regulations. Title 33. IMO: Guidelines for the development of Shipboard Marine Pollution Emergency Plans. 2010 edition. IMO: ISM Code IMO SOLAS OCIMF/ICS: Internation", "k": ["company", "contained", "response", "clean", "satisfactory", "familiar", "effectively", "quantities", "removal", "condition", "procedures", "chemical"]},
