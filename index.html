  "8.5.2":{"ch": "8", "sec": "8.5", "s": "Gas Combustion Unit (GCU)", "d": "Were the Master and officers familiar with the company procedures for the operation, inspection, maintenance and testing of the Gas Combustion Unit (GCU)?", "o": "To ensure the Gas Combustion Unit is properly operated, inspected, maintained, and tested.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 4.8.3 Gas combustion units (GCU) GCUs have been specifically developed for the controlled and safe oxidation of BOG from LNG carriers. The GCU system is required to safely oxidise excess BOG from the cargo tanks while maintaining exhaust gas temperatures at the stack outlet below 535 °C. Although this is 50°C belo", "a": "• • • • • Sigh", "p": "IMO: ISM Code IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition.", "k": ["company", "master", "familiar", "procedures", "maintenance", "operation", "officers", "combustion", "inspection", "testing"]},
  "8.5.3":{"ch": "8", "sec": "8.5", "s": "LNG gas fuel supply system", "d": "Were the Master and officers familiar with the company procedures for the inspection, maintenance and testing of the safety arrangements for the LNG gas fuel supply system, and were these arrangements in satisfactory condition?", "o": "To ensure the safe supply of boil-off gas (BOG) to consumers in the engine-room such as boilers, inert gas generators, internal combustion engines, gas combustion unit and gas turbines.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 4.8.1 LNG boil-off and vapour handling systems Boil-off vapours are produced during cool-down, loading and during the loaded and ballast voyages. Typically, the low duty (LD) compressor handles the boil-off while on passage and the high-duty (HD) compressor handles cargo vapours produced during cool-down and loadi", "a": "", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition.", "k": ["company", "satisfactory", "master", "familiar", "procedures", "maintenance", "officers", "arrangements", "supply", "these", "safety", "system"]},
  "8.5.4":{"ch": "8", "sec": "8.5", "s": "Cold spots and cofferdam temperature monitoring and heating equipment.", "d": "Were the Master and officers familiar with the company procedures for protecting the hull structure from low temperature exposure, and was temperature monitoring and cofferdam heating equipment, where fitted, in satisfactory condition?", "o": "To ensure the hull is protected against the risk of brittle fracture in the event of a failure of the cargo containment or insulation.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition Appendix 4 Cargo System Instrumentation A4.5 Temperature Monitoring Equipment Temperature sensors are fitted so that the temperatures of both the cargo and the structure around the cargo system can be monitored and also meet the requirements of the IGC Code and operational needs. For all LNG carriers and for other ships intended for the carriage of ca", "a": "• • • • Sight, and where necessary review, the company procedures for monitoring the integrity of the containment system and protecting the hull structure from low temperature exposure. Review the records of: o Inner hull temperature readings. o Visual inspections of the inner hull structure for cold spots. o Cold spots identified and actions taken", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition IACS: Interpretations of the IMO Gas Cod", "k": ["company", "satisfactory", "master", "familiar", "procedures", "protecting", "structure", "officers", "heating", "temperature", "fitted", "exposure"]},
  "8.6.1":{"ch": "8", "sec": "8.6", "s": "Cargo tank overfill alarms", "d": "Were the Master and officers familiar with the company procedures for the maintenance, testing and setting of the independent cargo tank high-level and overfill alarms, and were these alarm systems fully operational and properly set?", "o": "To ensure that independent cargo tank high-level and overfill alarms are always fully operational, properly set and used during all cargo loading, discharging and transfer operations.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition Appendix 4 Cargo System Instrumentation A4.3 Level Alarms, Automatic Shutdown and Emergency Shutdown. To prevent over-filling of cargo tanks, high level alarms and automatic shutdown systems may be required depending on the cargo system. These systems may be activated by floats operating a switch device, capacitance probes, ultrasonic, radar or other ", "a": "", "p": "SIGTTO: ESD Systems 2nd Edition 2021 SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "properly", "overfill", "these", "independent", "operational", "familiar", "alarms", "cargo", "procedures", "fully", "officers"]},
  "8.6.2":{"ch": "8", "sec": "8.6", "s": "Cargo transfer Emergency Shut Down (ESD)", "d": "Were the Master, officers, and ratings involved with cargo operations, familiar with the functions of the vessel’s cargo transfer Emergency Shut Down (ESD) systems, and was the equipment in good working order, regularly inspected, tested and maintained?", "o": "To ensure that crewmembers can respond effectively to an emergency situation during cargo transfer operations in accordance with the shipboard emergency plan.", "i": "SIGTTO: ESD Systems 2nd Edition 2021 2.3 System Availability ESD is an important safety system, and it should always be active when there is any cargo on the ship. The ESD system should only be switched off for short periods of time for necessary maintenance. It may be inhibited temporarily for testing, but this should be for the minimum duration possible. If the design of a safety system or ESD s", "a": "", "p": "IMO: IGC Code SIGTTO: ESD Systems 2nd Edition 2021", "k": ["involved", "operations", "regularly", "familiar", "cargo", "inspected", "officers", "order", "working", "equipment", "transfer", "maintained"]},
  "8.6.3":{"ch": "8", "sec": "8.6", "s": "Cargo tank relief valves", "d": "Were the Master and officers familiar with the company procedures for the inspection, maintenance, testing and setting of the cargo tank relief valves?", "o": "To ensure cargo tank relief valves are properly inspected, maintained, tested, and set.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 4.1.8 Relief valves for cargo tanks and pipelines The IGC Code requires at least two pressure relief valves of equal capacity to be fitted to any cargo or deck tank. On some liquefied gas carriers, adjustable settings for pilot operated relief valves may be used to provide a higher than normal set pressure (i.e. t", "a": "", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition SIGTTO: Recommendations for Relief Valve", "k": ["company", "master", "familiar", "procedures", "maintenance", "setting", "officers", "relief", "valves", "cargo", "inspection", "testing"]},
  "8.6.4":{"ch": "8", "sec": "8.6", "s": "Cargo System Operation Manual", "d": "Was a ship specific Cargo System Operation Manual provided on board, and were the Master and officers familiar with its content?", "o": "To ensure that all ship staff involved in cargo operations have sufficient information about cargo properties and operating the cargo system so that they can conduct cargo operations safely. (IMO: IGC Code Ch.18 Goal)", "i": "ICS: Tanker Safety Guide (Liquefied Gas) 3rd Edition 6.1 Introduction This chapter outlines the range of cargo operations normally encountered on liquefied gas tankers and the general safety precautions to be observed in connection with these operations. The procedures outlined should be considered as general guidance only. There is a considerable variation in the design of cargo containment and c", "a": "Sight the Cargo System Operation Manual and verify the contents include: • • • • • • • • Overall operation of the ship from dry-dock to dry-dock, including procedures for cargo tank cooldown and warm-up, transfer (including ship-to-ship transfer), cargo sampling, gas-freeing, ballasting, tank cleaning and changing cargoes. Cargo temperature and pre", "p": "IMO: ISM Code IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["master", "familiar", "content", "operation", "officers", "specific", "board", "provided", "manual", "system", "cargo"]},
  "8.6.5":{"ch": "8", "sec": "8.6", "s": "Maintaining the atmosphere in the interbarrier spaces and/or hold spaces", "d": "Were the Master and officers familiar with the company procedures for monitoring the integrity of the containment system and maintaining the atmosphere in the interbarrier spaces and/or hold spaces in a safe condition, and had records been maintained?", "o": "To ensure that the integrity of the containment system is monitored and that the atmosphere within the system and hold spaces are always maintained in a safe condition.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition 1.8.6 Cargo Tank Pressures Pressure in cargo tanks and hold or interbarrier spaces should be closely monitored, especially during cargo operations. Any necessary pressure adjustments should be made using the equipment provided. Particular care is necessary with membrane or semi-membrane cargo containment systems which are vulnerable to damage from vac", "a": "", "p": "IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition IMO: ISM Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition.", "k": ["integrity", "company", "maintained", "master", "familiar", "procedures", "interbarrier", "spaces", "officers", "atmosphere", "maintaining", "system"]},
  "8.6.6":{"ch": "8", "sec": "8.6", "s": "Cargo system alarm management", "d": "Were the Master and officers familiar with the company procedures for the management and operation of the cargo alarm systems, and had these procedures been followed?", "o": "To ensure that there is an effective alarm management system in place.", "i": "SIGTTO: Recommendations for Management of Cargo Alarm Systems, 1st edition, 2019 Part 1 Introduction 2. Scope This document provides guidance for all types of gas carriers, from large LNG carriers to the smallest LPG carriers. All gas carriers will need to have alarm management processes, but less complex alarm systems will be easier to set up. The purpose of these recommendations is to encourage ", "a": "• • • Sight, and where necessary review, the company procedures for the management and operation of the cargo alarm systems. Review the records of any changes made to alarm systems and/or settings, and when alarms have been overridden. Verify that they had been risk assessed and authorised as required and time limits set as appropriate. Interview t", "p": "IMO: ISM Code IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition SIGTTO: Recommendations for Management of Cargo Alarm Systems 1st edition 2019", "k": ["company", "master", "familiar", "procedures", "operation", "officers", "management", "systems", "these", "system", "cargo", "alarm"]},
  "8.6.7":{"ch": "8", "sec": "8.6", "s": "Inert gas system", "d": "Were the Master and officers familiar with the company procedures for the operation, inspection, testing and maintenance of the vessel’s inert gas system and its associated equipment, and was the equipment in satisfactory condition?", "o": "To ensure the inert gas system always delivers inert gas in accordance with the requirements for the cargo carried.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 2.7.2 The use of inert gas On board gas carriers, inert gas may be used to prevent the formation of a flammable mixture in cargo tanks during cargo grade change, preparation to load the first cargo after dry dock or when gas freeing prior to dry dock, inspection or repairs. Inert gas may also be used in the hold o", "a": "", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "satisfactory", "master", "familiar", "procedures", "maintenance", "operation", "officers", "vessel", "inert", "system", "equipment"]},
  "8.6.8":{"ch": "8", "sec": "8.6", "s": "Gas vessel cargo manifolds", "d": "Were the Master and officers familiar with the company procedures for managing cargo and vapour connections at the cargo manifolds, and were the manifold arrangements in satisfactory condition?", "o": "To ensure that cargo and vapour manifolds are always safely connected, disconnected, and monitored throughout cargo transfer operations.", "i": "SIGTTO/OCIMF: Recommendations for Liquefied Gas Carrier Manifolds 2nd Ed 2018 3. Protection from Cargo Spill 3.4 Gratings Manifold drip tray gratings should be of a material that is not adversely affected by spilled cargo. All manifold gratings should be secured to the drip tray structure to provide a firm, non-skid, working surface that is free from any protrusions that personnel may trip on, and", "a": "", "p": "SIGTTO: LNG Marine Loading Arms and Manifold Draining Purging and Disconnection Procedure IMO: ISM Code SIGTTO/OCIMF: Recommendations for Liquefied Gas Carrier Manifolds 2nd Ed 2018 IMO: IGC Code", "k": ["company", "satisfactory", "vapour", "master", "familiar", "procedures", "manifolds", "officers", "arrangements", "vessel", "managing", "connections"]},
  "8.6.9":{"ch": "8", "sec": "8.6", "s": "Manifold reducers, spool pieces and other portable pipework", "d": "Were the Master and officers familiar with the company procedures for the use, inspection and testing of manifold reducers, spool pieces and other portable pipework, and were these items in satisfactory condition and properly fitted when in use?", "o": "To ensure manifold reducers, spool pieces and other items of portable pipework meet the required pressure rating for the cargo transfer system and will not leak at the flange face when used.", "i": "SIGTTO/OCIMF: Recommendations for Liquefied Gas Carrier Manifolds 2nd Ed 2018 4. Manifold Design The recommendations in this section are provided for two types of material, i.e. carbon steel and stainless steel. The choice of material is usually dictated by the temperature of the product carried. Carbon steel may be used to construct fuel oil bunker manifolds. This may also be used to construct so", "a": "• • • • • • Sight, and where necessary review, the company procedures for the use and inspection of manifold reducers, spool pieces and other portable pipework. Review the inventory of manifold reducers, spool pieces and other portable pipework. Review the records of inspection of manifold reducers, spool pieces and other portable pipework. During ", "p": "IMO: ISM Code USCG: Code of Federal Regulations. Title 46. ICS: Tanker Safety Guide (Gas) - Third Edition SIGTTO/OCIMF: Recommendations for Liquefied Gas Carrier Manifolds 2nd Ed 2018", "k": ["company", "properly", "these", "other", "manifold", "pieces", "satisfactory", "familiar", "condition", "inspection", "spool", "procedures"]},
  "8.6.10":{"ch": "8", "sec": "8.6", "s": "Emergency discharge operations", "d": "Were the Master and officers familiar with the company procedures for carrying out emergency discharge operations, and was any required additional equipment in satisfactory condition?", "o": "To ensure the vessel will be able to discharge the cargo safely in the event of equipment failure.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition 4.2.6 Emergency cargo pumps Emergency cargo pumps are usually found on vessels that are fitted with submerged cargo pumps where other means of removing cargo from a tank, in the event of total pump failure, are not available. An emergency cargo pump is typically only fitted on membrane ships, although some LPG very", "a": "• Sight, and where necessary review the company procedures for carrying out emergency discharge operations.", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition.", "k": ["company", "satisfactory", "master", "familiar", "procedures", "additional", "officers", "operations", "discharge", "required", "equipment", "condition"]},
  "8.6.11":{"ch": "8", "sec": "8.6", "s": "Cargo and vapour pipeline insulation and expansion arrangements", "d": "Were the Master and officers familiar with the company procedures for the regular inspection and maintenance of cargo and vapour pipeline insulation and expansion arrangements, and were these arrangements in satisfactory condition?", "o": "To ensure cargo and vapour line insulation and expansion arrangements are regularly inspected and properly maintained.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition Appendix 3 Cargo Handling Plant and Equipment A3.11 Expansion Bellows Bellows may be used to accommodate thermal contraction and expansion in a number of applications including: • In pipe work systems to accommodate lateral and axial movement; If used properly, bellows pieces are very durable, but they are vulnerable to misuse and for this reason expa", "a": "• • Sight, and where necessary review, the company procedures for the regular inspection and maintenance of cargo and vapour pipeline insulation and expansion arrangements. Review the records of the regular inspection and maintenance of cargo and vapour pipeline insulation and expansion arrangements.", "p": "IMO: ISM Code IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "satisfactory", "vapour", "master", "familiar", "procedures", "maintenance", "officers", "arrangements", "insulation", "these", "expansion"]},
  "8.6.12":{"ch": "8", "sec": "8.6", "s": "IGC safety, rescue and recovery equipment", "d": "Were the Master and officers familiar with the company procedures relating to the safety, rescue and recovery equipment, including SCBAs, required by the IGC Code, and was the equipment ready for immediate use?", "o": "To ensure the safety, rescue and recovery equipment required by the IGC Code is always ready for immediate use in the event of an emergency.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition 8.7.5 Rescue and Recovery Equipment 8.7.5.2 Stretcher When selecting a stretcher for enclosed space rescues the following should be considered: • • • In enclosed spaces where a vertical lift is required the stretcher should be able to secure the casualty properly and prevent injury; The stretcher and casualty should be able to pass through the enclose", "a": "• • • • • • • Sight, and where necessary review, company procedures for the use of the safety equipment, including SCBAs, required by the IGC Code. Review the records of inspection and testing of the SCBAs forming part of the safety equipment required by the IGC. Review the documentation supporting the appointment of a crew member as the designated", "p": "IMO: ISM Code IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "master", "familiar", "procedures", "scbas", "officers", "rescue", "relating", "recovery", "required", "safety", "ready"]},
  "8.6.13":{"ch": "8", "sec": "8.6", "s": "Protective equipment required by the IGC Code", "d": "Were the Master and officers familiar with the company procedures addressing the protective equipment required by the IGC Code, and was this equipment in satisfactory condition and suitable for the products being handled?", "o": "To ensure crew members are protected from exposure to hazardous conditions when engaged in cargo operations.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition 3.11.2 Personal protective equipment Personal protective equipment (PPE) including appropriate protective clothing should be worn as necessary to protect those involved in cargo operations from the hazards associated with the cargo. The suits, gloves, boots, goggles, face-shields and other items used should be suitable for the cargo. Many plastics bec", "a": "• • • • Sight, and where necessary review, company procedures, including the PPE matrix where provided, addressing the protective equipment required by the IGC Code. Review the records of inspections of the protective equipment. Inspect a representative sample of the protective equipment in the storage location(s). Observe, where possible, protecti", "p": "IMO: ISM Code IMO: IGC Code ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["addressing", "company", "protective", "satisfactory", "master", "familiar", "procedures", "suitable", "products", "handled", "officers", "being"]},
  "8.6.14":{"ch": "8", "sec": "8.6", "s": "Reliquefaction plant", "d": "Were the Master and officers familiar with the company procedures for the safe operation and maintenance of the reliquefaction plant, and was the equipment in satisfactory condition?", "o": "To ensure the safe operation of the reliquefaction plant.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 7.8.2 Operation of the reliquefaction plant on refrigerated LPG carriers On a loaded voyage, and depending on cargo temperature, ambient temperature and the design of tank insulation, the plant may be operated continuously or intermittently. If it is necessary to reduce the temperature of the cargo before reaching", "a": "", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "equipment", "satisfactory", "master", "familiar", "procedures", "maintenance", "operation", "officers", "condition", "plant", "reliquefaction"]},
  "8.6.15":{"ch": "8", "sec": "8.6", "s": "Cargo heaters, vaporisers and condensers", "d": "Were the Master and officers familiar with the company procedures for the safe operation and maintenance of the cargo heaters, vaporisers and condensers, and was the equipment in satisfactory condition?", "o": "To ensure the safe operation of the cargo heaters, vaporisers and condensers.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 4.4 Cargo heaters Ordinarily, refrigerated cargo will need to be heated before it can be transferred into pressurised storage systems, to avoid low temperature embrittlement of the cargo tanks and pipelines. Heating can take place while loading a cold cargo into a pressurised ship or when discharging a refrigerate", "a": "", "p": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition IMO: ISM Code IMO: IGC Code", "k": ["company", "vaporisers", "condensers", "master", "familiar", "procedures", "maintenance", "satisfactory", "operation", "officers", "heaters", "equipment"]},
  "8.6.16":{"ch": "8", "sec": "8.6", "s": "Filling Limits (FL) and Loading Limits (LL)", "d": "Were the Master and officers familiar with the filling limits (FL) and loading limits (LL) for the cargo tanks, and was this information readily available in the cargo control room or position?", "o": "To ensure cargo tanks are never over-filled.", "i": "ICS: Tanker Safety Guide (Gas) - Third Edition 2.2 Cargo information The IGC Code requires the following information to be available to every ship and for each gas cargo carried: Details of the maximum filling limits allowed for each cargo that may be carried at each loading temperature, the maximum reference temperature and the set pressure for each relief valve. 6.8 Cargo Loading Filling limit r", "a": "• • • Sight and where necessary review the approved document specifying the maximum allowable loading limits for each cargo tank. Review the loading plans for the current and previous cargo and verify that: o The maximum liquid level in each cargo tank had been pre-calculated. o Cargo tanks had not been loaded above the loading limits (LL). Intervi", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["master", "familiar", "limits", "officers", "information", "available", "tanks", "position", "loading", "cargo", "filling", "readily"]},

  "8.6.19":{"ch": "8", "sec": "8.6", "s": "Submerged motor electric cargo pumps", "d": "Were the Master and officers familiar with the company procedures for the operation of the submerged motor electric cargo pumps and the testing of their associated safety devices and alarms, and had these procedures been followed?", "o": "To ensure the submerged motor electric cargo pumps are always operated safely.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 4.2.3 Submerged motor pumps Submerged motor pumps are installed at the bottom of cargo tanks and enable very low pump-down levels to be achieved. The pump and electrical motor are integrally mounted on the same shaft, which eliminates the need for a mechanical seal or coupling. Power is supplied to the motor throu", "a": "• • • • • Sight, and where necessary review, the company procedures for the operation of the submerged motor electric cargo pumps and the testing of their associated safety devices and alarms. Inspect the submerged motor electric cargo pump monitoring system panel and verify that the monitoring system is fully operational. Review the test records f", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition.", "k": ["company", "these", "familiar", "submerged", "pumps", "operation", "alarms", "devices", "cargo", "associated", "procedures", "officers"]},

  "8.6.21":{"ch": "8", "sec": "8.6", "s": "Inerting, gas freeing and gassing up operations", "d": "Were the Master and officers familiar with the company procedures that gave guidance on cargo tank environmental control during inerting, gas freeing and gassing up operations, thermal load hazards during tank cool-down, and the minimum cargo temperature?", "o": "To ensure inerting, gas freeing, gassing up and tank cool-down operations are carried out in a safe manner.", "i": "SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. 7.3.1 Principles of atmosphere changing. Tank atmosphere changing is required for several cargo operations, such as inerting, gassing up, purging and aeration of the tank. On LPG carriers grade changes between, for example, LPG and ammonia will require an atmosphere change. The two methods of changing atmosphere a", "a": "", "p": "IMO: ISM Code IMO: IGC Code SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "master", "familiar", "procedures", "guidance", "freeing", "environmental", "during", "officers", "operations", "gassing", "hazards"]},
  "8.7.1":{"ch": "8", "sec": "8.7", "s": "BLS Emergency Shut Down (ESD) systems", "d": "Were the Master and officers familiar with the purpose and operation of the vessel’s Emergency Shut Down (ESD) systems, and was the equipment in good working order, regularly inspected, tested and maintained?", "o": "To ensure the vessel is able to execute a controlled ESD 1 or ESD 2 operation.", "i": "OCIMF: Guidelines for Offshore Tanker Operations 1.2.8 Inspection and test regimes The SMS should detail procedures for, and records of, tests and inspections. Tests and inspections relevant to offshore operations are: Alarms and Emergency Shutdown (ESD) tests. 5.4.4 Cargo transfer radio telemetry and ESD systems Manual ESD1/ASD1 activation points (push buttons) should be located at strategic posi", "a": "• • • • Sight, and where necessary review, the company procedures that defined the operation, inspection, maintenance and testing of the ESD systems. Sight and review the checklists used to prepare/test the ESD systems. If necessary, review the records of inspections, maintenance and tests carried out contained within the planned maintenance system", "p": "IMO: ISM Code Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140 OCIMF Guidelines for Offshore Tanker Operations", "k": ["maintained", "master", "familiar", "inspected", "operation", "officers", "tested", "vessel", "order", "systems", "working", "equipment"]},
  "8.7.2":{"ch": "8", "sec": "8.7", "s": "Checks when approaching an offshore terminal.", "d": "Were the Master and officers familiar with the company procedures, including appropriate arrival checklists, detailing the necessary checks and actions to be carried out when approaching an offshore terminal prior to DP and/or bow loading operations, and had these procedures been complied with?", "o": "To ensure DP and bow loading shuttle tankers carry out all necessary checks and actions when approaching offshore terminals.", "i": "OCIMF: Guidelines for Offshore Tanker Operations 9.6 Approach to terminals Further guidance can be found in the checklist in appendix F1. 9.6.1 Pre-arrival preparations Prior to arriving at the station-keeping position the DP bow loading tanker should ensure that all equipment is tested and fully operational, as laid down in the FSOG (Field Specific Operating Guidelines). All appropriate checklist", "a": "• • • • Sight, and where necessary review, the company procedures, including appropriate arrival checklists, detailing the necessary checks and actions to be carried out when approaching an offshore terminal prior to DP and /or bow loading operations. Review completed arrival checklists for the previous two offshore loading operations. Interview th", "p": "IMO: ISM Code OCIMF Guidelines for Offshore Tanker Operations IMO: MSC.1/Circ.1580 Guidelines for vessels and units with dynamic positioning (DP) systems", "k": ["company", "appropriate", "checklists", "operations", "these", "familiar", "carried", "approaching", "including", "actions", "terminal", "complied"]},
  "8.7.3":{"ch": "8", "sec": "8.7", "s": "Control and monitoring of the Bow Loading System (BLS)", "d": "Were the Master and officers familiar with the equipment for control and monitoring of the Bow Loading System (BLS), and was the equipment in good working order, regularly inspected, tested and maintained?", "o": "To ensure that the vessel’s telemetry and green line systems will safely start, control and stop cargo transfer operations.", "i": "Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140 9.3 Green line control system The BLS and cargo loading system should be provided with a “green line” control system according to Appendix A.9. Specifications are to be approved by field operator(s). When the “green line” is completed, a “loading permit” signal should be transmitted to the adjacent ", "a": "• • • • • • • • Sight, and where necessary review, the company procedures for the operation, inspection, maintenance and testing of the equipment for control and monitoring of the BLS. Sight, and where necessary review, the FMEA report for the cargo loading system and BLS. If necessary, review the records of inspections, maintenance and tests carri", "p": "IMO: ISM Code Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140", "k": ["monitoring", "maintained", "master", "familiar", "inspected", "officers", "loading", "tested", "order", "system", "working", "equipment"]},
  "8.7.4":{"ch": "8", "sec": "8.7", "s": "Bow Loading System (BLS) operation, inspection, testing and maintenance.", "d": "Were the Master and officers familiar with the company procedures for the operation, inspection, testing and maintenance of the Bow Loading System (BLS), including alarms and indicators, and was the BLS area well maintained and free from oil.", "o": "To ensure the BLS is operated safely and regularly inspected, tested, and maintained.", "i": "Norwegian Oil and Gas recommended guidelines for Offshore Loading Shuttle Tankers Guideline No. 140 (NB/CC = New building/Conversion candidate) 14.2 BLS competence requirements For competence and training related to BLS equipment, BLS maker guidelines for operation and maintenance should as a minimum be followed. Adequate competence and training related to BLS equipment will be required. Appendix ", "a": "• • • • • Sight, and where necessary review, the company procedures for the operation, inspection, testing and maintenance of the Bow Loading System (BLS). Review the records of inspection, testing and maintenance of the BLS including: o BLS coupler valve tightness tests. o Coupler and inboard valve closing-time checks. o BLS operator console alarm", "p": "IMO: ISM Code Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140 ABS : Shuttle Tanker Advisory September 2019", "k": ["company", "maintained", "master", "familiar", "procedures", "maintenance", "operation", "officers", "indicators", "system", "alarms", "loading"]},
  "8.7.5":{"ch": "8", "sec": "8.7", "s": "Deluge system in the bow loading system (BLS) area", "d": "Were the Master and officers familiar with the location, purpose and operation of the deluge system in the bow loading system (BLS) area, and was the equipment in good working order, regularly inspected, tested and maintained?", "o": "To ensure that those measures specifically designed to prevent or extinguish fires in the BLS area of shuttle tankers are effective.", "i": "Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140 11 Fire Fighting for Offshore Loading A fire water system should be installed in the BLS area. The system should serve two purposes: • • Supply of deluge (water only) to the BLS equipment and bow slot to prevent that any possible sparks created during emergency disconnection (ESD 2) may cause a fire", "a": "• • • • • Sight, and where necessary review, the company procedures that defined the operation and maintenance of the BLS deluge system. Inspect the dedicated operator panels for the BLS deluge system on the bridge and in the watchman’s cabin. Inspect the piping and control valves for the BLS deluge system and, if safe to do so, verify that control", "p": "IMO: ISM Code Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140 IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire pro", "k": ["deluge", "equipment", "master", "familiar", "inspected", "maintained", "operation", "officers", "tested", "order", "location", "system"]},

  "8.7.7":{"ch": "8", "sec": "8.7", "s": "DP equipment condition and maintenance", "d": "Are all items of DP equipment in satisfactory condition and are they included in the Planned Maintenance System (PMS)?", "o": "To ensure all DP systems and sub-systems are maintained in good working order.", "i": "TMSA KPI 4.1.1 requires that each vessel in the fleet is covered by a planned maintenance system and spare parts inventory which reflects the company strategy. The company identifies all equipment and machinery required to be included in the planned maintenance system, for example: • • • • • • Navigation equipment. Engine machinery. Deck machinery. Cargo handling machinery/equipment. Hull structur", "a": "• • • • • • • Refer to the FME(C)A to identify the systems and sub-systems that make up the DP system. Select three sample items of equipment from the FME(C)A and verify that they are included in the PMS. Review the latest shore maintenance reports for the DP system and note any recommendations or deficiencies recorded. Review the DP data log and a", "p": "IMO: ISM Code", "k": ["satisfactory", "equipment", "planned", "maintenance", "items", "included", "system", "condition"]},
  "8.7.8":{"ch": "8", "sec": "8.7", "s": "DP FMEA", "d": "Were the Master and officers familiar with the vessel’s DP FMEA, was the latest version available on board, and were any modifications to the DP system included?", "o": "To ensure that the FMEA is properly managed and that the appropriate vessel personnel are familiar with its contents.", "i": "IMO:MSC.1/Circ.1580 Guidelines for vessels and units with dynamic positioning (DP) systems 1.2.13 Failure Modes and Effects Analysis (FMEA) means a systematic analysis of systems and sub-systems to a level of detail that identifies all potential failure modes down to the appropriate sub-system level and their consequences. 1.2.14 FMEA proving trials means the test program for verifying the FMEA. I", "a": "", "p": "IMO: ISM Code IMO: MSC.1/Circ.1580 Guidelines for vessels and units with dynamic positioning (DP) systems IMCA: M 166 Rev. 2 October 2019 – Guidance on Failure Modes and Effects Analysis (FMEA) IMCA: ", "k": ["latest", "master", "familiar", "officers", "board", "vessel", "modifications", "included", "available", "version", "system"]},
  "8.7.9":{"ch": "8", "sec": "8.7", "s": "Gas and fire detection systems in the bow loading system (BLS) area", "d": "Were the Master and officers familiar with the location, purpose and operation of the gas and fire detection systems in the bow loading system (BLS) area, and was the equipment in good working order, regularly tested, maintained and calibrated?", "o": "To ensure that those measures specifically designed to prevent or extinguish fires in the Bow Loading System (BLS) area of shuttle tankers are effective.", "i": "Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140 Appendix F BLS Fire Fighting System F.3 Fire and gas detection In the centre area of the BLS manifold room, detectors should be installed underneath the forecastle platform deck. The following fixed detection sensors should as a minimum be installed and connected to the vessels fire and gas detectio", "a": "• • • • • • • Sight, and where necessary review, the company procedures for the operation, inspection and maintenance of the fire and hydrocarbon gas detection and alarm systems fitted in the BLS area. Inspect the central control station for the BLS gas detection system and verify that: o The gas detecting system was fully operational. o The system", "p": "IMO: MSC.1/Circ.1432 Revised guidelines for the maintenance and inspection of fire protection systems and appliances. Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers ", "k": ["equipment", "maintained", "master", "familiar", "operation", "officers", "detection", "tested", "order", "systems", "location", "system"]},
  "8.8.1":{"ch": "8", "sec": "8.8", "s": "Cargo hold hatch covers", "d": "Were the Master and officers familiar with the company procedures for the operation, inspection, maintenance and testing of the cargo hold hatch-covers, and were the hatch covers in satisfactory condition?", "o": "To ensure the cargo hold hatch-covers of combination carriers are properly maintained and gas tight.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 14.1.4 Venting of cargo holds The vent system on combination carriers is similar to that of conventional tankers, with the vent lines from the cargo holds leading to either individual P/V valves on each tank outlet or to a main cargo vent/IG common line that expels the hydrocarbon vapour through a riser at a safe he", "a": "• • • • • Sight, and if necessary, review, the company procedures for the operation, inspection, maintenance, and testing of the cargo hold hatch-covers. Review the records of inspection, maintenance and testing of the cargo hold hatch-covers. Review risk assessments pertaining to any gas or liquid leaks from the hatch-covers. Inspect the hatch-cov", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "satisfactory", "covers", "master", "familiar", "procedures", "maintenance", "operation", "officers", "hatch", "condition", "cargo"]},
  "8.8.2":{"ch": "8", "sec": "8.8", "s": "Changing between wet and dry cargoes", "d": "Were the Master and officers familiar with the company procedures for changing cargo modes, including ship-specific checklists, and were there records to show that these procedures had been followed?", "o": "To ensure the changeover from wet to dry and vice versa in combination carriers is carried out safely and that all the necessary actions are completed.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 14.1.11 Cargo changeover checklists The following checklists are a generic guide to help each OBO develop its own specific checklists. 14.1.11.1 Oil to dry bulk cargo When changing the cargo from oil to dry, the following should be done: • • • • • • • • • • • • • • • • • Wash cargo holds and tanks, including access ", "a": "• • • • Sight, and if necessary, review, the company procedures for changing cargo mode from wet to dry and vice versa. Review records of cargo mode changeovers, including completed checklists. Review records of hold inspections and corrective actions taken, if required, after the carriage of dry cargoes with regard to damage caused by discharging ", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["company", "master", "familiar", "procedures", "records", "checklists", "between", "officers", "specific", "there", "changing", "modes"]},
  "8.99.1":{"ch": "8", "sec": "8.99", "s": "Cargo and ballast transfer planning and execution.", "d": "Were the Master and all officers directly involved in cargo transfer operations familiar with the company procedure for planning cargo and ballast transfers, and were records available to demonstrate that cargo operations had been planned in accordance with the company procedure and conducted in accordance with the agreed plan?", "o": "To ensure cargo and ballast transfer operations are planned and conducted in accordance with company procedures and industry best practice guidance.", "i": "", "a": "", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition. ICS: Tanker Safet", "k": ["company", "planned", "involved", "operations", "procedure", "demonstrate", "records", "familiar", "cargo", "ballast", "officers", "available"]},
  "8.99.2":{"ch": "8", "sec": "8.99", "s": "Ship/Shore Safety Checklist (SSSCL)", "d": "Were the Master and all officers with a direct responsibility for cargo, tank cleaning or ballast operations familiar with the requirements of the ISGOTT Ship/Shore Safety Checklist (SSSCL) and, were appropriate sections of the SSSCL in use with all applicable provisions and agreements maintained throughout?", "o": "To verify that there are good communications between the tanker and terminal, from pre-arrival to post departure, to ensure compliance with agreed safe operational procedures. OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth", "i": "The vessel operator should have developed procedures that required the relevant sections of a Ship/Shore safety checklist (SSSCL), conforming to the guidance provided in ISGOTT Sixth Edition Chapter 25, are completed by the vessel during every cargo, tank cleaning or ballast operation at a terminal or during defined ship to ship transfer operations. The relevant sections of the SSSCL may be provid", "a": "• • • Sight, and where necessary review, the company procedures which required the relevant sections of a SSSCL in accordance with ISGOTT Sixth Edition to be completed during every cargo, tank cleaning or ballast operation at a terminal or during defined ship to ship transfer operations. Review the sections of the SSSCL that had been completed and ", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["appropriate", "ssscl", "operations", "requirements", "shore", "familiar", "applicable", "throughout", "cargo", "isgott", "ballast", "direct"]},
  "8.99.3":{"ch": "8", "sec": "8.99", "s": "Cargo operations team composition.", "d": "Were the Master and officers familiar with the company procedures which provided guidance on the level of supervision and support for cargo / port operations, and were operations supervised and supported by an appropriate team in accordance with the company procedures?", "o": "To ensure that there are always enough properly supervised personnel on duty for the management of cargo operations, means of access, moorings and any other planned operations while in port or at a terminal.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 7.9 Manning levels Not having enough people available on board or at the terminal can lead to accidents and incidents. Marine regulations require: • • Flag States to issue ships with a minimum safe manning document. Ships to be appropriately manned to undertake all aspects of safe operations onboard… …Both ship and", "a": "• Sight, and where necessary review, the company procedures that provided guidance on the supervision and support levels required during cargo / port operations.", "p": "ICS: Tanker Safety Guide (Gas) - Third Edition IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. OCIMF: Mooring Equipment Guidelines. Fourth Edition 201", "k": ["company", "appropriate", "master", "familiar", "procedures", "guidance", "level", "accordance", "officers", "supervision", "operations", "provided"]},
  "8.99.4":{"ch": "8", "sec": "8.99", "s": "Cargo and ballast valve testing.", "d": "Were the Master and officers familiar with the company procedures for checking and testing cargo and ballast system valves, and were the valves and the remote control system in satisfactory condition?", "o": "To ensure that cargo and ballast system valves always operate as designed.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 12.1.3 Valve operation Valves that control liquid flow should be closed slowly. The time that it takes for power operated valves to move from open to closed, and from closed to open, should be checked regularly at their normal operating temperature. SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals", "a": "• • • • Sight, and where necessary review, the company procedures for the regular checking and testing of cargo and ballast system valves. Review the records for valve testing which included: o The actual times recorded for opening and closing. o The verification of the accuracy of local and remote valve indicators. During the course of the inspect", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. SIGTTO: Liquified Gas Handling Principles on Ships and in Terminals. Fourth Edition.", "k": ["company", "satisfactory", "master", "familiar", "procedures", "checking", "valve", "officers", "remote", "system", "condition", "valves"]},
  "8.99.5":{"ch": "8", "sec": "8.99", "s": "Fixed cargo tank level gauging system.", "d": "Were the Master and officers familiar with the company procedures for the operation, maintenance, testing, calibration and comparison of the fixed cargo tank level gauging system, and was the system in satisfactory condition and fully operational?", "o": "To ensure the fixed tank level gauging system is always fully operational, reliable and accurate.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 12.8.6 Cargo tank monitoring systems Tank monitoring equipment often has multiple functions, such as radar or other remote gauging, temperature measurement, tank pressure sensors and level alarms. It may be integrated with other cargo monitoring or control equipment or with loading computers or control systems. Manu", "a": "• • • • Sight, and where necessary review, the company procedures for the operation, maintenance, testing, calibration and comparison of the fixed tank level gauging system. Review the records of maintenance, testing, calibration, and comparison checks of the fixed tank level gauge system. Request the accompanying officer to demonstrate the use of ", "p": "IMO: ISM Code IMO SOLAS OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IGC Code IMO: IBC Code", "k": ["company", "operational", "gauging", "satisfactory", "familiar", "operation", "system", "condition", "cargo", "procedures", "fully", "officers"]},
  "8.99.6":{"ch": "8", "sec": "8.99", "s": "Stability and loading instrument(s)", "d": "Were the Master and deck officers familiar with the company procedure and manufacturer’s instructions for the periodic testing of the stability and loading instrument(s), and were records maintained to confirm that tests had been completed in accordance with the procedure?", "o": "To ensure that the vessel’s stability and loading instrument(s) provides accurate stress and stability calculations.", "i": "IACS Unified Requirements S1 Requirements for Loading Conditions, Loading Manuals and Loading Instruments S1.1.2 Definitions Loading Instrument A loading instrument is an instrument, which is either analogue or digital, by means of which it can be easily and quickly ascertained that, at specified read-out points, the still water bending moments, shear forces, and the still water torsional moments ", "a": "", "p": "IMO: MARPOL IACS: Unified Requirement S1 Requirements for the Loading Conditions Loading Manuals and Loading Instruments IMO: IGC Code IMO: IBC Code IMO: ISM Code IACS: Unified Requirements L5 Compute", "k": ["company", "periodic", "maintained", "master", "familiar", "testing", "instrument", "tests", "officers", "loading", "procedure", "confirm"]},
  "8.99.7":{"ch": "8", "sec": "8.99", "s": "Loading limitations", "d": "Where the vessel was subject to loading restrictions and/or intact stability concerns at any phase of a voyage or cargo operation, had the company developed procedures to manage these restrictions and/or concerns, and were the Master and cargo officers familiar with the company procedures?", "o": "To ensure that the vessel is never loaded in such a manner that any structural limitations are exceeded due to tank filling level, or intact stability is compromised by unmanaged free surface effect.", "i": "The vessel operator should have identified whether the vessel was subject to: • • • • Restrictions in the density of the cargoes that may be loaded onboard or in any individual tanks. Restrictions in the filling height for any tanks onboard and the phases of operations for which the restrictions are in place. Intact stability concerns due to large width cargo tanks, double bottom tanks without a c", "a": "• • • Review the vessel loading and stability manual, identify whether the vessel was subject to any loading restrictions or stability concerns and verify that the vessel operator’s declaration in the pre-inspection questionnaire was correct. Where the vessel was subject to loading limitations or stability concerns, review the company procedures th", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: ISM Code ICS: Tanker Safety Guide (Gas) - Third Edition", "k": ["company", "these", "limitations", "manage", "familiar", "intact", "operation", "developed", "stability", "cargo", "restrictions", "concerns"]},
  "8.99.8":{"ch": "8", "sec": "8.99", "s": "Cargo transfer hoses.", "d": "Were the Master and officers familiar with the company procedures for the selection, inspection, testing and storage of cargo transfer hoses, and were the hoses in satisfactory condition?", "o": "To ensure ship supplied cargo transfer hoses are always fit for purpose.", "i": "OCIMF: Guidelines for the Handling, Storage, Use, Maintenance and Testing of STS Hoses. First Edition. 3 Composite hose assemblies Composite STS hose assemblies are typically used for liquified gas and chemical transfers. These hoses are resistant to cryogenic cargoes, high-aromatic-content cargoes and various other cargoes that are not compatible with rubber compounds. Composite STS hoses are ver", "a": "", "p": "USCG: Code of Federal Regulations. Title 33. SIGTTO: Floating LNG installations 1st edition 2021 IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: ", "k": ["company", "satisfactory", "master", "familiar", "procedures", "storage", "officers", "selection", "hoses", "condition", "cargo", "inspection"]},
  "8.99.9":{"ch": "8", "sec": "8.99", "s": "Cargo and ballast system controls, indicators, mimics and displays.", "d": "Were the Master and officers familiar with the company procedures for periodically verifying the accuracy of cargo and ballast system controls and indicators, and were legible and up-to-date pipeline and/or mimic diagrams available at the cargo control location(s) and in the pumproom(s) as applicable?", "o": "To ensure accurate information and data is available to the officer in charge of cargo operations.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 11.3 Cargo and ballast systems 11.3.1 Operation manual The ship’s crew should have access to up-to-date drawings and information on the cargo and ballast systems as well as an operation manual. TMSA KPI 6.1.2 requires that procedures for pre-operational tests and checks of cargo and bunkering equipment are in place ", "a": "• • Sight the pipeline and/or mimic diagrams in the cargo control room or cargo control position as appropriate. Inspect cargo and ballast system controls and indicators in the cargo control room / pump control station and verify that: o Where fitted, remote pressure indicators are connected and displaying a value which is appropriate to the status", "p": "IMO: ISM Code OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["displays", "company", "periodically", "accuracy", "verifying", "pipeline", "mimic", "familiar", "applicable", "system", "cargo", "ballast"]},
  "8.99.10":{"ch": "8", "sec": "8.99", "s": "Cargo system bonding arrangements.", "d": "Were the Master and officers a familiar with the company procedures for the inspection and maintenance of the bonding arrangements for independent cargo tanks, process plant and cargo pipelines and, were these arrangements in satisfactory condition?", "o": "To ensure the earthing and bonding arrangements for the cargo tanks, process plant and piping systems on board are maintained as required by class rules and international regulations.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition 3.2.2 Bonding The most important counter measure to prevent an electrostatic hazard is to bond all metallic objects together to eliminate the risk of discharges between objects that might be charged to different voltages if they were electrically insulated. To avoid discharges from conductors to earth, it is normal ", "a": "• • • • Sight, and where necessary review, the company procedures for the inspection and maintenance of the bonding arrangements for independent cargo tanks, process plant and cargo pipelines. During the course of the inspection, examine visible bonding arrangements, such as bonding straps, for cargo tanks/process plant/piping systems which are not", "p": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. IMO: IGC Code IMO: IBC Code IACS: Requirements Concerning Electrical And Electronic Installations", "k": ["company", "bonding", "these", "independent", "satisfactory", "familiar", "system", "condition", "cargo", "inspection", "procedures", "officers"]},
  "8.99.11":{"ch": "8", "sec": "8.99", "s": "Independent verification of cargo piping systems line up.", "d": "Was there a procedure in place to complete an independent check of the entire cargo liquid, vapour and venting pipeline system prior to commencement of cargo operations to ensure that valves, vacuum breakers, sampling connections, drains and unused connections or interconnections were correctly set, and blanked or capped, where appropriate?", "o": "To ensure that the entire cargo system integrity and line up is independently verified by a second person before every cargo operation.", "i": "OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition. 12.1.2 Setting of lines and valves Before starting any loading or discharging, the ship’s cargo pipelines should be set in line with the loading or discharging plan and checked independently and by other personnel under the control of the Responsible Officer. If a change in the line-up is required during a change o", "a": "• • • • Sight, and where necessary review, the company procedures to ensure that that the entire cargo liquid, vapour and venting pipeline system is independently cross-checked by a second person under the control of the responsible officer prior to commencement of cargo operations. Review the cargo records for a recent cargo operation and verify t", "p": "ICS: Tanker Safety Guide (Gas) - Third Edition IMO: ISM Code ICS: Tanker Safety Guide (Chemicals) - Fifth Edition OCIMF/ICS: International Safety Guide for Oil Tankers and Terminals. Sixth Edition.", "k": ["appropriate", "capped", "connections", "entire", "interconnections", "operations", "procedure", "place", "sampling", "complete", "independent", "valves"]},
  "9.1.1":{"ch": "9", "sec": "9.1", "s": "Testing and correct operation of the mooring winch brakes", "d": "Were the Master and deck officers familiar with the company procedures for the testing and correct operation of the mooring winch brakes, and were records available to demonstrate that brakes had been tested periodically, after maintenance or when there was evidence of premature brake slippage?", "o": "To ensure that mooring winches function as designed, shedding excess load at a defined value in accordance with the Ship Design MBL.", "i": "OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4) 6.3.4.1 Brake holding load OCIMF recommends that the primary brake should be set to hold 60% of the ship design MBL on the first layer. Split drum winches should not have more than one layer of mooring line on the tension section of the drum because it can reduce the brake holding capacity of the mooring winch. 6.4.5.1 Effect of layer", "a": "• • • • • • Sight, and where necessary review, the company procedure for the testing and operation of the vessel’s mooring winch brakes. Review the Mooring System Management Plan and verify that it contained the mooring winch brake testing records or, where records were integrated within the ships document control system, that the location of the m", "p": "IMO SOLAS OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4) IMO: ISM Code", "k": ["company", "mooring", "periodically", "demonstrate", "records", "familiar", "premature", "brake", "operation", "procedures", "officers", "there"]},
  "9.1.2":{"ch": "9", "sec": "9.1", "s": "Was the vessel satisfactorily moored", "d": "Was the vessel satisfactorily moored in accordance with both the terminal mooring plan and the mooring configurations permitted by the vessel’s Mooring System Management Plan?", "o": "To ensure that the vessel is always moored safely in accordance with a terminal’s published mooring plan and the acceptable mooring line configurations identified within the vessel’s Mooring System Management Plan.", "i": "OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4) Section 1.9.2 Mooring System Management Plan Structure. Part B – Mooring equipment design philosophy • • 5. Assumptions on the standard mooring pattern and considerations for redundancy provisions, including sub-optimal line distribution to cover unpredicted events (e.g. storm surges, shore mooring hooks out of service). 8. Alternate ", "a": "• • • • • • • Review the Mooring System Management Plan and identify the permissible mooring configurations that may be used by the vessel to meet optimal, sub-optimal and alternate mooring arrangements. Review the published terminal mooring plans for recent terminal visits and verify that there was a process to confirm that the vessel could comply", "p": "OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4) IMO: ISM Code", "k": ["mooring", "vessel", "configurations", "management", "system", "accordance", "satisfactorily", "moored", "terminal", "permitted"]},
  "9.1.3":{"ch": "9", "sec": "9.1", "s": "Line Management Plan (LMP) implementation.", "d": "Were the Master, deck officers, and ratings involved with mooring operations, familiar with the content of the Line Management Plan and was the plan maintained in accordance with company instructions with mooring line, mooring tail and joining shackle certificates available for each item included within the Line Management Plan?", "o": "To ensure that mooring lines, mooring tails and joining shackles are always in serviceable condition and managed to avoid failure in service.", "i": "The vessel operator should have developed a Line Management Plan (LMP) in alignment with MEG4 Table 5.2 which should give guidance on: • • • • Maintenance; including line installation, storage, repair, line maintenance and wear zone management. Inspection; including routine inspection and detailed inspection. (detailed in MEG4 5.4.3) Service life and retirement criteria; including determination of", "a": "• • • Review the mooring line, mooring tail and joining shackle certificates and verify that the vessel has an effective process in place to identify each individual item and associate it with its location onboard and its manufacturer’s product certificate. Review the Line Management Plan (LMP) and verify that, as a minimum, the four key categories", "p": "OCIMF: Effective Mooring. Fourth Edition 2019 OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4)", "k": ["company", "mooring", "involved", "operations", "shackle", "familiar", "officers", "certificates", "within", "included", "joining", "available"]},
  "9.1.4":{"ch": "9", "sec": "9.1", "s": "Mooring lines, tails and mooring shackles.", "d": "Did all mooring lines, mooring tails and joining shackles, including those carried as spares, meet industry guidelines?", "o": "To ensure that mooring lines, mooring tails and joining shackles are fit for the intended purpose to prevent line failure in service.", "i": "OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4) Chapter 5.2 – Mooring system design and line selection TMSA KPI 6A.2.4 requires that procedures are in place for the inspection, maintenance and replacement of wires, ropes, tails and ancillary equipment. IMO: ISM Code 10.1 The Company should establish procedures to ensure that the ship is maintained in conformity with the provisions ", "a": "• • • Review the Mooring System Management Plan and identify the values for Ship Design MBL and the working load limit (WLL) of the lines. Review the detailed list of mooring equipment and loose equipment and verify that; o The mooring lines had a Line Design Break Force (LDBF) in the range of 100-105% of the Ship Design MBL. o The mooring tails, w", "p": "OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4)", "k": ["mooring", "carried", "shackles", "those", "spares", "joining", "tails", "industry", "including", "guidelines", "lines"]},
  "9.2.1":{"ch": "9", "sec": "9.2", "s": "Emergency towing procedure and equipment", "d": "Were the Master and all officers familiar with the vessel specific emergency towing procedure, and was the emergency towing equipment, where fitted, in satisfactory condition and ready for immediate use?", "o": "To ensure that the vessel crew are familiar with the emergency towing procedure, and that the emergency towing equipment, where required to be fitted, is ready for immediate use.", "i": "IMO: MSC.1/Circ.1255 Guidelines for Owners/Operators on Preparing Emergency Towing Procedures. 4.1 The Emergency Towing Booklet (ETB) should be ship specific and be presented in a clear, concise and ready-touse format (booklet, plan, poster, etc.). 4.6 A minimum of three copies should be kept on board and located in: 1. 2. 3. the bridge; a forecastle space; and the ship’s office or cargo control r", "a": "• • • • • • Review the vessel specific emergency towing procedure (Emergency Towing Booklet - ETB). Verify a copy of the ETB was available on the bridge, in the ship’s office or cargo control room and in the forecastle space. Where fitted, inspect the emergency towing arrangements fitted to the vessel and verify that the emergency towing procedure ", "p": "IMO SOLAS IMO: MSC.1/Circ.1255 Guidelines for Owners/Operators on Preparing Emergency Towing Procedures IMO: ISM Code", "k": ["satisfactory", "master", "familiar", "officers", "specific", "procedure", "vessel", "fitted", "ready", "where", "equipment", "condition"]},
  "9.3.1":{"ch": "9", "sec": "9.3", "s": "Anchoring operations", "d": "Were the Master and deck officers familiar with the company procedures for anchoring operations, and were records available to confirm that recent anchoring operations had been conducted in compliance with company expectations?", "o": "To ensure that anchoring operations are conducted within the limitations of the equipment fitted to the vessel", "i": "Intertanko: Anchoring Guidelines: A Risk-Based Approach v.3 June 2020 Appendix 2 Planning of the anchoring operation There are procedures for: • • • • • • • • Selection of anchoring position Planning including toolbox talk Methods of anchoring Equipment design limitations and characteristics Emergency anchoring Roles and responsibilities Requirements for risk assessments for anchoring Use of main ", "a": "• • • Review the company procedures for anchoring operations. Verify that the anchoring procedures gave guidance relating to: o The maximum depth of water for normal anchoring operations. o The maximum recommended wind strength and wave height for anchoring. o The weather conditions when the company requires the vessel to depart an anchorage. o The", "p": "OCIMF Anchoring Systems and Procedures 2010 edition IACS Unified Requirements A: Requirements concerning Mooring Anchoring and Towing IACS: UR A3 Anchor Windlass Design and Testing ICS: Bridge Procedu", "k": ["conducted", "company", "master", "familiar", "procedures", "officers", "operations", "expectations", "confirm", "available", "anchoring", "recent"]},
  "9.4.1":{"ch": "9", "sec": "9.4", "s": "Mooring team supervision and composition", "d": "Were the Master, deck officers and deck ratings familiar with the company procedure that defined mooring team supervision and composition for the various mooring and anchoring operations likely to be undertaken, and was evidence available that each mooring work space had been supervised and manned in accordance with company expectations?", "o": "To ensure that mooring and anchoring operations are always properly supervised with enough personnel assigned to conduct the operations safely and efficiently at each mooring or anchoring workspace.", "i": "OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4) 1.9 Mooring System Management Plan 1.9.2.5 Part E – Risk and change management, safety of personnel and human factors E.3 Manning and Training • • • • Safe manning levels including minimum required by Class, Flag and/or the ship’s SMS. Manufacturer’s instructions and standard operating procedures. Outline competency requirements for u", "a": "• • • Sight, and where necessary review, the company procedure which defined the supervision and composition of mooring and anchoring teams. Review the sections of MSMP relating to Manning and Training, and Mooring Operations Plans and Procedures and verify that they had been developed to include detail of the mooring team composition and workspace", "p": "OCIMF: Mooring Equipment Guidelines. Fourth Edition 2018 (MEG4) IMO: STCW Code OCIMF: Effective Mooring. Fourth Edition 2019 INTERTANKO: Anchoring Guidelines: A Risk-Based Approach v.3 June 2020 IMO: ", "k": ["company", "mooring", "undertaken", "operations", "procedure", "manned", "space", "defined", "familiar", "anchoring", "likely", "officers"]},
  "9.4.2":{"ch": "9", "sec": "9.4", "s": "Dangers of working with and around mooring lines", "d": "Were the deck officers and ratings involved with mooring operations familiar with the safe operation of the mooring winches and the dangers of working with and around mooring lines during mooring operations and while under tension?", "o": "To ensure that vessel personnel are aware of the dangers of working with mooring equipment and near lines under tension.", "i": "Page 401 of 579 – SIRE 2.0 Question Library Part 2 – Version 1.0 (January 2022) The vessel operator should have developed mooring procedures which include: • • • • • • • The role of the supervisor and their responsibilities. The role of the supporting ratings and their responsibilities. The hand signals that should be used during mooring operations. The requirement for a toolbox talk or risk asses", "a": "• Sight, and where necessary review, the mooring procedure which included operational safety during mooring operations and in areas where mooring lines were under tension. During the physical inspection verify that: • • • • • • • • • • The winch drums were out of gear and pins were available to lock the clutch in position while engaged and disengag", "p": "IMO: ISM Code OCIMF: Effective Mooring. Fourth Edition 2019", "k": ["mooring", "familiar", "involved", "operation", "officers", "operations", "lines", "ratings", "during", "dangers", "while", "under"]},
  "9.5.1":{"ch": "9", "sec": "9.5", "s": "STS operations checklists", "d": "Were the appropriate industry checklists used during STS operations, and were comprehensive records of these operations maintained?", "o": "To ensure that all stages of an STS operation are conducted in accordance with industry best practice guidance.", "i": "OCIMF: Ship to Ship Transfer Guide for Petroleum, Chemicals and Liquefied Gases. First Edition. * \"At sea\" Indicates offshore waters or partially sheltered waters where transfers may be undertaken between vessels underway or at anchor. \"In Port\" Used to indicate where STS operations are conducted under the jurisdiction of a port or harbour authority and includes operations that may involve berthin", "a": "• • • Sight, and where necessary review, the company procedures which required the vessel to use the checklists identified by the OCIMF* STS Transfer Guide. Where the vessel was involved in an STS operation, review the STS checklists completed during the operation thus far and verify that the correct checklists, including a standard pre-transfer ch", "p": "OCIMF: Ship to Ship Transfer Guide for Petroleum Chemicals and Liquefied Gases. First Edition. IMO: ISM Code", "k": ["appropriate", "maintained", "checklists", "during", "operations", "comprehensive", "these", "industry", "records"]},
  "9.5.2":{"ch": "9", "sec": "9.5", "s": "STS Joint Plan of Operation (JPO)", "d": "Where the vessel was involved in an “at sea” STS operation, was an accurate Joint Plan of Operation available onboard, were the Master and deck officers familiar with its content, and were operations being conducted in accordance with its requirements?", "o": "To ensure that each “at sea” ship to ship (STS) operations is planned and executed taking into consideration the operational and environmental requirements for the specific transfer location, vessels and cargo transfer operations involved.", "i": "OCIMF*: Ship to Ship Transfer Guide for Petroleum, Chemicals and Liquefied Gases. First Edition. \"At sea\" indicates offshore waters or partially sheltered waters where transfers may be undertaken between vessels underway or at anchor. \"Joint plan of operation (JPO)\" An operation-specific plan that includes, as appropriate, reference to ship compatibility, manoeuvring, approach, mooring and transfe", "a": "• Review the Joint Plan of Operations for the STS operation and verify that: o The plan contained all information required by the OCIMF* guidance. o The risk assessment(s) had been developed to address the risks of the specific location and type of STS operation being undertaken. o The means for eliminating the potential for incendive sparking betw", "p": "OCIMF: Ship to Ship Transfer Guide for Petroleum Chemicals and Liquefied Gases. First Edition. IMO: ISM Code", "k": ["conducted", "master", "familiar", "content", "involved", "operation", "officers", "operations", "requirements", "vessel", "available", "being"]},
  "9.5.3":{"ch": "9", "sec": "9.5", "s": "STS Operations Plan", "d": "Were the Master, officers and deck ratings familiar with the vessel’s STS Operations Plan?", "o": "To ensure that ship to ship (STS) mooring & cargo operations are always planned and conducted in a consistent manner.", "i": "OCIMF*: Ship to Ship Transfer Guide for Petroleum, Chemicals and Liquefied Gases. First Edition. 1.1 Introduction The requirements of MARPOL Annex I, chapter 8, The Prevention of Pollution During Transfer of Oil Cargo Between Oil Tankers at Sea, should be adhered to for all applicable operations involving oil cargoes. The requirement for vessels to be provided with an STS operations plan should be", "a": "• Review the STS Operations Plan and verify that: o A copy of the STS Operations Plan is located on the bridge, in the cargo transfer station and in the Engine room. o Where the vessel carries MARPOL Annex 1 cargo, the STS Operations plan has been approved by the administration. o Where the vessel did not carry MARPOL Annex 1 cargo, the STS Operati", "p": "IMO: MARPOL OCIMF: Ship to Ship Transfer Guide for Petroleum Chemicals and Liquefied Gases. First Edition. IMO: ISM Code", "k": ["master", "familiar", "officers", "operations", "vessel", "ratings"]},
  "9.6.1":{"ch": "9", "sec": "9.6", "s": "Vapour hose securing arrangement for buoy moorings.", "d": "Were the vapour collection system manifold arrangements suitable for hose handling at buoy moorings?", "o": "To ensure that vapour collection system manifolds are suitably designed and equipped to facilitate hose handling at buoy moorings.", "i": "OCIMF/CDI: Recommendations for Oil and Chemical Tanker Manifolds and Associated Equipment Section five Hose support at ship’s side A means of adequately supporting hoses in way of the ship’s side abreast of the manifolds should be provided. Section nine Deck fittings to facilitate hose handling at buoy moorings Vessels likely to conduct operations at buoy moorings (SPM, CBM and tandem berthing) sh", "a": "• Inspect the vapour collection system manifolds and verify that the required fittings are in place. Expected Evidence • The vessel’s mooring arrangement plan. Potential Grounds for a Negative Observation For a vapour return system manifold (VRSM) which was designed for use at single buoy moorings: • • • • • • The vapour manifolds were not supporte", "p": "OCIMF/CDI: Recommendations for Oil and Chemical Tanker Manifolds and Associated Equipment", "k": ["vapour", "suitable", "handling", "arrangement", "moorings", "arrangements", "collection", "securing", "system", "manifold"]},
  "9.6.2":{"ch": "9", "sec": "9.6", "s": "SPM mooring arrangements.", "d": "Were the Master and officers familiar with the company procedures for mooring at an SPM or F(P)SO and were the fittings required accurately described in the HVPQ?", "o": "To ensure the vessel is appropriately equipped and will be able to safely moor to an SPM or F(P)SO terminal.", "i": "OCIMF Guidelines for Offshore Tanker Operations. First Edition 2018. 5.3.2 Bow mooring equipment overview OCIMF has published recommendations for conventional tanker bow mooring equipment in a range of earlier publications and the current recommendations are repeated in this section… …Conventional tankers that are likely to trade to F(P)SOs and SPM buoys should be equipped with bow chain stopper s", "a": "• • • • • • Sight, and where necessary review, the company procedures for mooring at SPM or F(P)SO terminals. Sight, and where necessary review, the certificates for the bow stoppers and closed bow fairleads, particularly if these have been modified or retro-fitted. Sight, and where necessary review, the records of inspection and maintenance of the", "p": "OCIMF Guidelines for Offshore Tanker Operations IMO: ISM Code", "k": ["company", "mooring", "master", "familiar", "procedures", "described", "officers", "accurately", "arrangements", "fittings", "required"]},
  "9.7.1":{"ch": "9", "sec": "9.7", "s": "Shuttle tanker bow mooring system", "d": "Were the Master and officers familiar with the company procedures for the operation, inspection, testing and maintenance of the bow mooring system for offshore terminals, and was the equipment in satisfactory condition?", "o": "To ensure the bow mooring system is regularly inspected, tested, and maintained, and operated safely.", "i": "OCIMF Guidelines for Offshore Tanker Operations 5.4.1 Bow mooring equipment overview A typical mooring system for bow loading tankers consists of the following: • • • • • • • • Hydraulic power-pack. Traction winch. Stowage drum, fitted with guide rollers, for messenger line and pick-up line (may be a rope bin). Chain stopper (for securing the chafe chain), with on-load releasable pawl. Chain stopp", "a": "", "p": "IMO: ISM Code Norwegian Oil and Gas recommended guidelines for offshore loading shuttle tankers Guideline No. 140 OCIMF Guidelines for Offshore Tanker Operations", "k": ["company", "satisfactory", "mooring", "master", "familiar", "procedures", "maintenance", "tanker", "operation", "officers", "condition", "offshore"]},
  "10.1.1":{"ch": "10", "sec": "10.1", "s": "Chief Engineer's standing and daily orders", "d": "Had the Chief Engineer prepared Standing Orders, supplemented by Daily Orders, which emphasised and reinforced the company expectations with regards to engine room management and, if so, had all engineer officers signed to acknowledge their understanding of the same?", "o": "To ensure that all engineer officers are aware of the key expectations of both the company and the Chief Engineer with respect to the management of the vessel’s machinery spaces.", "i": "ICS: Engine Room Procedures Guide. First Edition. 2.1.2 Standing Orders The safety management manual and its associated operational procedures, along with standing orders and instructions, form the basis of command and control on board. The Chief Engineer should issue written standing orders for the engineering team. These should reflect the Chief Engineer’s own requirements, and take into account", "a": "• • • Sight, and where necessary review, the company procedures which outlined the requirement for the Chief Engineer to develop Standing Orders and Daily Orders along with their expected content. Review the Chief Engineer’s Standing and Daily Orders and verify that the content of each was aligned with the company expectations, reflected the equipm", "p": "OCIMF: Recommendations on Engineering Watch/Duty Period Handover and Inspection Routines IMO: ISM Code ICS: Engine Room Procedures Guide. First Edition.", "k": ["company", "understanding", "emphasised", "engine", "acknowledge", "supplemented", "chief", "signed", "prepared", "officers", "orders", "standing"]},
